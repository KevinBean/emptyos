}

// ── Pyramid view — layered rows + connection edges (the architecture story) ─
function renderPyramid() {
    const host = document.getElementById('pyramid-view');
    if (!layersData || !nodes.length) {
        host.innerHTML = '<div style="color:#666;padding:40px;text-align:center">Loading…</div>';
        return;
    }
    drawConnectedPyramid();
    if (!window._pyrResizeBound) {
        window.addEventListener('resize', () => { if (currentView === 'pyramid') drawConnectedPyramid(); });
        window._pyrResizeBound = true;
    }
}

function drawConnectedPyramid() {
    const host = document.getElementById('pyramid-view');
    const W = host.clientWidth || window.innerWidth;
    const H = host.clientHeight || (window.innerHeight - 96);

    // Top → bottom: apex first (apps), providers last
    const layers = [...layersData.layers].reverse();
    const ROW_PAD_TOP = 20;
    const ROW_PAD_BOT = 16;
    const usableH = H - ROW_PAD_TOP - ROW_PAD_BOT;
    const ROW_H = usableH / layers.length;
    const LEFT_PAD = 100;
    const RIGHT_PAD = 24;

    // Index edges for fast lookup + neighbor traversal
    const inEdges = new Map(), outEdges = new Map();
    edges.forEach(e => {
        if (!inEdges.has(e.target)) inEdges.set(e.target, []);
        if (!outEdges.has(e.source)) outEdges.set(e.source, []);
        inEdges.get(e.target).push(e.source);
        outEdges.get(e.source).push(e.target);
    });

    // Position pass: top layer alphabetical, then barycenter ordering downward.
    // Two passes (down then up) for slightly better crossings.
    const pos = new Map();
    function placeRow(layer, li, sortFn) {
        const sorted = [...layer.nodes].sort(sortFn);
        const y = ROW_PAD_TOP + ROW_H * (li + 0.5);
        const rowW = W - LEFT_PAD - RIGHT_PAD;
        const N = Math.max(1, sorted.length);
        sorted.forEach((n, i) => {
            const x = LEFT_PAD + rowW * (i + 0.5) / N;
            pos.set(n.id, { x, y, layer: li });
        });
    }
    // Pass 1: top alphabetical
    placeRow(layers[0], 0, (a, b) => a.label.localeCompare(b.label));
    // Pass 2: each subsequent layer ordered by mean X of placed neighbors above
    for (let li = 1; li < layers.length; li++) {
        placeRow(layers[li], li, (a, b) => barycenter(a) - barycenter(b));
    }
    // Pass 3 (refine): re-order top-down a second time using both up + down neighbors
    for (let li = 0; li < layers.length; li++) {
        placeRow(layers[li], li, (a, b) => barycenter(a) - barycenter(b));
    }

    function barycenter(node) {
        const nbrs = [
            ...(inEdges.get(node.id) || []),
            ...(outEdges.get(node.id) || []),
        ].filter(id => pos.has(id));
        if (!nbrs.length) return W / 2;
        return nbrs.reduce((s, id) => s + pos.get(id).x, 0) / nbrs.length;
    }

    // Edge color map mirrors graph view
    const EDGE_COLORS = {
        uses_capability: '#fbbf24', uses_service: '#f87171',
        provides_service: '#a78bfa', has_provider: '#555',
        emits_event: '#c084fc', listens_event: '#c084fc',
        calls_app: '#f43f5e', uses_engine: '#2dd4bf',
        reads_data: '#4ade80', writes_data: '#4ade80',
    };

    let svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;

    // Row bands + labels on the left
    layers.forEach((layer, li) => {
        const yMid = ROW_PAD_TOP + ROW_H * (li + 0.5);
        const yTop = ROW_PAD_TOP + ROW_H * li;
        if (li % 2 === 0) {
            svg += `<rect class="cpyr-row-band" x="0" y="${yTop}" width="${W}" height="${ROW_H}"/>`;
        }
        svg += `<text class="cpyr-row-label" x="20" y="${yMid - 4}">L${layer.level}</text>`;
        svg += `<text class="cpyr-row-name"  x="20" y="${yMid + 10}">${esc(layer.name)}</text>`;
    });

    // Edges (drawn before nodes so nodes sit on top)
    edges.forEach((e, i) => {
        const sp = pos.get(e.source);
        const tp = pos.get(e.target);
        if (!sp || !tp) return;
        const dy = tp.y - sp.y;
        const c1y = sp.y + dy * 0.55;
        const c2y = tp.y - dy * 0.55;
        const color = EDGE_COLORS[e.type] || '#444';
        svg += `<path class="cpyr-edge" d="M${sp.x.toFixed(1)},${sp.y.toFixed(1)} C${sp.x.toFixed(1)},${c1y.toFixed(1)} ${tp.x.toFixed(1)},${c2y.toFixed(1)} ${tp.x.toFixed(1)},${tp.y.toFixed(1)}"
            stroke="${color}" data-source="${esc(e.source)}" data-target="${esc(e.target)}" data-type="${esc(e.type)}"/>`;
    });

    // Nodes — pill chips
    nodes.forEach(n => {
        const p = pos.get(n.id);
        if (!p) return;
        const c = COLORS[n.type] || '#666';
        const created = (timelineData && timelineData.nodes[n.id]) || '';
        const labelW = Math.max(40, n.label.length * 6.4 + 14);
        svg += `<g class="cpyr-node" data-id="${esc(n.id)}" data-created="${esc(created)}"
            transform="translate(${p.x.toFixed(1)},${p.y.toFixed(1)})" style="color:${c}">
            <rect x="${(-labelW/2).toFixed(1)}" y="-9" width="${labelW.toFixed(1)}" height="18" rx="9"
                fill="rgba(15,15,15,0.92)" stroke="${c}" stroke-width="1"/>
            <text x="0" y="3.5" text-anchor="middle" fill="${c}" font-size="10" font-weight="600"
                style="font-family:system-ui,sans-serif">${esc(n.label)}</text>
        </g>`;
    });

    svg += '</svg>';
    host.innerHTML = svg;
    mountPyramidFilters(host);

    // Wire up: click → locate, hover → highlight connected sub-graph
    host.querySelectorAll('.cpyr-node').forEach(g => {
        g.addEventListener('click', () => locateOrInfo(g.dataset.id));
        g.addEventListener('mouseenter', () => highlightPyramid(g.dataset.id, host));
        g.addEventListener('mouseleave', () => clearPyramidHighlight(host));
    });
    applyPyramidFilters();
}

// ── Edge-type filter chips on Pyramid view ─────────────────────────────
const PYR_GROUPS = {
    capability: { types: ['uses_capability', 'has_provider'],     color: '#fbbf24', label: 'capability' },
    service:    { types: ['uses_service', 'provides_service'],    color: '#f87171', label: 'service'    },
    event:      { types: ['emits_event', 'listens_event'],        color: '#c084fc', label: 'event'      },
    app:        { types: ['calls_app'],                           color: '#f43f5e', label: 'app→app'    },
    engine:     { types: ['uses_engine'],                         color: '#2dd4bf', label: 'engine'     },
    data:       { types: ['reads_data', 'writes_data'],           color: '#4ade80', label: 'data'       },
};
let pyrActiveGroups = null;   // Set populated from localStorage on first use

function _loadPyrFilters() {
    if (pyrActiveGroups !== null) return;
    pyrActiveGroups = new Set(Object.keys(PYR_GROUPS));
    try {
        const raw = localStorage.getItem('eos.topology.pyramid_filters');
        if (raw) {
            const arr = JSON.parse(raw);
            if (Array.isArray(arr)) pyrActiveGroups = new Set(arr);
        }
    } catch (e) { /* ignore */ }
}

function _savePyrFilters() {
    try {
        localStorage.setItem('eos.topology.pyramid_filters', JSON.stringify([...pyrActiveGroups]));
    } catch (e) { /* ignore */ }
}

function mountPyramidFilters(host) {
    _loadPyrFilters();
    const bar = document.createElement('div');
    bar.id = 'pyr-filters';
    bar.innerHTML = Object.entries(PYR_GROUPS).map(([key, g]) => {
        const on = pyrActiveGroups.has(key);
        return `<span class="pyr-chip ${on ? 'on' : ''}" data-group="${key}"
            style="--chip-color:${g.color}">
            <span class="pyr-chip-dot"></span>${g.label}
        </span>`;
    }).join('') + `
        <span class="pyr-chip" data-group="__all__" style="--chip-color:#888;border-style:dashed">all</span>
        <span class="pyr-chip" data-group="__none__" style="--chip-color:#888;border-style:dashed">none</span>`;
    host.appendChild(bar);
    bar.querySelectorAll('.pyr-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            const g = chip.dataset.group;
            if (g === '__all__') {
                pyrActiveGroups = new Set(Object.keys(PYR_GROUPS));
            } else if (g === '__none__') {
                pyrActiveGroups = new Set();
            } else if (pyrActiveGroups.has(g)) {
                pyrActiveGroups.delete(g);
            } else {
                pyrActiveGroups.add(g);
            }
            _savePyrFilters();
            // Refresh chip on-states without redrawing the SVG
            bar.querySelectorAll('.pyr-chip').forEach(c => {
                const k = c.dataset.group;
                if (k === '__all__' || k === '__none__') return;
                c.classList.toggle('on', pyrActiveGroups.has(k));
            });
            applyPyramidFilters();
        });
    });
}

function applyPyramidFilters() {
    _loadPyrFilters();
    const activeTypes = new Set();
    pyrActiveGroups.forEach(g => {
        const grp = PYR_GROUPS[g];
        if (grp) grp.types.forEach(t => activeTypes.add(t));
    });
    const host = document.getElementById('pyramid-view');
    if (!host) return;

    const reachable = new Set();
    host.querySelectorAll('.cpyr-edge').forEach(p => {
        const visible = activeTypes.has(p.dataset.type);
        p.classList.toggle('hidden-by-filter', !visible);
        if (visible) {
            reachable.add(p.dataset.source);
            reachable.add(p.dataset.target);
        }
    });
    // Dim nodes that no active edge touches.  Keep apex apps (no out-edges) +
    // pure providers visible if their group is active — otherwise the row
    // headers look populated but unconnected.
    host.querySelectorAll('.cpyr-node').forEach(n => {
        const id = n.dataset.id;
        const orphan = !reachable.has(id);
        n.classList.toggle('unconnected', orphan);
    });
}

function highlightPyramid(nodeId, host) {
    // Compute connected set (1-hop in + 1-hop out)
    const connected = new Set([nodeId]);
    edges.forEach(e => {
        if (e.source === nodeId) connected.add(e.target);
        if (e.target === nodeId) connected.add(e.source);
    });
    host.querySelectorAll('.cpyr-node').forEach(n => {
        n.classList.toggle('dim', !connected.has(n.dataset.id));
    });
    host.querySelectorAll('.cpyr-edge').forEach(p => {
        const isConn = p.dataset.source === nodeId || p.dataset.target === nodeId;
        p.classList.toggle('lit', isConn);
        p.classList.toggle('dim', !isConn);
    });
}

function clearPyramidHighlight(host) {
    host.querySelectorAll('.cpyr-node').forEach(n => n.classList.remove('dim'));
    host.querySelectorAll('.cpyr-edge').forEach(p => { p.classList.remove('lit'); p.classList.remove('dim'); });
}

// ── Timeline scrubber (millisecond resolution) ─────────────────────────
let timelineActive = false;
let timelinePlaying = false;
let currentCutoffMs = null;
let minDateMs = 0, maxDateMs = 0;
let prevCutoffMs = null;
const SLIDER_MAX = 1000;

// Read either {date,message} or a bare string from timelineData.nodes[id].
// Cache migration safety + handles the new birth-log shape uniformly.
function _nodeDate(id) {
    if (!timelineData || !timelineData.nodes) return '';
    const v = timelineData.nodes[id];
    if (!v) return '';
    return typeof v === 'string' ? v : (v.date || '');
}
function _nodeMsg(id) {
    const v = timelineData && timelineData.nodes && timelineData.nodes[id];
    return (v && typeof v === 'object') ? (v.message || '') : '';
}

function fmtCutoff(ms) {
    // Always render as YYYY-MM-DD — never expose hour-of-day in any UI
    // surface. The slider keeps ms precision internally so the growing-dot
    // pulse still fires per-commit across same-day commits.
    if (!ms) return '—';
    const d = new Date(ms);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function fmtRange(iso) {
    if (!iso) return '—';
    return iso.slice(0, 10);
}

function toggleTimeline() {
    timelineActive = !timelineActive;
    document.getElementById('tl-toggle').textContent = 'Timeline: ' + (timelineActive ? 'On' : 'Off');
    document.getElementById('tl-toggle').classList.toggle('on', timelineActive);
    document.getElementById('timeline-bar').classList.toggle('off', !timelineActive);
    document.getElementById('timeline-slider').disabled = !timelineActive;
    document.getElementById('tl-play').disabled = !timelineActive;
    if (!timelineActive) {
        if (timelinePlaying) togglePlay();
        applyCutoff(null);
    } else {
        const slider = document.getElementById('timeline-slider');
        slider.value = SLIDER_MAX;
        applyCutoff(maxDateMs);
    }
}

function onScrub(val) {
    if (!timelineData || !maxDateMs) return;
    const pct = Number(val) / SLIDER_MAX;
    const ms = minDateMs + (maxDateMs - minDateMs) * pct;
    applyCutoff(ms);
}

function togglePlay() {
    timelinePlaying = !timelinePlaying;
    document.getElementById('tl-play').textContent = timelinePlaying ? '⏸' : '▶';
    if (timelinePlaying) {
        const slider = document.getElementById('timeline-slider');
        if (Number(slider.value) >= SLIDER_MAX) slider.value = 0;
        playStep();
    }
}

function playStep() {
    if (!timelinePlaying) return;
    const slider = document.getElementById('timeline-slider');
    // ~60s for full traversal at 60ms tick → 1000/60 ≈ 16.7 increments per step
    const STEP = SLIDER_MAX / 600;
    let v = Number(slider.value) + STEP;
    if (v > SLIDER_MAX) {
        v = SLIDER_MAX;
        timelinePlaying = false;
        document.getElementById('tl-play').textContent = '▶';
    }
    slider.value = v;
    onScrub(v);
    if (timelinePlaying) setTimeout(playStep, 60);
}

// Public alias retained for setView() reapplication after view switch
let currentCutoff = null;

function applyCutoff(cutoffMs) {
    // Backward-compat: callers may pass null to clear or an ISO string from old code paths
    if (typeof cutoffMs === 'string') cutoffMs = new Date(cutoffMs).getTime();
    currentCutoffMs = cutoffMs;
    currentCutoff = cutoffMs;
    const wasMs = prevCutoffMs;
    prevCutoffMs = cutoffMs;

    document.getElementById('timeline-date').textContent = fmtCutoff(cutoffMs);

    // Graph SVG: nodes + labels + edges
    const svg = document.querySelector('svg');
    svg.querySelectorAll('#nodes > *').forEach(el => {
        const n = nodes[parseInt(el.dataset.idx, 10)];
        if (!n) return;
        decorateForCutoff(el, _nodeDate(n.id), cutoffMs, wasMs);
    });
    svg.querySelectorAll('#labels text').forEach(t => {
        const n = nodes[parseInt(t.dataset.idx, 10)];
        if (!n) return;
        const created = _nodeDate(n.id);
        const cMs = created ? new Date(created).getTime() : null;
        const hidden = cutoffMs && cMs && cMs > cutoffMs;
        t.classList.toggle('node-hidden', !!hidden);
    });
    svg.querySelectorAll('#edges line').forEach((line, i) => {
        const e = edges[i];
        if (!e) return;
        const sMs = (d => d && new Date(d).getTime())(_nodeDate(e.source));
        const tMs = (d => d && new Date(d).getTime())(_nodeDate(e.target));
        const hidden = cutoffMs && ((sMs && sMs > cutoffMs) || (tMs && tMs > cutoffMs));
        line.classList.toggle('node-hidden', !!hidden);
    });

    // Tree + Pyramid + Dictionary: any element with data-created
    document.querySelectorAll('[data-created]').forEach(el => {
        const created = el.dataset.created;
        decorateForCutoff(el, created, cutoffMs, wasMs);
    });

    // Connected-pyramid edges: dim by cutoff too
    document.querySelectorAll('.cpyr-edge').forEach(p => {
        const sMs = (d => d && new Date(d).getTime())(_nodeDate(p.dataset.source));
        const tMs = (d => d && new Date(d).getTime())(_nodeDate(p.dataset.target));
        const hidden = cutoffMs && ((sMs && sMs > cutoffMs) || (tMs && tMs > cutoffMs));
        p.classList.toggle('node-hidden', !!hidden);
    });

    updateBirthLogStates(cutoffMs, wasMs);
}

function decorateForCutoff(el, createdIso, cutoffMs, prevMs) {
    if (!cutoffMs || !createdIso) {
        el.classList.remove('node-hidden', 'node-fresh');
        return;
    }
    const cMs = new Date(createdIso).getTime();
    const hidden = cMs > cutoffMs;
    el.classList.toggle('node-hidden', hidden);
    // Growing-dot: fired when a node crosses from hidden → visible on this scrub step
    if (!hidden && prevMs !== null && cMs > prevMs && cMs <= cutoffMs) {
        el.classList.remove('node-fresh');
        void el.offsetWidth;       // force reflow so the animation restarts
        el.classList.add('node-fresh');
    } else if (hidden) {
        el.classList.remove('node-fresh');
    }
}

// ── Birth log side panel ───────────────────────────────────────────────
let birthLogOpen = false;

function toggleBirthLog() {
    birthLogOpen = !birthLogOpen;
    const log = document.getElementById('birth-log');
    log.classList.toggle('open', birthLogOpen);
    document.getElementById('tl-log').classList.toggle('on', birthLogOpen);
    if (birthLogOpen) renderBirthLog();
}

function renderBirthLog() {
    const host = document.getElementById('birth-log');
    if (!host || !timelineData || !timelineData.nodes) {
        host.innerHTML = '<div style="color:#666;padding:20px">No timeline data.</div>';
        return;
    }
    // Build items from timeline; pull labels/types from main `nodes` array
    const nodeMap = new Map(nodes.map(n => [n.id, n]));
    const items = Object.keys(timelineData.nodes).map(id => {
        const date = _nodeDate(id);
        const message = _nodeMsg(id);
        const node = nodeMap.get(id);
        const type = node ? node.type : (id.split(':')[0] || '');
        const label = node ? node.label : id.replace(/^[^:]+:/, '');
        return { id, date, message, type, label };
    }).filter(it => it.date && it.type !== 'event' && it.type !== 'data')
      .sort((a, b) => b.date.localeCompare(a.date));   // newest first

    let html = `<div id="birth-log-head">
        <h3>Birth log</h3>
        <span style="color:#555;font-size:10px">${items.length}</span>
        <span class="close" onclick="toggleBirthLog()">✕</span>
    </div>`;
    html += `<div id="birth-log-marker">▶ now: <span id="bl-now">—</span></div>`;

    for (const it of items) {
        const c = COLORS[it.type] || '#666';
        const dt = it.date;
        const dateStr = dt.slice(0, 10);
        html += `<div class="bl-item" data-id="${esc(it.id)}" data-created="${esc(dt)}">
            <div class="bl-item-row">
                <span class="bl-item-date">${esc(dateStr)}</span>
                <span class="bl-item-label" onclick="locateOrInfo('${esc(it.id)}')">+ ${esc(it.label)}</span>
                <span class="bl-item-type" style="background:${c}33;color:${c}">${esc(it.type)}</span>
            </div>
            ${it.message ? `<div class="bl-item-msg">${esc(it.message)}</div>` : ''}
        </div>`;
    }
    host.innerHTML = html;
    updateBirthLogStates(currentCutoffMs, prevCutoffMs);
}

function updateBirthLogStates(cutoffMs, wasMs) {
    const host = document.getElementById('birth-log');
    if (!host || !host.classList.contains('open')) return;
    const nowEl = document.getElementById('bl-now');
    if (nowEl) nowEl.textContent = cutoffMs ? fmtCutoff(cutoffMs) : 'all';

    let firstFresh = null;
    host.querySelectorAll('.bl-item').forEach(el => {
        const created = el.dataset.created;
        if (!created) return;
        const cMs = new Date(created).getTime();
        const future = cutoffMs && cMs > cutoffMs;
        el.classList.toggle('future', !!future);
        const justAppeared = !future && wasMs && cMs > wasMs && cMs <= cutoffMs;
        if (justAppeared) {
            el.classList.remove('fresh');
            void el.offsetWidth;
            el.classList.add('fresh');
            if (!firstFresh) firstFresh = el;
        } else {
            // Don't strip 'fresh' on every cutoff change — animation will end on its own
        }
    });
    if (firstFresh) firstFresh.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// Auto-close the birth log when the timeline turns off — it's only useful
// while scrubbing. The Log button still works as a manual toggle either way.
const _origToggleTimeline = toggleTimeline;
toggleTimeline = function() {
    const wasActive = timelineActive;
    _origToggleTimeline();
    if (wasActive && !timelineActive && birthLogOpen) {
        toggleBirthLog();
    }
};

async function loadTimeline() {
    try {
        const r = await fetch('/api/topology/timeline');
        timelineData = await r.json();
        if (!timelineData || !timelineData.min_date) return;
        minDateMs = new Date(timelineData.min_date).getTime();
        maxDateMs = new Date(timelineData.max_date).getTime();
        document.getElementById('tl-min').textContent = fmtRange(timelineData.min_date);
        document.getElementById('tl-max').textContent = fmtRange(timelineData.max_date);
        document.getElementById('timeline-date').textContent = fmtCutoff(maxDateMs);
    } catch (e) { /* timeline unavailable — bar stays disabled */ }
    // Releases load independently — failure here doesn't break the timeline
    try {
        const r = await fetch('/api/topology/releases');
        const data = await r.json();
        renderReleaseMarks(data.releases || []);
        if (!window._relResizeBound) {
            window.addEventListener('resize', () => renderReleaseMarks(data.releases || []));
            window._relResizeBound = true;
            window._releases = data.releases || [];
        }
    } catch (e) { /* no releases */ }
}

function renderReleaseMarks(releases) {
    const wrap = document.getElementById('release-marks');
    if (!wrap || !maxDateMs) return;
    wrap.innerHTML = '';
    const range = maxDateMs - minDateMs;
    if (range <= 0) return;
    const wrapW = wrap.clientWidth || 800;
    // Sort + dedupe by tag
    const sorted = [...releases].sort((a, b) => new Date(a.date) - new Date(b.date));
    let lastLabelLeft = -Infinity;
    sorted.forEach(rel => {
        const ms = new Date(rel.date).getTime();
        if (isNaN(ms) || ms < minDateMs || ms > maxDateMs) return;
        const pct = (ms - minDateMs) / range;
        const leftPx = pct * wrapW;
        // Tick
        const tick = document.createElement('div');
        const m = rel.tag.match(/^v?(\d+)\.(\d+)\.(\d+)/);
        const isMinor = m && m[3] === '0';
        const isMajor = m && m[2] === '0' && m[3] === '0';
        tick.className = 'release-tick' + (isMajor ? ' major' : '');
        tick.style.left = (pct * 100).toFixed(3) + '%';
        tick.title = `${rel.tag}\n${rel.date.slice(0, 10)}\n${rel.message || ''}`;
        tick.addEventListener('click', () => {
            const slider = document.getElementById('timeline-slider');
            if (!timelineActive) toggleTimeline();
            const v = ((ms - minDateMs) / range) * SLIDER_MAX;
            slider.value = v;
            onScrub(v);
        });
        wrap.appendChild(tick);
        // Label minor + major bumps that are spaced enough
        if (isMinor && (leftPx - lastLabelLeft > 44)) {
            const lbl = document.createElement('div');
            lbl.className = 'release-label' + (isMajor ? ' major' : '');
            lbl.style.left = (pct * 100).toFixed(3) + '%';
            lbl.textContent = rel.tag;
            wrap.appendChild(lbl);
            lastLabelLeft = leftPx;
        }
    });
}

// ── Boot: cache layersData inside renderAnalysis flow, restore view mode ──
const _origRenderAnalysis = renderAnalysis;
renderAnalysis = function(analysis, integrity) {
    layersData = analysis;
    return _origRenderAnalysis(analysis, integrity);
};

async function bootViews() {
    await load();
    await loadTimeline();
    const saved = localStorage.getItem('eos.topology.view') || 'graph';
    setView(saved);
}
bootViews();
</script>
