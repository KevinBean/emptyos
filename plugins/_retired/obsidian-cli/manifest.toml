[plugin]
id = "obsidian-cli"
name = "Obsidian CLI"
version = "1.0.0"
description = "Optional enhancer — wraps Obsidian desktop CLI for graph-aware search, backlinks, tags, orphans. Gracefully degrades when Obsidian is not running."

[plugin.entry]
module = "plugin"
class = "ObsidianCLIPlugin"

[provides]
services = ["obsidian-cli"]
tags = ["search", "vault", "optional"]

[platforms]
supports = ["laptop"]
