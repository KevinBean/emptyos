services:
  chatbot:
    build: .
    container_name: emptyos-chatbot
    restart: unless-stopped
    ports:
      - "127.0.0.1:9100:8000"
    env_file: .env
    volumes:
      - chatbot-data:/data
      - ./sites.toml:/app/sites.toml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  chatbot-data:
