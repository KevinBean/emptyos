# docker-compose.demo.yml — public demo deployment for EmptyOS
#
# Hardened for public-internet exposure:
#   - Read-only root filesystem (writable paths bind-mounted explicitly)
#   - All Linux capabilities dropped except those needed
#   - no-new-privileges set so an exploit can't gain extra rights via setuid
#   - CPU + memory caps so one container can't OOM the host
#   - Ollama not exposed on the host network — only reachable from emptyos-demo
#   - Restart on failure but with backoff to dampen crash-loops
#
# Differences from docker-compose.yml:
#   - Mounts demo/vault (curated sample content, no personal data)
#   - Uses demo/emptyos.toml (mode=public, demo.enabled=true, cloud.consent=always)
#   - Runs an Ollama sidecar with a small CPU-friendly model (qwen2.5:1.5b)
#   - Auth token is required — set EOS_NETWORK_AUTH_TOKEN in .env.demo
#
# First-time setup:
#   python scripts/demo-setup.py --output ./demo/vault --force
#   echo "EOS_NETWORK_AUTH_TOKEN=$(python -c 'import secrets;print(secrets.token_urlsafe(32))')" > .env.demo
#   docker compose -f docker-compose.demo.yml --env-file .env.demo up -d
#   docker exec emptyos-demo-ollama ollama pull qwen2.5:1.5b
#
# RAM note: a 4GB VPS (Hetzner CX22/CX23) needs ~4GB swap added first.
#   fallocate -l 4G /swapfile && chmod 600 /swapfile && mkswap /swapfile && swapon /swapfile
#   echo '/swapfile none swap sw 0 0' >> /etc/fstab

services:
  emptyos-demo:
    build: .
    image: emptyos:latest
    container_name: emptyos-demo
    restart: unless-stopped

    # Resource caps — one container can't starve the host. Numbers tuned
    # for a 4GB / 2-vCPU VPS with the daemon + UI.
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1500M
        reservations:
          memory: 256M

    # Hardening
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN              # uvicorn drops privs at start
      - SETUID
      - SETGID
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /var/tmp:size=16m,mode=1777
      - /root/.cache:size=64m

    ports:
      - "127.0.0.1:9000:9000"   # bind to loopback only — Caddy reverse-proxies
                                # external traffic. Even if ufw is misconfigured,
                                # 9000 is unreachable from the public internet.
    volumes:
      - ./demo/vault:/vault
      - ./demo/emptyos.toml:/app/emptyos.toml:ro
      - emptyos-demo-data:/app/data
    environment:
      - EOS_NETWORK_AUTH_TOKEN=${EOS_NETWORK_AUTH_TOKEN:?set EOS_NETWORK_AUTH_TOKEN in .env.demo}
      # Visitor-facing password — shown on /login when demo.enabled is true.
      # Override here to keep deploy-config layer authoritative; defaults to
      # the literal "demo" baked into demo/emptyos.toml if unset.
      - EOS_NETWORK_PASSWORD=${EOS_NETWORK_PASSWORD:-demo}
      - EOS_DEMO_ENABLED=true
      # Per-IP rate limit (requests per 10s window). 0 disables.
      - EOS_RATE_LIMIT_PER_10S=60
    depends_on:
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  ollama:
    image: ollama/ollama:latest
    container_name: emptyos-demo-ollama
    restart: unless-stopped

    # Resource caps for Ollama. qwen2.5:1.5b uses ~1.5-2GB at runtime.
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2200M

    # Hardening — Ollama needs a writable model dir (volume) but nothing else
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    volumes:
      - ollama-models:/root/.ollama
    # No port exposure — only emptyos-demo talks to ollama over the compose network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  emptyos-demo-data:
  ollama-models:
