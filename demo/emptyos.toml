# EmptyOS — demo instance config
#
# This config powers the public live demo. Designed for $0/month AI cost:
# every visitor gets a working local model (slow but free); strangers who
# want quality paste their own OpenAI key in Settings (BYOK, session-scoped).
#
# Deploy with: docker compose -f docker-compose.demo.yml up -d

[os]
name = "EmptyOS Demo"
data_dir = "/app/data"
log_level = "INFO"

[notes]
path = "/vault"
watch = true

# --- Deployment: public mode ---
# auth_token is injected via env (EOS_NETWORK_AUTH_TOKEN) at deploy time so it
# doesn't live in the repo. The token is *public* for a demo — it's how
# visitors prove "I read your README first" and deters anonymous bot scraping,
# not a real secret. Pre-fill it in your landing-page link:
#   https://demo.<yourdomain>/?token=<EOS_NETWORK_AUTH_TOKEN>
[network]
mode = "public"
port = 9000

# --- Demo mode ---
# Banner, GPU capabilities disabled, BYOK panel surfaced in Settings.
[demo]
enabled = true
reset_on_restart = true
seed_on_boot = true

# Apps that genuinely can't work in a CPU-only public demo (no mic, no camera,
# no GPU, no separate voice-api service). The kernel filters these out at load
# time — they're invisible to nav and routing. Strangers see only what works.
hide_apps = [
    "hands-free",        # continuous-speech voice workflow — Web Speech API one-shot
                         # mode isn't a great fit; revisit when streaming STT lands
    "music-studio",      # personal-tier ComfyUI gen — not in repo at all
]
# Note from v0.2.12 onward, voice-assistant + gesture are both available:
#   - listen   uses browser-speech (Web Speech API in the visitor's browser)
#   - see      uses browser-webcam (getUserMedia in the visitor's browser)
#   - speak    uses edge-tts (free Microsoft voices, in-process)
# All three need only the visitor's device — no whisper, no voice-api, no GPU.

# --- Cloud consent ---
# Pre-approved: visitors opt in by entering their own key (BYOK) at runtime.
# The key is session-scoped (browser localStorage), never persisted server-side.
# DO NOT copy this setting into a real personal instance — there it should
# stay "ask" so every cloud call surfaces a consent prompt.
[cloud]
consent = "always"

# --- Think capability ---
# Local Ollama (phi3:mini, ~3.8B params) is the default. Costs zero, runs on
# the demo VPS's CPU, ~2-4s per response, output quality is "OK for proving
# the system works". Visitors who want gpt-4-class quality paste their own
# OpenAI/Anthropic key via the demo Settings panel — that key is sent
# directly from their browser, never touches your server.
#
# Intentionally only `ollama` here. We do NOT list `openai` as a server-side
# provider because we don't ship an OpenAI key in the demo image; if you
# want server-side cloud as a fallback, add it explicitly + cap the spend
# via [billing.budgets.openai] below.
[capabilities.think]
providers = ["ollama"]

# --- Listen capability — browser-side STT via Web Speech API ---
# No API key, no whisper service. The visitor's browser captures speech
# (Chrome/Edge/Safari support it) and POSTs the transcript over the
# realtime WebSocket. The mic is on the visitor's device, not the server.
[capabilities.listen]
providers = ["browser-speech"]

[capabilities.listen.browser-speech]
language = "en-US"
timeout = 30

# --- Speak capability — edge-tts (free Microsoft voices) ---
# Pure-Python in-process TTS. No API key, no GPU.
[capabilities.speak]
providers = ["edge-tts"]

# --- See capability — browser-side webcam snapshot via getUserMedia ---
# Returns a base64 JPEG data URL. Apps that need raw bytes use
# emptyos.sdk.utils.parse_data_url.
[capabilities.see]
providers = ["browser-webcam"]

[capabilities.see.browser-webcam]
timeout = 30

[capabilities.think.ollama]
host = "http://ollama:11434"
# qwen2.5:1.5b — ~1GB on disk, ~2GB RAM at runtime. Fits a 4GB VPS once
# you've added 4GB swap (see docker-compose.demo.yml header).
# Why not qwen2.5:0.5b? At 500M params it can hold a conversation but
# can't reliably emit the [INTENT:app.verb(...)] tokens the voice-assistant
# uses for tool-calling — visitors get "I can't help with that" replies for
# anything that needs an app integration. 1.5b is the sweet spot for CPU
# inference + tool use.
# Why not phi3:mini or qwen2.5:7b? OOM-killed on a 4GB VPS even with swap.
# Visitors who want gpt-4-class quality paste their own OpenAI key
# (Settings → Demo → BYOK) — the key stays browser-side, never touches
# the server.
model = "qwen2.5:1.5b"

# Same host for the plugin-side health check (so the boot log shows
# "Connected to http://ollama:11434" instead of warning about localhost).
[plugins.ollama]
host = "http://ollama:11434"

# --- Spend cap (defense in depth) ---
# Even with BYOK as the primary path, set a hard monthly budget on every
# cloud provider so a misconfigured deployment can't surprise you with a
# big bill. apps/billing/ enforces these by disabling the provider once
# tripped. Numbers below are conservative — raise if you knowingly fund
# the demo's AI from your own pocket.
[billing.budgets]
openai = 5      # USD/month
anthropic = 5   # USD/month
ollama = 0      # local — billed at $0 by definition

[scheduler]
enabled = true
timezone = "UTC"

[plugins]
path = "./plugins"

[apps]
path = "./apps"
