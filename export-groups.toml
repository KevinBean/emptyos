# Export groups — named bundles of apps that ship together.
#
# `eos export-group <id>` produces a single directory / zip / single-html
# bundle containing every listed app. Bundled apps call each other via the
# in-page call_app RPC registry (see emptyos/web/static/eos-export-shim.js).
# Apps NOT in the group gracefully degrade: call_app returns
# {offline:true, unavailable:true}.
#
# Members MUST declare [provides.export].enabled = true in their manifests.
# The group builder warns at build time on disabled members or on declared
# requires.apps that aren't in the group (so graceful degradation is visible).

[[group]]
id = "work-os"
name = "EmptyOS Work OS"
description = "Projects + boards + tasks + people — a self-contained project-management bundle."
apps = ["projects", "task", "boards", "people", "quick-action"]
entry = "projects"
fallbacks = [
    "vault:indexeddb",
    "think:byok-openai",
    "events:local-bus",
    "call_app:bundled",
    "viewer:none",
]

[[group]]
id = "personal-core"
name = "Personal Core"
description = "Journal + capture + task. The daily-loop essentials."
apps = ["journal", "quick-action", "task"]
entry = "journal"
fallbacks = ["vault:indexeddb", "events:local-bus", "call_app:bundled", "viewer:none"]

[[group]]
id = "assistive"
name = "Assistive"
description = "Assistant + search. Conversational layer over your vault."
apps = ["assistant", "search"]
entry = "assistant"
fallbacks = ["vault:indexeddb", "think:byok-openai", "events:local-bus", "call_app:bundled", "viewer:none"]
