[app]
id = "reactor"
name = "Reactor"
version = "1.0.0"
description = "Event chain reactions — the system's metabolism"

[app.entry]
module = "app"
class = "ReactorApp"

[requires]
capabilities = ["think"]
apps = ["journal"]
# briefing + expense are listened-for emitters, not callees. Reactor is purely
# event-driven — when those apps aren't installed, their events simply don't
# fire and the matching reactors stay quiet. Don't list them here as required.

[provides.cli]
commands = ["reactor"]

[provides.web]
prefix = "/reactor"

[provides.events]
emits = []
listens = [
    "vault:changed", "expense:added", "task:completed", "task:added", "task:reopened", "journal:entry", "journal:created",
    "healing:mood-logged",
    "speaking:session_ended", "speaking:session_started", "shadowing:perfect", "shadowing:attempt",
    "reader:highlight_added", "reader:review_completed", "nutrition:logged", "focus:completed",
    "meditation:completed", "capture:saved", "contacts:logged",
    "music:composed", "podcast:generated", "studio:generated",
    "note:created", "note:updated", "items:added", "items:updated",
    "dictionary:word_saved", "dictionary:word_reviewed",
    "speak-sharper:analyzed", "speak-sharper:pattern_detected", "voice-review:analyzed",
    "lesson:generated",
    "projects:task_toggled", "projects:status_changed", "projects:created", "projects:task_added",
