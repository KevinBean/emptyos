[app]
id = "app-gen"
name = "App Generator"
version = "1.1.0"
description = "Generate apps and plugins — the system grows itself"
dimensions = ["occupational"]

[app.entry]
module = "app"
class = "AppGenApp"

[requires]
capabilities = ["think"]

[provides.cli]
commands = ["new-app", "new-plugin"]

[provides.web]
prefix = "/app-gen"

[provides.events]
emits = ["app-gen:created", "plugin-gen:created"]
