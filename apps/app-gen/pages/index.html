<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>App Generator - EmptyOS</title>
<link rel="stylesheet" href="/static/theme.css">
<link rel="stylesheet" href="/static/eos-components.css">
<style>
* { margin:0; padding:0; box-sizing:border-box }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 80px); -webkit-font-smoothing:antialiased }

/* Use shared .eos-mode-bar / .eos-mode-btn / .eos-panel from eos-components.css. */
.eos-mode-bar { margin-bottom:16px }

.gen-form { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:24px; animation:fadeDown 0.4s ease }
.gen-label { font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px }
.gen-input { width:100%; padding:12px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; outline:none; resize:none; font-family:inherit; transition:border 0.2s }
.gen-input:focus { border-color:var(--accent) }
textarea.gen-input { min-height:100px }
.gen-row { display:flex; gap:12px; margin-top:12px }
.gen-btn { width:100%; padding:16px; margin-top:16px; background:var(--accent); color: var(--accent-ink); border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; transition:opacity 0.15s }
.gen-btn:active { opacity:0.8 }
.gen-btn:disabled { opacity:0.4; cursor:not-allowed }
.gen-btn.secondary { background:transparent; border:1px solid var(--border); color:var(--text) }

.result-card { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:24px; animation:cardIn 0.35s ease }
.result-title { font-size:16px; font-weight:600; margin-bottom:8px; color:var(--accent) }
.result-files { font-size:13px; color:var(--text-secondary) }
.result-file { padding:8px 0; font-family:monospace; font-size:12px; color:var(--text-muted) }
.result-box { margin-top:16px; padding:16px; background:var(--bg); border:1px solid var(--border); border-radius:8px; white-space:pre-wrap; font-family:monospace; font-size:12px; max-height:400px; overflow:auto }

.cap-chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px }
.cap-chip { padding:4px 12px; border-radius:999px; border:1px solid var(--border); background:var(--bg); color:var(--text-secondary); font-size:11px; cursor:pointer; transition:all 0.15s }
.cap-chip.selected { border-color:var(--accent); color:var(--accent); background:color-mix(in srgb,var(--accent) 10%,transparent) }

.plugin-list { display:grid; gap:8px; margin-top:16px }
.plugin-card { padding:12px 16px; background:var(--bg-card); border:1px solid var(--border); border-radius:6px }
.plugin-card h3 { font-size:14px; margin-bottom:4px }
.plugin-card p { font-size:12px; color:var(--text-secondary) }

.hidden { display:none }
.spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.6s linear infinite; margin-right:8px; vertical-align:middle }
@keyframes spin { to { transform:rotate(360deg) } }
</style>
</head>
<body>
<script src="/static/realtime.js"></script>
<script src="/static/eos.js"></script>
<script src="/static/eos-components.js"></script>
<script>EOS.nav('app-gen');
if(window.EOS&&EOS.registerActions){EOS.registerActions({},[],{description:"Generate new apps from descriptions, and plugins from external service APIs — the system grows itself.",quickActions:[{label:"What app next?",msg:"Based on my recent captures and projects, what app would be most useful to generate next?"},{label:"Refine idea",msg:"I have an app idea. Help me refine it into a clear one-paragraph description for generation."},{label:"Which service?",msg:"Help me pick an external service worth turning into a plugin right now."}]});}
</script>

<div class="page">

  <div class="eos-mode-bar">
    <button class="eos-mode-btn active" data-mode="app" onclick="setMode('app')">New App</button>
    <button class="eos-mode-btn" data-mode="plugin" onclick="setMode('plugin')">New Plugin</button>
  </div>

  <!-- ══════════════════ App panel ══════════════════ -->
  <div class="eos-panel active" id="panel-app">
    <div class="gen-form">
      <div class="gen-label">App Description</div>
      <textarea class="gen-input" id="a-description" placeholder="Describe the app you want to create...&#10;e.g. 'A habit tracker that logs daily habits, shows streaks, and uses AI to suggest new habits'"></textarea>

      <div class="gen-label" style="margin-top:14px">Capabilities</div>
      <div class="cap-chips" id="caps">
        <div class="cap-chip selected" data-cap="think" onclick="toggleCap(this)">think</div>
        <div class="cap-chip selected" data-cap="read" onclick="toggleCap(this)">read</div>
        <div class="cap-chip selected" data-cap="write" onclick="toggleCap(this)">write</div>
        <div class="cap-chip" data-cap="search" onclick="toggleCap(this)">search</div>
        <div class="cap-chip" data-cap="speak" onclick="toggleCap(this)">speak</div>
        <div class="cap-chip" data-cap="listen" onclick="toggleCap(this)">listen</div>
        <div class="cap-chip" data-cap="draw" onclick="toggleCap(this)">draw</div>
      </div>

      <button class="gen-btn" id="a-gen-btn" onclick="generateApp()">Generate App</button>
    </div>
    <div id="a-result" class="result-card hidden"></div>
  </div>

  <!-- ══════════════════ Plugin panel ══════════════════ -->
  <div class="eos-panel" id="panel-plugin">
    <div class="gen-form">
      <div class="gen-label">Service URL</div>
      <input class="gen-input" id="p-url" placeholder="http://localhost:7700">

      <div class="gen-label" style="margin-top:14px">Plugin Name</div>
      <input class="gen-input" id="p-name" placeholder="fiction-engine">

      <div class="gen-row">
        <button class="gen-btn secondary" id="p-probe-btn" style="margin-top:0" onclick="probePlugin()">Probe</button>
        <button class="gen-btn" id="p-gen-btn" style="margin-top:0" onclick="generatePlugin()">Generate Plugin</button>
      </div>
    </div>

    <div id="p-probe-result" class="result-box hidden"></div>
    <div id="p-gen-result" class="result-box hidden"></div>

    <div style="margin-top:20px">
      <div class="gen-label">Existing Plugins <button class="cap-chip" onclick="loadPlugins()" style="margin-left:6px">Refresh</button></div>
      <div id="plugin-list" class="plugin-list"></div>
    </div>
  </div>

</div>

<script>
function setMode(m) {
  document.querySelectorAll('.eos-mode-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.mode === m);
  });
  ['app','plugin'].forEach(function(p) {
    var el = document.getElementById('panel-' + p);
    if (el) el.classList.toggle('active', p === m);
  });
  if (m === 'plugin') loadPlugins();
}

function toggleCap(el) { el.classList.toggle('selected'); }
function getSelectedCaps() {
  return [].slice.call(document.querySelectorAll('.cap-chip.selected')).map(function(c){return c.dataset.cap});
}

async function generateApp() {
  var desc = document.getElementById('a-description').value.trim();
  if (!desc) { EOS_UI.toast('Enter a description'); return; }
  var btn = document.getElementById('a-gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Generating...';
  try {
    var result = await EOS.post('/app-gen/api/generate', { description: desc, capabilities: getSelectedCaps() });
    if (result.error) { EOS_UI.toast(result.error, 'error'); return; }
    var el = document.getElementById('a-result');
    el.classList.remove('hidden');
    var appId = result.app_id || result.id || 'new-app';
    el.innerHTML = '<div class="result-title">' + appId + ' created</div>'
      + '<div class="result-files">'
      + '<div class="result-file">apps/' + appId + '/manifest.toml</div>'
      + '<div class="result-file">apps/' + appId + '/app.py</div>'
      + '</div>'
      + '<p style="margin-top:12px;font-size:13px;color:var(--text-secondary)">Restart the server to load the new app.</p>';
    EOS_UI.toast('App generated!');
  } catch (e) {
    EOS_UI.toast('Generation failed', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate App';
  }
}

async function probePlugin() {
  var url = document.getElementById('p-url').value.trim();
  if (!url) { EOS_UI.toast('Enter a service URL'); return; }
  var box = document.getElementById('p-probe-result');
  box.classList.remove('hidden');
  box.textContent = 'Probing...';
  try {
    var data = await EOS.post('/app-gen/api/plugin/probe', { url: url });
    box.textContent = JSON.stringify(data, null, 2);
  } catch (e) {
    box.textContent = 'Probe failed: ' + e.message;
  }
}

async function generatePlugin() {
  var url = document.getElementById('p-url').value.trim();
  var name = document.getElementById('p-name').value.trim();
  if (!url || !name) { EOS_UI.toast('URL and name required'); return; }
  var btn = document.getElementById('p-gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Generating...';
  var box = document.getElementById('p-gen-result');
  box.classList.remove('hidden');
  box.textContent = 'Generating plugin...';
  try {
    var data = await EOS.post('/app-gen/api/plugin/generate', { url: url, name: name });
    box.textContent = JSON.stringify(data, null, 2);
    if (!data.error) { EOS_UI.toast('Plugin generated — restart to load'); loadPlugins(); }
  } catch (e) {
    box.textContent = 'Generation failed: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate Plugin';
  }
}

async function loadPlugins() {
  try {
    var data = await EOS.get('/app-gen/api/plugins');
    var list = Array.isArray(data) ? data : (data.plugins || []);
    document.getElementById('plugin-list').innerHTML = list.length
      ? list.map(function(p) {
          return '<div class="plugin-card"><h3>' + esc(p.id || p.name) + '</h3><p>'
            + esc((p.services || []).join(', ') || p.description || '') + '</p></div>';
        }).join('')
      : '<p style="color:var(--text-secondary);font-size:12px">No plugins loaded</p>';
  } catch (e) {
    document.getElementById('plugin-list').innerHTML = '<p style="color:var(--text-secondary);font-size:12px">Failed to load plugins</p>';
  }
}

function esc(s) { var d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
</script>
</body>
</html>
