[app]
id = "dictionary"
name = "Dictionary"
version = "2.0.0"
description = "Word lookup, vault storage, SRS flashcards, quizzes"
dimensions = ["intellectual"]

[app.entry]
module = "app"
class = "DictionaryApp"

[requires]
capabilities = ["think", "read", "write", "search", "speak"]
connectors = []
services = []

[provides.cli]
commands = ["dict"]

[provides.web]
prefix = "/dictionary"

[provides.events]
emits = ["dictionary:word_saved", "dictionary:word_reviewed"]

[provides.settings]
schema = [
    {key = "dictionary.srs_new_per_day", label = "New SRS Words/Day", type = "number", default = 5},
    {key = "dictionary.quiz_count", label = "Quiz Questions", type = "number", default = 5},
]

[provides.assistant]
commands = [
    {slash = "/dict", method = "lookup", arg = "word"},
]
