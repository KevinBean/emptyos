[app]
id = "web-analytics"
name = "Web Analytics"
version = "0.1.0"
description = "Privacy-first pageview analytics for published sites — no cookies, no fingerprinting, data stays local"
dimensions = ["occupational"]

[app.entry]
module = "app"
class = "WebAnalyticsApp"

[provides.cli]
commands = ["web-analytics"]

[provides.web]
prefix = "/web-analytics"

[provides.events]
emits = ["web-analytics:hit"]

[provides.settings]
schema = [
    {key = "web-analytics.enabled", label = "Enable analytics collector", type = "boolean", default = true, hint = "Accept beacon hits from published sites"},
    {key = "web-analytics.collector_url", label = "Public collector URL", type = "text", default = "http://localhost:9000/web-analytics/api/collect", hint = "Where published sites POST their beacons. Override with your Cloudflare Worker or tunnel URL."},
    {key = "web-analytics.retention_days", label = "Retention (days)", type = "number", default = 365, hint = "Delete hits older than this"},
    {key = "web-analytics.drop_local", label = "Drop localhost hits", type = "boolean", default = true, hint = "Ignore beacons from 127.0.0.1 / localhost (avoid self-noise during preview)"},
    {key = "web-analytics.excluded_ips", label = "Excluded IPs / CIDR ranges", type = "textarea", default = "", hint = "Comma- or newline-separated list. e.g. '1.2.3.4, 10.0.0.0/8'. Hits from matching addresses are dropped."},
]

[requires]
capabilities = []
