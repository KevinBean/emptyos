[app]
id = "run"
name = "Command Runner"
version = "1.0.0"
description = "Execute shell commands and scripts"
dimensions = ["occupational"]

[app.entry]
module = "app"
class = "RunApp"

[provides.cli]
commands = ["run"]

[provides.web]
prefix = "/run"

[provides.events]
emits = ["run:completed"]

[requires]
capabilities = ["think"]
services = []
events = []
