[app]
id = "music-library"
name = "Music Library"
version = "1.0.0"
description = "Browse, play, and edit songs in your vault. Generate AI lyrics. No GPU required — pure vault + LLM."
dimensions = ["intellectual"]

[app.entry]
module = "app"
class = "MusicLibraryApp"

[requires]
capabilities = ["read", "write", "search", "think"]

[provides.web]
prefix = "/music-library"

[provides.cli]
commands = ["music", "lyrics"]

[provides.events]
emits = ["music:updated", "music:lyrics_created"]
listens = []

[provides.settings]
schema = [
    {key = "music-library.songs_dir", label = "Songs Directory (relative to vault)", type = "text", default = "Music/Songs"},
    {key = "music-library.default_language", label = "Default Lyrics Language", type = "select", options = ["en", "zh", "ja"], default = "en"},
    {key = "music-library.default_style", label = "Default Lyrics Style", type = "text", default = ""},
]

[provides.assistant]
commands = [
    {slash = "/music", method = "list_songs"},
]

[[contributes.tour.step]]
id = "music-library.browse"
group = "core"
priority = 400
route = "/music-library/"
spotlight = ".ml-grid"
title = "Music Library"
body = "Browse vault songs as cards. Click any card for details — tracks with audio show a player. The demo seeds the Zero Bias album (8 tracks, multilingual) plus a handful of curated singles. The <strong>+ Write Lyrics</strong> button drafts AI lyrics if you have a think provider configured."
# No `requires` — browsing works without any AI provider; only the optional
# lyric-write feature needs `think`. Listing it as required would rewrite
# the whole step to /system?capability=think when ollama isn't available,
# breaking the walkthrough on otherwise-fine demos.
