<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Release - EmptyOS</title>
<link rel="stylesheet" href="/static/theme.css">
<link rel="stylesheet" href="/static/eos-components.css">
<style>
.rel-hero { padding:32px 0 8px; animation:fadeDown 0.4s ease }
.rel-hero h1 { font-size:28px; font-weight:700; color:var(--text-heading); margin-bottom:4px }
.rel-hero .desc { font-size:14px; color:var(--text-secondary) }

.version-badge { display:inline-block; font-size:12px; font-weight:600; padding:2px 12px; border-radius:6px; background:var(--accent-bg); color:var(--accent); margin-left:8px; vertical-align:middle }

.checks { display:flex; gap:12px; margin-bottom:24px; animation:fadeDown 0.4s ease 0.05s both }
.check-card { flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:16px; display:flex; align-items:center; gap:12px }
.check-icon { font-size:24px; width:36px; text-align:center }
.check-info .label { font-size:13px; font-weight:600; color:var(--text-heading) }
.check-info .status { font-size:12px; color:var(--text-muted); margin-top:2px }
.check-card.pass { border-color:color-mix(in srgb,var(--success) 30%,transparent) }
.check-card.fail { border-color:color-mix(in srgb,var(--danger) 30%,transparent) }
.check-card.pending { opacity:0.6 }

.btn-check { padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; background:var(--bg-card); color:var(--text); border:1px solid var(--border); transition:all 0.15s; margin-bottom:24px }
.btn-check:hover { border-color:var(--accent); color:var(--accent) }

.tier-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:16px; margin-bottom:24px; animation:fadeDown 0.4s ease 0.1s both }
.tier-card { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:24px; position:relative; transition:border-color 0.2s }
.tier-card:hover { border-color:color-mix(in srgb,var(--accent) 40%,transparent) }
.tier-name { font-size:18px; font-weight:700; color:var(--text-heading); margin-bottom:4px; text-transform:capitalize }
.tier-desc { font-size:13px; color:var(--text-secondary); margin-bottom:16px }
.tier-stats { display:flex; gap:16px; margin-bottom:16px }
.tier-stat .val { font-size:1.3rem; font-weight:700; color:var(--text-heading) }
.tier-stat .lbl { font-size:10px; color:var(--text-muted); text-transform:uppercase }
.btn-package { width:100%; padding:12px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:none; transition:all 0.15s }
.btn-package:active { transform:scale(0.97) }
.btn-package:disabled { opacity:0.4; cursor:not-allowed }
.btn-package.core { background:var(--accent); color:#fff }
.btn-package.standard { background:var(--success); color:#000 }

.packages { animation:fadeDown 0.4s ease 0.15s both }
.packages h2 { font-size:16px; font-weight:600; color:var(--text-heading); margin-bottom:12px }

.log-panel { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-top:16px; font-family:var(--mono); font-size:12px; color:var(--text-secondary); max-height:300px; overflow-y:auto; white-space:pre-wrap; display:none; animation:fadeDown 0.3s ease }
.log-panel.open { display:block }
</style>
</head>
<body>
<div id="eos-page">
<div class="rel-hero">
  <h1>Release <span class="version-badge" id="version">v0.0.0</span></h1>
  <p class="desc">Package EmptyOS for distribution</p>
</div>

<button class="btn-check" onclick="runChecks()">Run Safety Checks</button>

<div class="checks" id="checks">
  <div class="check-card pending" id="check-personal">
    <div class="check-icon">&#9679;</div>
    <div class="check-info">
      <div class="label">Personal Data</div>
      <div class="status">Not checked</div>
    </div>
  </div>
  <div class="check-card pending" id="check-branding">
    <div class="check-icon">&#9679;</div>
    <div class="check-info">
      <div class="label">Branding</div>
      <div class="status">Not checked</div>
    </div>
  </div>
</div>

<div class="tier-grid" id="tiers"></div>

<div class="packages" id="packages-section" style="display:none">
  <h2>Built Packages</h2>
  <div id="packages"></div>
</div>

<div class="log-panel" id="log"></div>
</div>

<script src="/static/eos.js"></script>
<script src="/static/eos-components.js"></script>
<script>EOS.nav('release');
if(window.EOS&&EOS.registerActions){EOS.registerActions({},[],{description:"Package EmptyOS for distribution — safety checks, tier selection, bundling.",quickActions:[{label:"Release notes",msg:"Draft release notes from recent commits and changelog entries."},{label:"Safety check",msg:"Walk me through the release safety checks — what should I verify before packaging?"},{label:"Which tier?",msg:"Help me decide which tier (core, extended, etc.) to package this release as."}]});}
</script>
<script>
const API = '/release/api';
let checksOk = false;

async function init() {
  const r = await fetch(API + '/config');
  const d = await r.json();

  document.getElementById('version').textContent = 'v' + d.version;

  // Render tier cards
  const grid = document.getElementById('tiers');
  grid.innerHTML = '';
  for (const [name, info] of Object.entries(d.tiers || {})) {
    grid.innerHTML += `
      <div class="tier-card">
        <div class="tier-name">${name}</div>
        <div class="tier-desc">${esc(info.description)}</div>
        <div class="tier-stats">
          <div class="tier-stat"><div class="val">${info.apps}</div><div class="lbl">Apps</div></div>
          <div class="tier-stat"><div class="val">${info.plugins}</div><div class="lbl">Plugins</div></div>
          <div class="tier-stat"><div class="val">${info.skills}</div><div class="lbl">Skills</div></div>
        </div>
        <button class="btn-package ${name}" onclick="pkg('${name}')" id="btn-${name}">
          Package ${name}
        </button>
      </div>`;
  }

  // Render existing packages
  if (d.packages && d.packages.length) {
    document.getElementById('packages-section').style.display = '';
    const el = document.getElementById('packages');
    el.innerHTML = d.packages.map(p => EOS_UI.entityCard({
      title: `emptyos-${p.tier}-${p.version}`,
      meta: `${p.file_count} files &middot; ${p.size_mb || '?'} MB`,
      badges: [{label: p.tier, variant: p.tier === 'standard' ? 'status-active' : 'neutral'}],
    })).join('');
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function setCheck(id, ok, msg) {
  const el = document.getElementById(id);
  el.className = 'check-card ' + (ok ? 'pass' : 'fail');
  el.querySelector('.check-icon').innerHTML = ok ? '&#10003;' : '&#10007;';
  el.querySelector('.status').textContent = msg;
}

async function runChecks() {
  // Reset
  ['check-personal', 'check-branding'].forEach(id => {
    const el = document.getElementById(id);
    el.className = 'check-card pending';
    el.querySelector('.check-icon').innerHTML = '&#8987;';
    el.querySelector('.status').textContent = 'Checking...';
  });

  const r = await fetch(API + '/check', { method: 'POST' });
  const d = await r.json();

  for (const c of d.checks) {
    const id = 'check-' + c.name;
    setCheck(id, c.ok, c.ok ? 'Clean' : c.output.split('\n')[0]);
  }
  checksOk = d.all_ok;
}

async function pkg(tier) {
  const btn = document.getElementById('btn-' + tier);
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Packaging...';

  const log = document.getElementById('log');
  log.className = 'log-panel open';
  log.textContent = `Packaging ${tier} tier...\n`;

  try {
    const r = await fetch(API + '/package', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tier }),
    });
    const d = await r.json();

    if (d.error) {
      log.textContent += '\nERROR: ' + d.error + '\n';
      if (d.output) log.textContent += d.output;
    } else {
      log.textContent += d.output + '\n';
      if (d.manifest) {
        log.textContent += `\nDone: ${d.manifest.file_count} files`;
        if (d.manifest.size_mb) log.textContent += `, ${d.manifest.size_mb} MB`;
      }
      // Refresh to show new package
      await init();
    }
  } catch (e) {
    log.textContent += '\nFetch error: ' + e.message;
  }

  btn.disabled = false;
  btn.textContent = orig;
  log.scrollTop = log.scrollHeight;
}

init();
</script>
</body>
</html>
