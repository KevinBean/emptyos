<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rooms - EmptyOS</title>
<link rel="stylesheet" href="/static/theme.css">
<link rel="stylesheet" href="/static/eos-components.css">
<style>
/* Layout: sidebar + chat */
.chat-layout { display:flex; height:calc(100dvh - 64px); margin:-20px; margin-top:0 }

/* Sidebar */
.sidebar { width:260px; border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; background:var(--bg) }
.sidebar-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between }
.sidebar-header h2 { font-size:16px; font-weight:700; color:var(--text-heading) }
.sidebar-search { padding:8px 12px }
.sidebar-search input { width:100%; padding:8px 12px; border-radius:10px; background:var(--bg-card); border:1px solid var(--border); color:var(--text); font-size:13px; outline:none }
.sidebar-search input:focus { border-color:var(--accent) }
.agent-list { flex:1; overflow-y:auto; padding:4px 8px }
.agent-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; cursor:pointer; transition:background 0.15s; margin-bottom:2px }
.agent-item:hover { background:var(--bg-card) }
.agent-item.active { background:var(--accent-bg); border:1px solid color-mix(in srgb,var(--accent) 30%,transparent) }
.agent-avatar { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; color:#fff; flex-shrink:0 }
.agent-preview { flex:1; min-width:0 }
.agent-preview-name { font-size:14px; font-weight:600; color:var(--text-heading); white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.agent-preview-msg { font-size:12px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px }
.tier-badge { font-size:10px; padding:1px 6px; border-radius:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; vertical-align:middle; margin-left:4px }
.tier-badge.system { background:color-mix(in srgb, var(--accent) 15%, transparent); color:var(--accent) }
.tier-badge.user { background:color-mix(in srgb, var(--success) 15%, transparent); color:var(--success) }
.tier-filter { display:flex; gap:4px; padding:4px 12px }
.tier-filter button { flex:1; padding:5px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text-secondary); font-size:11px; cursor:pointer; transition:all 0.15s }
.tier-filter button.active { background:var(--accent-bg); color:var(--accent); border-color:color-mix(in srgb, var(--accent) 30%, transparent) }
.form-section { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:12px; margin-bottom:4px }
.sidebar-footer { padding:10px 12px; border-top:1px solid var(--border) }
.sidebar-footer button { width:100% }

/* Chat panel */
.chat-panel { flex:1; display:flex; flex-direction:column; min-width:0 }
.chat-header { display:flex; align-items:center; gap:12px; padding:12px 20px; border-bottom:1px solid var(--border); flex-shrink:0 }

/* Phase 15 — pinned messages panel */
.pinned-panel { border:1px solid var(--border); border-radius:8px; background:color-mix(in srgb,var(--accent) 4%,var(--bg-card)); padding:10px 12px; margin:0 0 12px 0 }
.pinned-panel-head { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; display:flex; align-items:center; gap:6px }
.pinned-row { display:flex; align-items:flex-start; gap:8px; padding:6px 8px; border-radius:6px; cursor:pointer; transition:background 0.1s; font-size:12px }
.pinned-row:hover { background:var(--bg-hover) }
.pinned-row .pinned-text { flex:1; min-width:0; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; line-height:1.4 }
.pinned-row .pinned-speaker { font-weight:600; font-size:11px; color:var(--text-muted); margin-bottom:2px }
.pinned-row .pinned-unpin { background:transparent; border:0; color:var(--text-muted); cursor:pointer; padding:2px 4px; font-size:14px; line-height:1; flex-shrink:0; opacity:0; transition:opacity 0.1s }
.pinned-row:hover .pinned-unpin { opacity:1 }

/* Per-message hover buttons — pin + speak + reply. Stacked top-right. */
.msg { position:relative }
.msg .msg-pin, .msg .msg-speak, .msg .msg-reply { position:absolute; top:6px; opacity:0; background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:2px 5px; font-size:11px; cursor:pointer; transition:opacity 0.1s; line-height:1 }
.msg .msg-pin { right:6px }
.msg .msg-speak { right:36px }
.msg .msg-reply { right:66px }
.msg:hover .msg-pin, .msg:hover .msg-speak, .msg:hover .msg-reply { opacity:0.7 }
.msg .msg-pin:hover, .msg .msg-speak:hover, .msg .msg-reply:hover { opacity:1 }
.msg.is-pinned .msg-pin { opacity:1; color:var(--accent) }

/* Phase 25 — reply quote rendered above each reply message */
.msg-reply-quote { display:flex; gap:8px; padding:6px 10px; margin-bottom:6px; border-left:3px solid color-mix(in srgb,var(--accent) 50%,var(--border)); background:color-mix(in srgb,var(--accent) 4%,var(--bg-elevated)); border-radius:0 6px 6px 0; cursor:pointer; font-size:12px }
.msg-reply-quote:hover { background:color-mix(in srgb,var(--accent) 7%,var(--bg-elevated)) }
.msg-reply-quote .rq-speaker { font-weight:600; color:var(--text-muted); font-size:11px; flex-shrink:0 }
.msg-reply-quote .rq-text { color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap }

/* Reply-context chip in the input area when composing a reply */
.reply-context { display:none; align-items:center; gap:8px; padding:6px 10px; margin:0 20px 6px 20px; border-left:3px solid var(--accent); background:color-mix(in srgb,var(--accent) 6%,var(--bg-card)); border-radius:0 6px 6px 0; font-size:12px }
.reply-context.open { display:flex }
.reply-context .rc-text { flex:1; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.reply-context button { background:transparent; border:0; color:var(--text-muted); cursor:pointer; font-size:14px; padding:0 4px; line-height:1 }

/* Phase 9 — unread indicator on sidebar items */
.unread-dot { display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px; padding:0 6px; margin-left:6px; border-radius:10px; background:var(--accent); color:var(--accent-ink); font-size:10px; font-weight:700; line-height:1 }
.agent-item.has-unread .agent-preview-name { font-weight:600 }

/* Phase 24 — bulk select on sidebar */
body.bulk-select-on .agent-item { padding-left:10px }
body.bulk-select-on .agent-item::before { content:''; width:18px; height:18px; border:1.5px solid var(--border); border-radius:4px; flex-shrink:0; background:var(--bg); margin-right:6px; transition:background 0.1s,border-color 0.1s }
body.bulk-select-on .agent-item.bulk-selected::before { background:var(--accent); border-color:var(--accent); content:'✓'; color:var(--accent-ink); font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center }
.bulk-action-bar { position:fixed; bottom:20px; left:20px; z-index:10001; display:none; gap:8px; padding:10px 12px; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; box-shadow:0 6px 20px var(--shadow); align-items:center; font-size:13px }
.bulk-action-bar.open { display:flex }
.bulk-action-bar .count { font-weight:600; padding:0 6px; color:var(--text) }

/* Catch-me-up banner — sits at the top of the thread when there are new
   messages since last visit. Auto-removes itself on Summarize or Dismiss. */
.catch-up-banner { display:flex; align-items:center; gap:10px; padding:10px 14px; margin:0 0 10px 0; border:1px solid color-mix(in srgb,var(--accent) 40%,var(--border)); background:color-mix(in srgb,var(--accent) 5%,var(--bg-card)); border-radius:8px; font-size:13px }
.catch-up-banner .cu-text { flex:1 }
.catch-up-banner .cu-summary { display:none; padding:8px 12px; background:var(--bg-elevated); border-radius:6px; font-size:13px; line-height:1.5; margin-top:8px }
.catch-up-banner.expanded { flex-direction:column; align-items:stretch }
.catch-up-banner.expanded .cu-summary { display:block }
.catch-up-banner.expanded .cu-actions { display:none }

/* Group member strip — shows who's in the room, click to insert @mention */
.chat-members { display:flex; gap:6px; flex-wrap:wrap; padding:8px 20px; border-bottom:1px solid var(--border); background:var(--bg); flex-shrink:0; align-items:center }
.chat-members-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-right:4px }
.member-chip { display:inline-flex; align-items:center; gap:6px; padding:3px 9px 3px 3px; border:1px solid var(--border); border-radius:14px; font-size:12px; background:var(--bg-card); transition:background 0.1s }
.member-chip.clickable { cursor:pointer }
.member-chip.clickable:hover { background:var(--bg-hover); border-color:color-mix(in srgb,var(--accent) 40%,var(--border)) }
.member-chip.is-self { color:var(--text-muted); cursor:default }
.member-avatar { width:20px; height:20px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:10px; font-weight:600; color:#fff; flex-shrink:0 }
.member-id { color:var(--text-muted); font-size:10px }

/* Group: avatar next to assistant bubble's speaker label */
.msg-speaker-row { display:flex; align-items:center; gap:6px; margin-bottom:4px }
.msg-speaker-row .member-avatar { width:18px; height:18px; font-size:9px }

/* Group create modal — roster picker */
.group-modal-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:16px; padding-top:12px; border-top:1px solid var(--border) }
.group-modal-bar .group-modal-status { flex:1; min-width:160px; font-size:12px; color:var(--text-muted); line-height:1.4 }
.group-modal-bar .group-modal-status.err { color:#ef4444 }
.group-modal-bar button { flex-shrink:0 }
.roster-section { margin-bottom:14px }
.roster-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; display:flex; align-items:center; gap:6px }
.roster-label .count-pill { background:var(--bg-elevated); border-radius:10px; padding:1px 8px; font-size:10px; letter-spacing:0; text-transform:none; color:var(--text-muted) }
.roster-list { display:grid; grid-template-columns:1fr; gap:6px }
@media (min-width: 540px) { .roster-list.dense { grid-template-columns:1fr 1fr } }
.roster-pick { position:relative; display:flex; align-items:center; gap:10px; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; transition:border-color 0.1s, background 0.1s; background:var(--bg-card) }
.roster-pick:hover { border-color:color-mix(in srgb,var(--accent) 35%,var(--border)); background:var(--bg-hover) }
.roster-pick.checked { border-color:var(--accent); background:color-mix(in srgb,var(--accent) 6%,var(--bg-card)) }
.roster-pick input[type=checkbox] { position:absolute; top:8px; right:8px; cursor:pointer; accent-color:var(--accent) }
.roster-pick .roster-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:13px; color:#fff; flex-shrink:0 }
.roster-pick .roster-meta { flex:1; min-width:0; padding-right:24px }
.roster-pick .roster-name { font-size:13px; font-weight:500; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.roster-pick .roster-sub { font-size:11px; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.roster-cli-config { display:flex; gap:6px; margin-top:10px; padding-left:42px }
.roster-cli-config select { flex:1; padding:6px 8px; border-radius:6px; background:var(--bg); border:1px solid var(--border); color:var(--text); font-size:12px }

/* Overflow menu (chat header ⋯ button) */
.chat-overflow-menu { position:absolute; top:calc(100% + 4px); right:0; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; box-shadow:0 8px 20px var(--shadow); padding:4px; min-width:160px; display:none; z-index:60 }
.chat-overflow-menu.open { display:flex; flex-direction:column; gap:2px }
.chat-overflow-menu button { background:transparent; border:0; color:var(--text); padding:8px 12px; font-size:13px; text-align:left; border-radius:5px; cursor:pointer }
.chat-overflow-menu button:hover { background:var(--bg-hover) }

/* Activity drawer — slide-in panel from the right. Layout primitives
   (position/height/safe-area/transform anchor) come from .eos-drawer +
   .eos-drawer-right; this rule only carries app-specific overrides. */
.activity-drawer { width:min(420px, 100vw); z-index:10000; transition:transform 0.18s ease }
.activity-drawer-head { display:flex; align-items:center; gap:8px; padding:14px 16px; border-bottom:1px solid var(--border); flex-shrink:0 }
.activity-drawer-head h3 { font-size:15px; font-weight:600; flex:1 }
.activity-drawer-tabs { display:flex; gap:2px; padding:8px 16px 0; border-bottom:1px solid var(--border); flex-shrink:0 }
.activity-drawer-tabs button { background:transparent; border:0; color:var(--text-muted); padding:8px 14px; font-size:13px; font-weight:500; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px }
.activity-drawer-tabs button.active { color:var(--text); border-bottom-color:var(--accent) }
.activity-drawer-body { flex:1; overflow-y:auto; padding:14px 16px }
.activity-drawer-backdrop { /* eos-ios-ok: N H — scrim backdrop, drawer carries safe-area */ position:fixed; inset:0; background:color-mix(in srgb, var(--text) 20%, transparent); z-index:9999; display:none; cursor:pointer; -webkit-tap-highlight-color:transparent }
.activity-drawer-backdrop.open { display:block }

/* Pending-action cards (Phase 5 review gate) */
.pending-card { border:1px solid color-mix(in srgb,var(--accent) 50%,var(--border)); border-radius:8px; padding:10px 12px; margin-top:8px; background:color-mix(in srgb,var(--accent) 6%,var(--bg-card)); font-size:13px; display:flex; flex-direction:column; gap:8px }
.pending-card.applied { border-color:var(--success); background:color-mix(in srgb,var(--success) 8%,var(--bg-card)) }
.pending-card.rejected, .pending-card.failed { border-color:var(--danger); background:color-mix(in srgb,var(--danger) 6%,var(--bg-card)); opacity:0.75 }
.pending-card .pending-head { display:flex; align-items:center; gap:8px; font-weight:600 }
.pending-card .pending-verb { color:var(--accent); font-family:var(--font-mono,monospace); font-size:12px }
.pending-card .pending-args { font-family:var(--font-mono,monospace); font-size:11px; color:var(--text-muted); white-space:pre-wrap; max-height:120px; overflow-y:auto; padding:6px 8px; border-radius:4px; background:var(--bg) }
.pending-card .pending-actions { display:flex; gap:6px; justify-content:flex-end }
.pending-card .pending-status { font-size:11px; color:var(--text-muted); margin-left:auto }
.pending-card .pending-diff { font-family:var(--font-mono,monospace); font-size:11px; max-height:220px; overflow-y:auto; padding:6px 8px; border-radius:4px; background:var(--bg); border:1px solid var(--border); white-space:pre; line-height:1.4 }
.pending-card .pending-diff-head { font-size:11px; color:var(--text-muted); display:flex; justify-content:space-between; align-items:center }
.pending-card .pending-diff .d-add { color:var(--success); display:block }
.pending-card .pending-diff .d-del { color:var(--danger); display:block }
.pending-card .pending-diff .d-ctx { color:var(--text-muted); display:block }
.pending-card .pending-diff .d-hunk { color:var(--accent); display:block; opacity:0.7 }
.chat-back { display:none; background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-secondary); padding:4px }
.chat-agent-info { flex:1; min-width:0 }
.chat-agent-name { font-size:16px; font-weight:700; color:var(--text-heading) }
.chat-agent-model { display:inline-block; font-size:11px; padding:2px 8px; border-radius:6px; background:var(--accent-bg); color:var(--accent); font-family:var(--mono); margin-left:8px; vertical-align:middle }
.chat-actions { display:flex; gap:6px }

/* Messages */
.chat-messages { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:10px }
.msg { max-width:80%; padding:10px 14px; border-radius:16px; font-size:14px; line-height:1.55; word-break:break-word; animation:cardIn 0.25s ease; white-space:pre-wrap }
.msg-user { align-self:flex-end; background:var(--accent); color: var(--accent-ink); border-bottom-right-radius:4px }
.msg-assistant { align-self:flex-start; background:var(--bg-card); border:1px solid var(--border); color:var(--text); border-bottom-left-radius:4px }
.msg-time { font-size:10px; opacity:0.5; margin-top:4px }

/* Typing indicator */
.typing-indicator { align-self:flex-start; padding:12px 16px; background:var(--bg-card); border:1px solid var(--border); border-radius:16px; border-bottom-left-radius:4px }
.typing-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--text-muted); animation:typing 1.2s infinite; margin:0 2px }
.typing-dot:nth-child(2) { animation-delay:0.2s }
.typing-dot:nth-child(3) { animation-delay:0.4s }
@keyframes typing { 0%,60%,100%{opacity:0.3} 30%{opacity:1} }

/* Input bar */
.chat-input-bar { display:flex; gap:8px; padding:12px 20px; border-top:1px solid var(--border); flex-shrink:0; align-items:flex-end; position:relative }
.chat-input { flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:12px 14px; font-size:15px; color:var(--text); outline:none; font-family:inherit; resize:none; min-height:44px; max-height:120px; line-height:1.4 }
.chat-input:focus { border-color:color-mix(in srgb,var(--accent) 60%,transparent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 10%,transparent) }

/* @mention autocomplete popup */
.mention-popup { position:absolute; bottom:calc(100% + 4px); left:20px; right:20px; max-width:320px; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; box-shadow:0 4px 12px var(--shadow); padding:4px; max-height:240px; overflow-y:auto; z-index:50; display:none }
.mention-popup.open { display:block }
.mention-item { display:flex; align-items:center; gap:10px; padding:6px 8px; border-radius:6px; cursor:pointer; font-size:13px }
.mention-item:hover, .mention-item.active { background:var(--bg-hover) }
.mention-avatar { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; flex-shrink:0 }
.mention-id { color:var(--text-muted); font-size:11px; margin-left:auto }
.send-btn { width:44px; height:44px; border-radius:12px; background:var(--accent); color: var(--accent-ink); border:none; font-size:18px; cursor:pointer; transition:transform 0.1s,opacity 0.15s; flex-shrink:0; display:flex; align-items:center; justify-content:center }
.send-btn:active { transform:scale(0.92) }
.send-btn:disabled { opacity:0.4 }

/* Empty / Welcome */
.chat-welcome { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-muted); padding:40px }
.chat-welcome .icon { font-size:56px; margin-bottom:16px }
.chat-welcome p { font-size:14px; text-align:center; max-width:280px; line-height:1.5 }

/* Phase 14 — mobile responsive pass.
   Existing isMobile (≤700px) JS toggles sidebar/chat panel visibility. These
   rules tune the rendering inside that, plus drawer + modals + FAB. */
@media (max-width: 700px) {
    /* Sidebar fills the viewport when it's the active panel. */
    .sidebar { width:100% }
    /* Tier filter — let it scroll horizontally if it doesn't fit. */
    .tier-filter { overflow-x:auto; flex-wrap:nowrap; -webkit-overflow-scrolling:touch }
    .tier-filter button { white-space:nowrap; flex-shrink:0 }
    /* Activity drawer — full viewport on phones. */
    .activity-drawer { width:100vw; max-width:100vw }
    /* The hero icon in the welcome panel is too big on phone — scale it back. */
    .chat-welcome .icon { font-size:40px; margin-bottom:10px }
    /* Member chip row scrolls horizontally instead of wrapping into 4 lines. */
    .chat-members { overflow-x:auto; flex-wrap:nowrap; -webkit-overflow-scrolling:touch }
    .chat-members .member-chip { flex-shrink:0 }
    /* Inbound dashboard — tighter padding. */
    .inbound-dashboard { padding:20px 16px }
    .inbound-greeting { font-size:20px }
    /* Hide global EOS FAB chrome while our drawers / modals are open so
       the right edge isn't covered. Body class is set by a MutationObserver
       below — `:has()` selectors don't catch the async overlay swap reliably.
       #eos-fab-dock is the cluster mounted by emptyos.web (sparkle button);
       .pa-fab / .cap-fab are page-assistant + capture FABs. */
    body.rooms-overlay-open #eos-fab-dock,
    body.rooms-overlay-open .pa-fab,
    body.rooms-overlay-open .cap-fab { display:none !important }
    /* Mention/slash/wikilink popup — pin to viewport edges instead of input. */
    .mention-popup { left:8px; right:8px; max-width:none }
    /* Catch-up banner — narrower padding. */
    .catch-up-banner { padding:8px 10px }
    /* Group modal roster — single column with denser rows on phones. */
    .roster-list.dense { grid-template-columns:1fr }
    .roster-pick .roster-meta .roster-sub { display:none }
}

/* Phase 12 — inbound dashboard (replaces the placeholder welcome screen) */
.inbound-dashboard { flex:1; overflow-y:auto; padding:32px 24px; max-width:780px; margin:0 auto; width:100%; align-self:stretch }
.inbound-greeting { font-size:24px; font-weight:600; color:var(--text); margin-bottom:6px }
.inbound-sub { font-size:13px; color:var(--text-muted); margin-bottom:28px }
.inbound-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:28px }
.inbound-stat { padding:14px; border:1px solid var(--border); border-radius:8px; background:var(--bg-card) }
.inbound-stat .v { font-size:24px; font-weight:600; color:var(--text); line-height:1 }
.inbound-stat .l { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-top:4px }
.inbound-stat.has-attn { border-color:color-mix(in srgb,var(--accent) 50%,var(--border)); background:color-mix(in srgb,var(--accent) 5%,var(--bg-card)) }
.inbound-stat.has-attn .v { color:var(--accent) }
.inbound-section { margin-bottom:24px }
.inbound-section h3 { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px; font-weight:600 }
.inbound-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--border); border-radius:8px; margin-bottom:6px; cursor:pointer; transition:background 0.1s,border-color 0.1s; background:var(--bg-card) }
.inbound-row:hover { background:var(--bg-hover); border-color:color-mix(in srgb,var(--accent) 35%,var(--border)) }
.inbound-row .row-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:#fff; flex-shrink:0 }
.inbound-row .row-meta { flex:1; min-width:0 }
.inbound-row .row-title { font-size:14px; font-weight:500; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.inbound-row .row-sub { font-size:12px; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.inbound-row .row-tag { font-size:11px; color:var(--accent); background:color-mix(in srgb,var(--accent) 12%,transparent); padding:2px 8px; border-radius:10px; flex-shrink:0 }
.inbound-empty { text-align:center; padding:40px 20px; color:var(--text-muted); font-size:13px }

.empty-state { text-align:center; padding:40px 20px; color:var(--text-muted) }
.empty-state .icon { font-size:48px; margin-bottom:12px }
.empty-state p { font-size:14px; margin-bottom:16px }

/* Mobile: sidebar collapses */
@media(max-width:700px) {
    .sidebar { position:absolute; inset:0; width:100%; z-index:10; background:var(--bg) }
    .sidebar.hidden { display:none }
    .chat-panel.hidden { display:none }
    .chat-back { display:block }
    .chat-layout { position:relative }
}
</style>
</head>
<body>
<script src="/static/realtime.js"></script>
<script src="/static/eos.js"></script>
<script src="/static/eos-components.js"></script>
<script>EOS.nav('rooms');</script>

<div class="page" style="padding-bottom:0">
    <div class="chat-layout">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Rooms</h2>
                <div style="display:flex;gap:6px;align-items:center">
                    <span id="agent-count" style="font-size:12px;color:var(--text-muted)"></span>
                    <button class="eos-btn-sm eos-btn-ghost" onclick="openGlobalPending()" title="Pending [DO:] actions across all rooms" id="global-pending-btn" style="display:none">⏳ <span id="global-pending-count">0</span></button>
                    <button class="eos-btn-sm eos-btn-ghost" onclick="toggleBulkSelect()" title="Select multiple rooms" id="bulk-toggle-btn">☐</button>
                    <button class="eos-btn-sm eos-btn-ghost" onclick="openAppSettings()" title="Settings">&#9881;</button>
                </div>
            </div>
            <div class="sidebar-search">
                <input type="text" id="search" placeholder="Search agents..." oninput="filterAgents()">
            </div>
            <div class="tier-filter">
                <button class="active" onclick="setTierFilter('all')">All</button>
                <button onclick="setTierFilter('user')">User</button>
                <button onclick="setTierFilter('system')">System</button>
                <button onclick="setTierFilter('archived')">Archived</button>
            </div>
            <div class="agent-list" id="agent-list"></div>
            <div id="msg-hits" style="border-top:1px solid var(--border);display:none;max-height:35vh;overflow-y:auto"></div>
            <div class="sidebar-footer" style="display:flex;gap:6px">
                <button class="eos-btn eos-btn-sm" onclick="openModal()" style="flex:1">+ Agent</button>
                <button class="eos-btn eos-btn-sm" onclick="openGroupModal()" style="flex:1">+ Group</button>
            </div>
        </div>

        <!-- Chat panel -->
        <div class="chat-panel" id="chat-panel">
            <div id="chat-header" class="chat-header" style="display:none">
                <button class="chat-back" onclick="showSidebar()">&larr;</button>
                <div class="chat-agent-info">
                    <span id="chat-name" class="chat-agent-name"></span>
                    <span id="chat-model" class="chat-agent-model" style="display:none"></span>
                </div>
                <div class="chat-actions">
                    <button class="eos-btn-sm eos-btn-ghost" onclick="openActivityDrawer()" title="Tasks + pending actions for this room">
                        Activity<span id="chat-activity-count" style="margin-left:4px;color:var(--text-muted);font-size:11px"></span>
                    </button>
                    <span id="chat-tasks-count" hidden></span>
                    <span id="chat-pending-count" hidden></span>
                    <div class="chat-overflow" style="position:relative">
                        <button class="eos-btn-sm eos-btn-ghost" onclick="toggleChatOverflow(event)" title="More" aria-haspopup="menu" aria-expanded="false" id="chat-overflow-btn">⋯</button>
                        <div class="chat-overflow-menu" id="chat-overflow-menu" role="menu">
                            <button role="menuitem" onclick="closeChatOverflow();editCurrentAgent()">Edit</button>
                            <button role="menuitem" onclick="closeChatOverflow();exportChatToVault()">Export to vault</button>
                            <button role="menuitem" onclick="closeChatOverflow();distillRoom()">Distill into KB note</button>
                            <button role="menuitem" onclick="closeChatOverflow();openScheduleModal()">Schedule check-in…</button>
                            <button role="menuitem" id="chat-autospeak-btn" onclick="closeChatOverflow();toggleAutoSpeak()">Auto-speak: off</button>
                            <button role="menuitem" id="chat-archive-btn" onclick="closeChatOverflow();toggleRoomArchive()">Archive</button>
                            <button role="menuitem" onclick="closeChatOverflow();clearHistory()">Clear history</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="chat-members" class="chat-members" style="display:none"></div>
            <div id="chat-welcome" class="chat-welcome">
                <div class="icon">&#129302;</div>
                <p>Loading dashboard…</p>
            </div>
            <div class="chat-messages" id="chat-messages" style="display:none"></div>
            <div class="reply-context" id="reply-context">
                <span style="color:var(--accent);font-size:14px">↩</span>
                <span class="rc-text" id="reply-context-text"></span>
                <button onclick="cancelReply()" title="Cancel reply">×</button>
            </div>
            <div class="chat-input-bar" id="chat-input-bar" style="display:none">
                <div class="mention-popup" id="mention-popup"></div>
                <textarea class="chat-input" id="chat-input" placeholder="Message... · @ mention · / command · [[ link" rows="1"
                    onkeydown="chatInputKeydown(event)" oninput="chatInputChanged()"></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">&#8593;</button>
            </div>
        </div>
    </div>
</div>

<!-- Create/Edit Agent Modal -->
<div class="eos-modal-bg" id="agent-modal" onclick="if(event.target===this)EOS_UI.closeModal('agent-modal')">
    <div class="eos-modal">
        <div class="eos-modal-handle"></div>
        <h3 id="modal-title">New Agent</h3>
        <input type="text" id="f-name" placeholder="Agent name">
        <div style="display:flex;gap:8px">
            <select id="f-tier" style="flex:1;padding:8px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);font-size:13px">
                <option value="user">User</option>
                <option value="system">System</option>
            </select>
            <input type="text" id="f-model" placeholder="Model (optional)" style="flex:1">
        </div>
        <textarea id="f-prompt" rows="5" placeholder="System prompt — describe the persona..."></textarea>
        <div class="form-section">Knowledge</div>
        <input type="text" id="f-files" placeholder="Knowledge files (comma-separated vault paths)">
        <input type="text" id="f-kdir" placeholder="Knowledge directory (e.g. apps/rooms/knowledge/blender)">
        <div class="form-section">Advanced</div>
        <div style="display:flex;gap:8px">
            <input type="text" id="f-tools" placeholder="Tools (comma-separated)" style="flex:2">
            <input type="number" id="f-temp" placeholder="Temp" step="0.1" min="0" max="1.5" style="flex:1">
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
            <select id="f-effort" title="Reasoning effort (claude-cli only — ignored by other providers)" style="flex:1;padding:8px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);font-size:13px">
                <option value="">Effort: default</option>
                <option value="low">Effort: low (fastest)</option>
                <option value="medium">Effort: medium</option>
                <option value="high">Effort: high</option>
                <option value="max">Effort: max (slowest)</option>
            </select>
        </div>
        <input type="hidden" id="f-id">
        <input type="hidden" id="f-builtin">
        <div class="eos-modal-actions">
            <button onclick="EOS_UI.closeModal('agent-modal')" style="background:var(--bg);color:var(--text-secondary);border:1px solid var(--border)">Cancel</button>
            <button id="modal-delete" onclick="deleteAgent()" style="background:var(--danger);color:var(--accent-ink);display:none">Delete</button>
            <button onclick="saveAgent()" style="background:var(--accent);color: var(--accent-ink)">Save</button>
        </div>
    </div>
</div>

<!-- Phase 24 — bulk select action bar -->
<div class="bulk-action-bar" id="bulk-action-bar">
    <span class="count"><span id="bulk-selected-count">0</span> selected</span>
    <button class="eos-btn-sm eos-btn-ghost" onclick="bulkArchive()">Archive</button>
    <button class="eos-btn-sm eos-btn-ghost" onclick="bulkDelete()" style="color:var(--danger)">Delete</button>
    <button class="eos-btn-sm eos-btn-ghost" onclick="setBulkSelect(false)">Cancel</button>
</div>

<!-- Activity drawer: tabbed view of Tasks + Pending for the current room -->
<div class="activity-drawer-backdrop" id="activity-backdrop" onclick="closeActivityDrawer()"></div>
<aside class="eos-drawer eos-drawer-right activity-drawer" id="activity-drawer" aria-hidden="true">
    <div class="activity-drawer-head">
        <h3 id="activity-drawer-title">Activity</h3>
        <button class="eos-btn-sm eos-btn-ghost" onclick="closeActivityDrawer()" aria-label="Close">×</button>
    </div>
    <div class="activity-drawer-tabs">
        <button id="activity-tab-pending" class="active" onclick="switchActivityTab('pending')">Pending <span id="activity-tab-pending-count"></span></button>
        <button id="activity-tab-tasks" onclick="switchActivityTab('tasks')">Tasks <span id="activity-tab-tasks-count"></span></button>
        <button id="activity-tab-knowledge" onclick="switchActivityTab('knowledge')">Knowledge <span id="activity-tab-knowledge-count"></span></button>
        <button id="activity-tab-memory" onclick="switchActivityTab('memory')">Memory <span id="activity-tab-memory-count"></span></button>
    </div>
    <div class="activity-drawer-body" id="activity-drawer-body"></div>
</aside>

<script>
var agents = [];
var currentAgent = null;
var sending = false;
var isMobile = window.innerWidth <= 700;
var tierFilter = 'all';

var COLORS = ['#8b5cf6','#3b82f6','#10b981','#f59e0b','#ef4444','#ec4899','#06b6d4','#84cc16','#f97316','#6366f1'];

// Phase 9 — unread state per room id, refreshed after loadAgents.
var _unreadMap = {};

function agentColor(name) {
    var h = 0;
    for (var i = 0; i < name.length; i++) h = ((h << 5) - h) + name.charCodeAt(i) | 0;
    return COLORS[Math.abs(h) % COLORS.length];
}

function initial(name) { return (name || '?')[0].toUpperCase(); }
function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '...' : (s || ''); }

// --- Sidebar rendering ---

function renderSidebar() {
    var el = document.getElementById('agent-list');
    var query = (document.getElementById('search').value || '').toLowerCase();
    // Archived rooms only show when the Archived tab is selected; they're
    // hidden from All / User / System views so the default sidebar stays
    // focused on live conversations.
    var filtered = agents.filter(function(a) {
        if (query && a.name.toLowerCase().indexOf(query) < 0) return false;
        var isArchived = a.status === 'archived';
        if (tierFilter === 'archived') return isArchived;
        if (isArchived) return false;
        if (tierFilter !== 'all' && (a.tier || 'user') !== tierFilter) return false;
        return true;
    });
    document.getElementById('agent-count').textContent = agents.length + ' agent' + (agents.length !== 1 ? 's' : '');

    if (!filtered.length) {
        el.innerHTML = '<div style="text-align:center;padding:30px 10px;color:var(--text-muted);font-size:13px">' +
            (agents.length ? 'No matches' : 'No agents yet') + '</div>';
        return;
    }
    // Sort: most-recently-active first, then anything that has never seen
    // a message falls to the bottom in alphabetical order. System tier
    // gets a small boost so the user's core agents (general-assistant etc.)
    // stay above totally-stale persona records that would otherwise outrank
    // them by name. Unread rooms always float to the very top.
    filtered.sort(function(a, b) {
        var au = !!_unreadMap[a.id], bu = !!_unreadMap[b.id];
        if (au !== bu) return au ? -1 : 1;
        var at = a.last_msg_ts || '';
        var bt = b.last_msg_ts || '';
        if (at && bt && at !== bt) return at < bt ? 1 : -1;
        if (at && !bt) return -1;
        if (bt && !at) return 1;
        // Both lack activity — system tier sinks above everyone, then name.
        var asys = a.tier === 'system' ? 0 : 1;
        var bsys = b.tier === 'system' ? 0 : 1;
        if (asys !== bsys) return asys - bsys;
        return (a.name || '').localeCompare(b.name || '');
    });
    el.innerHTML = filtered.map(function(a) {
        var active = currentAgent && currentAgent.id === a.id;
        var tier = a.tier || 'user';
        var isGroup = tier === 'group';
        var color = agentColor(a.name);
        var badge = '<span class="tier-badge ' + tier + '">' + tier + '</span>';
        var lock = a.builtin ? ' 🔒' : '';
        var preview, avatar;
        if (isGroup) {
            var parts = a.participants || [];
            var responders = parts.filter(function(p){
                return p.type === 'agent' || p.type === 'cli';
            });
            var responderCount = responders.length;
            var hasCli = parts.some(function(p){ return p.type === 'cli'; });
            // Stacked mini-avatars (max 3) + overflow count. Reuses participantVisual.
            var miniMax = 3;
            var minis = responders.slice(0, miniMax).map(function(p, idx) {
                var v = participantVisual(p);
                var z = miniMax - idx;
                return '<span class="member-avatar" style="background:' + v.color + ';width:18px;height:18px;font-size:9px;border:2px solid var(--bg);margin-left:' + (idx === 0 ? '0' : '-7px') + ';z-index:' + z + ';position:relative">' + esc(v.icon) + '</span>';
            }).join('');
            var overflow = responderCount > miniMax
                ? '<span style="font-size:11px;color:var(--text-muted);margin-left:6px">+' + (responderCount - miniMax) + '</span>'
                : '';
            preview = '<span style="display:inline-flex;align-items:center">' + minis + overflow +
                      '<span style="margin-left:8px;color:var(--text-muted);font-size:11px">' +
                          responderCount + (hasCli ? ' incl. CLI' : '') +
                      '</span></span>';
            avatar = '<div class="agent-avatar" style="background:' + color + '">👥</div>';
        } else {
            preview = truncate(a.system_prompt, 40) || 'No prompt set';
            avatar = '<div class="agent-avatar" style="background:' + color + '">' + initial(a.name) + '</div>';
        }
        // Group rooms compose preview as HTML (mini-avatar stack); 1:1 rooms
        // pass plain text. The flag distinguishes which path to take.
        var previewHtml = isGroup ? preview : esc(preview);
        // Unread indicator — small dot with count, positioned right of the name.
        var unread = _unreadMap[a.id];
        var unreadDot = '';
        if (unread && unread.count > 0) {
            var n = unread.count > 9 ? '9+' : String(unread.count);
            unreadDot = '<span class="unread-dot" title="' + unread.count + ' new since last visit">' + n + '</span>';
        }
        return '<div class="agent-item' + (active ? ' active' : '') + (unread ? ' has-unread' : '') + '" onclick="openChat(\'' + escAttr(a.id) + '\')">' +
            avatar +
            '<div class="agent-preview">' +
                '<div class="agent-preview-name">' + esc(a.name) + badge + lock + unreadDot + '</div>' +
                '<div class="agent-preview-msg">' + previewHtml + '</div>' +
            '</div></div>';
    }).join('');
}

function setTierFilter(tier) {
    tierFilter = tier;
    document.querySelectorAll('.tier-filter button').forEach(function(b) {
        b.classList.toggle('active', b.textContent.toLowerCase() === tier);
    });
    renderSidebar();
}

// --- Cross-room message search (Phase 7b) ---
//
// When the sidebar query is ≥2 chars, also query /rooms/api/search and
// append hits below the agent list. Debounced 200ms so typing fast doesn't
// hammer the daemon. Hits link directly into the room.

var _searchTimer = null;
var _lastSearchQuery = '';

function filterAgents() {
    renderSidebar();
    var q = (document.getElementById('search').value || '').trim();
    if (_searchTimer) clearTimeout(_searchTimer);
    if (q.length < 2) {
        _renderMessageHits([]);
        return;
    }
    _searchTimer = setTimeout(async function() {
        if (q === _lastSearchQuery) return;
        _lastSearchQuery = q;
        try {
            var hits = await EOS.api('/rooms/api/search?q=' + encodeURIComponent(q)) || [];
            _renderMessageHits(hits);
        } catch(e) {
            _renderMessageHits([]);
        }
    }, 200);
}

function _renderMessageHits(hits) {
    var container = document.getElementById('msg-hits');
    if (!container) return;
    if (!hits.length) {
        container.innerHTML = '';
        container.style.display = 'none';
        return;
    }
    container.style.display = '';
    container.innerHTML =
        '<div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;padding:8px 14px 4px">In messages</div>' +
        hits.map(function(h) {
            var when = h.ts ? new Date(h.ts).toLocaleDateString([], {month:'short', day:'numeric'}) : '';
            return '<div class="agent-item" style="padding:8px 14px;cursor:pointer" onclick="openChat(\'' + escAttr(h.room_id) + '\')">' +
                '<div style="flex:1;min-width:0">' +
                    '<div style="font-size:12px;color:var(--text-muted);margin-bottom:2px">' +
                        (h.kind === 'group' ? '👥 ' : '') + esc(h.room_name) +
                        ' · ' + esc(h.speaker) +
                        (when ? ' · ' + esc(when) : '') +
                    '</div>' +
                    '<div style="font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">' +
                        esc(h.snippet) +
                    '</div>' +
                '</div></div>';
        }).join('');
}

// --- Chat ---

async function openChat(agentId) {
    currentAgent = agents.find(function(a) { return a.id === agentId; });
    if (!currentAgent) return;

    renderSidebar();

    // Show chat panel, hide welcome
    document.getElementById('chat-welcome').style.display = 'none';
    document.getElementById('chat-header').style.display = '';
    document.getElementById('chat-messages').style.display = '';
    document.getElementById('chat-input-bar').style.display = '';

    var tier = currentAgent.tier || 'user';
    var isGroup = tier === 'group';
    var memberCount = '';
    if (isGroup) {
        var rs = (currentAgent.participants || []).filter(function(p){
            return p.type === 'agent' || p.type === 'cli';
        }).length;
        memberCount = ' <span style="color:var(--text-muted);font-size:13px;font-weight:400;margin-left:6px">' +
                      rs + ' member' + (rs !== 1 ? 's' : '') + '</span>';
    }
    var titleIcon = isGroup ? '👥 ' : '';
    document.getElementById('chat-name').innerHTML = titleIcon + esc(currentAgent.name) +
        ' <span class="tier-badge ' + tier + '">' + tier + '</span>' + memberCount;
    var modelEl = document.getElementById('chat-model');
    if (currentAgent.model) { modelEl.textContent = currentAgent.model; modelEl.style.display = ''; }
    else { modelEl.style.display = 'none'; }

    renderMembers();
    loadRoomTaskCount(currentAgent.id);
    // Seed the Knowledge tab count from the room record (already in cache).
    var kbBadge = document.getElementById('activity-tab-knowledge-count');
    var kbN = ((currentAgent.knowledge_files || []).length);
    if (kbBadge) kbBadge.textContent = kbN ? '(' + kbN + ')' : '';

    // Mobile: hide sidebar, show chat
    if (isMobile) {
        document.getElementById('sidebar').classList.add('hidden');
        document.getElementById('chat-panel').classList.remove('hidden');
    }

    // Load history. Fetch pending FIRST so renderMessages has the cache
    // populated when it walks each message's `pending: [ids]` list.
    var msgEl = document.getElementById('chat-messages');
    msgEl.innerHTML = '<div style="text-align:center;padding:20px"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';

    try {
        await loadPendingForRoom(currentAgent.id);
        var data = await EOS.api('/rooms/api/history/' + agentId);
        // Capture last_visited BEFORE we ping the visit endpoint so the
        // catch-me-up banner can compute "messages since last visit".
        var lastVisited = (await EOS.api('/rooms/api/visits') || {})[agentId] || '';
        renderMessages(data.messages || []);
        maybeRenderCatchUpBanner(data.messages || [], lastVisited);
        // Mark visited (idempotent server-side) and clear local unread state
        // so the dot disappears immediately without a full reload.
        EOS.post('/rooms/api/rooms/' + encodeURIComponent(agentId) + '/visit', {});
        if (_unreadMap[agentId]) {
            delete _unreadMap[agentId];
            renderSidebar();
        }
    } catch(e) { renderMessages([]); }
    // Restore the draft (if any) — sits untouched in the input for the user
    // to keep typing, edit, or hit send. Show a small toast so it's clear
    // the typing didn't vanish.
    var draft = loadDraft(agentId);
    var input = document.getElementById('chat-input');
    if (input && draft && draft.text) {
        input.value = draft.text;
        // Trigger auto-resize.
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
        EOS_UI.toast('Draft restored');
    } else if (input) {
        input.value = '';
        input.style.height = 'auto';
    }
    setTimeout(function() {
        var inp = document.getElementById('chat-input');
        if (inp) {
            inp.focus();
            // Move cursor to end so the user can keep typing.
            var end = inp.value.length;
            inp.selectionStart = inp.selectionEnd = end;
        }
    }, 150);
}

function showSidebar() {
    document.getElementById('sidebar').classList.remove('hidden');
    if (isMobile) document.getElementById('chat-panel').classList.add('hidden');
}

function renderMessages(messages) {
    var el = document.getElementById('chat-messages');
    if (!messages.length) {
        var name = currentAgent ? currentAgent.name : 'this agent';
        var isGroup = currentAgent && currentAgent.tier === 'group';
        var headline, sub, suggestionsHtml = '';
        if (isGroup) {
            var responders = (currentAgent.participants || []).filter(function(p){
                return p.type === 'agent' || p.type === 'cli';
            });
            var first = responders[0];
            var firstId = first ? first.id : null;
            headline = esc(name);
            sub = responders.length + ' participant' + (responders.length !== 1 ? 's' : '') + ' · use <code style="background:var(--bg-elevated);padding:1px 5px;border-radius:3px;font-size:12px">@name</code> to direct your message';
            // Suggestion chips — quick-fire @-mentions for each responder.
            suggestionsHtml = '<div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:18px">' +
                responders.slice(0, 4).map(function(p) {
                    var v = participantVisual(p);
                    return '<button class="eos-btn-sm eos-btn-ghost" style="display:inline-flex;align-items:center;gap:6px" onclick="insertMention(\'' + escAttr(v.id) + '\')">' +
                           '<span class="member-avatar" style="background:' + v.color + ';width:18px;height:18px;font-size:9px">' + esc(v.icon) + '</span>' +
                           '<span>@' + esc(v.id) + '</span>' +
                           '</button>';
                }).join('') +
                '</div>';
        } else {
            headline = esc(name);
            var sp = (currentAgent && currentAgent.system_prompt) || '';
            var spPreview = sp.replace(/\s+/g,' ').slice(0, 140);
            sub = spPreview ? esc(spPreview) + (sp.length > 140 ? '…' : '') : 'Ready when you are.';
        }
        el.innerHTML =
            '<div class="chat-welcome" style="padding:60px 20px;text-align:center">' +
                '<div class="icon" style="font-size:48px;margin-bottom:18px">' +
                    (isGroup ? '👥' : '💬') +
                '</div>' +
                '<h2 style="font-size:20px;font-weight:600;margin-bottom:8px">' + headline + '</h2>' +
                '<p style="color:var(--text-muted);font-size:13px;max-width:380px;margin:0 auto;line-height:1.5">' + sub + '</p>' +
                suggestionsHtml +
            '</div>';
        return;
    }
    var isGroup = currentAgent && (currentAgent.tier === 'group');
    var pinnedSet = new Set((currentAgent && currentAgent.pinned_ts) || []);
    // Phase 25 — index messages by ts so reply quotes can resolve their parent.
    _msgIndexByTs = {};
    messages.forEach(function(m) { if (m.ts) _msgIndexByTs[m.ts] = m; });
    // Pinned panel above the thread — pulls live messages from the same array.
    var pinnedHtml = '';
    if (pinnedSet.size) {
        var pinnedRows = messages.filter(function(m){ return m.ts && pinnedSet.has(m.ts); }).map(function(m) {
            var actor = m.actor || {};
            var speakerId = actor.id || (m.role === 'user' ? 'me' : 'assistant');
            var preview = _stripTaskMarkers(m.text || '').replace(/\s+/g, ' ');
            return '<div class="pinned-row" onclick="scrollToMessage(\'' + escAttr(m.ts) + '\')">' +
                '<span style="color:var(--accent);flex-shrink:0">📌</span>' +
                '<div style="flex:1;min-width:0">' +
                    '<div class="pinned-speaker">' + esc(speakerId) + '</div>' +
                    '<div class="pinned-text">' + esc(preview) + '</div>' +
                '</div>' +
                '<button class="pinned-unpin" onclick="event.stopPropagation();unpinMessage(\'' + escAttr(m.ts) + '\')" title="Unpin">×</button>' +
                '</div>';
        }).join('');
        if (pinnedRows) {
            pinnedHtml = '<div class="pinned-panel">' +
                '<div class="pinned-panel-head">📌 Pinned · ' + pinnedSet.size + '</div>' +
                pinnedRows +
                '</div>';
        }
    }
    var messagesHtml = messages.map(function(m) {
        var cls = m.role === 'user' ? 'msg-user' : 'msg-assistant';
        var actor = m.actor || {};
        var isCli = actor.type === 'cli';
        if (isCli) cls += ' msg-cli';
        var isPinned = m.ts && pinnedSet.has(m.ts);
        if (isPinned) cls += ' is-pinned';
        var time = m.ts ? new Date(m.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
        var who = '';
        if (isGroup && m.role !== 'user') {
            var pseudoPart = {type: actor.type || 'agent', id: actor.id || ''};
            var v = participantVisual(pseudoPart);
            who = '<div class="msg-speaker-row">' +
                  '<span class="member-avatar" style="background:' + v.color + '">' + esc(v.icon) + '</span>' +
                  '<span style="font-size:11px;color:var(--text-muted);font-weight:600">' + esc(v.label) + '</span>' +
                  '</div>';
        }
        var bodyStyle = isCli ? ' style="font-family:var(--font-mono,monospace);font-size:13px;white-space:pre-wrap"' : '';
        var pendingHtml = '';
        if (Array.isArray(m.pending) && m.pending.length) {
            pendingHtml = m.pending.map(function(actionId) {
                var action = _pendingMap[actionId];
                return action ? renderPendingCard(action) : '';
            }).join('');
        }
        // Auto-exec [DO:] results — per-action chip with view/edit links to the
        // touched note + an "→ <app>" exit link. Mirrors the page-assistant
        // server_results block for the rooms-chat surface.
        var resultsHtml = '';
        if (Array.isArray(m.server_results) && m.server_results.length) {
            resultsHtml = m.server_results.map(function(r) {
                if (!r.ok) return '';
                return _pendingLinksHtml(r.links);
            }).filter(Boolean).join('');
        }
        // Pin toggle — only render on messages with a stable ts.
        var pinBtn = m.ts ? '<button class="msg-pin" onclick="togglePin(\'' + escAttr(m.ts) + '\')" title="' + (isPinned ? 'Unpin' : 'Pin') + '">' + (isPinned ? '📌' : '📍') + '</button>' : '';
        // Voice playback — only on non-user turns.
        var speakBtn = (m.role !== 'user' && m.text) ?
            '<button class="msg-speak" data-ts="' + escAttr(m.ts || '') + '" onclick="event.stopPropagation();toggleSpeakMessage(\'' + escAttr(m.ts || '') + '\', this.dataset.text)" data-text="' + escAttr(m.text) + '" title="Speak">🔊</button>' : '';
        // Phase 25 — reply button + quoted parent.
        var replyBtn = m.ts ? '<button class="msg-reply" onclick="startReply(\'' + escAttr(m.ts) + '\')" title="Reply">↩</button>' : '';
        var quoteHtml = '';
        if (m.reply_to) {
            var parent = _msgIndexByTs[m.reply_to];
            if (parent) {
                var pActor = parent.actor || {};
                var pSpeaker = pActor.id || (parent.role === 'user' ? 'me' : 'assistant');
                var pPreview = (parent.text || '').replace(/\s+/g, ' ').slice(0, 90);
                quoteHtml = '<div class="msg-reply-quote" onclick="scrollToMessage(\'' + escAttr(m.reply_to) + '\')">' +
                    '<span class="rq-speaker">' + esc(pSpeaker) + '</span>' +
                    '<span class="rq-text">' + esc(pPreview) + '</span>' +
                    '</div>';
            } else {
                quoteHtml = '<div class="msg-reply-quote" style="cursor:default">' +
                    '<span class="rq-text">↩ replied to a message no longer in scrollback</span>' +
                    '</div>';
            }
        }
        return '<div class="msg ' + cls + '" data-ts="' + escAttr(m.ts || '') + '">' +
            pinBtn + speakBtn + replyBtn + quoteHtml + who + '<div' + bodyStyle + '>' + esc(m.text) + '</div>' +
            pendingHtml +
            resultsHtml +
            (time ? '<div class="msg-time">' + time + '</div>' : '') + '</div>';
    }).join('');
    el.innerHTML = pinnedHtml + messagesHtml;
    el.scrollTop = el.scrollHeight;
}

function appendMessage(role, text) {
    var el = document.getElementById('chat-messages');
    var welcome = el.querySelector('.chat-welcome');
    if (welcome) welcome.remove();
    var cls = role === 'user' ? 'msg-user' : 'msg-assistant';
    var time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    el.insertAdjacentHTML('beforeend', '<div class="msg ' + cls + '">' + esc(text) +
        '<div class="msg-time">' + time + '</div></div>');
    el.scrollTop = el.scrollHeight;
}

function showTyping() {
    var el = document.getElementById('chat-messages');
    el.insertAdjacentHTML('beforeend', '<div class="typing-indicator" id="typing-ind">' +
        '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>');
    el.scrollTop = el.scrollHeight;
}

function removeTyping() { var t = document.getElementById('typing-ind'); if (t) t.remove(); }

async function sendMessage() {
    if (sending || !currentAgent) return;
    var input = document.getElementById('chat-input');
    var text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    // Sent — drop the draft so a future openChat doesn't re-restore it.
    clearDraft(currentAgent.id);
    sending = true;
    document.getElementById('send-btn').disabled = true;

    appendMessage('user', text);

    // Create streaming message bubble
    var isGroup = currentAgent && (currentAgent.tier === 'group');
    var msgEl = document.createElement('div');
    msgEl.className = 'msg msg-assistant';
    msgEl.innerHTML =
        (isGroup ? '<div class="msg-speaker-row" id="stream-speaker-row">' +
                   '<span class="member-avatar" id="stream-avatar" style="background:var(--text-muted)">…</span>' +
                   '<span id="stream-speaker" style="font-size:11px;color:var(--text-muted);font-weight:600">…</span>' +
                   '</div>' : '') +
        '<div class="msg-text" id="stream-target"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>' +
        '<div id="stream-tools" style="display:flex;flex-direction:column;gap:4px;margin-top:6px"></div>' +
        '<div id="stream-pending" style="display:flex;flex-direction:column;gap:4px"></div>';
    document.getElementById('chat-messages').appendChild(msgEl);
    var _cm=document.getElementById('chat-messages');if(_cm)_cm.scrollTop=_cm.scrollHeight;

    var targetEl = document.getElementById('stream-target');
    var speakerEl = document.getElementById('stream-speaker');
    var avatarEl = document.getElementById('stream-avatar');
    var toolsEl = document.getElementById('stream-tools');
    var fullText = '';
    var sawCliMarkers = false;
    var toolCardsById = {};

    var streamPayload = { agent_id: currentAgent.id, text: text };
    if (_replyTo && _replyTo.ts) streamPayload.reply_to = _replyTo.ts;
    var sentReplyTo = _replyTo;
    cancelReply();  // clear chip; the ts is captured in payload above
    try {
        for await (var chunk of EOS.streamPost('/rooms/api/chat/stream', streamPayload)) {
            // CLI tool-use card — small inline card, expands the input on click.
            if (chunk.tool_use) {
                sawCliMarkers = true;
                var tu = chunk.tool_use;
                var tid = tu.id || ('tool-' + Math.random().toString(36).slice(2));
                var inputStr = '';
                try { inputStr = JSON.stringify(tu.input || {}, null, 2); } catch(e) { inputStr = String(tu.input); }
                var card = document.createElement('div');
                card.id = 'tool-card-' + tid;
                card.style.cssText = 'border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-family:var(--font-mono,monospace);font-size:12px;background:var(--bg-elevated)';
                card.innerHTML = '<div style="font-weight:600;color:var(--accent)">→ ' + esc(tu.name || 'tool') + '</div>' +
                                 '<details style="margin-top:2px"><summary style="cursor:pointer;color:var(--text-muted)">input</summary>' +
                                 '<pre style="margin:4px 0 0 0;white-space:pre-wrap;font-size:11px">' + esc(inputStr) + '</pre></details>';
                toolsEl.appendChild(card);
                toolCardsById[tid] = card;
                var _cm=document.getElementById('chat-messages');if(_cm)_cm.scrollTop=_cm.scrollHeight;
                continue;
            }
            if (chunk.tool_result) {
                sawCliMarkers = true;
                var tr = chunk.tool_result;
                var card = toolCardsById[tr.tool_use_id];
                if (card) {
                    card.insertAdjacentHTML('beforeend',
                        '<details style="margin-top:2px"><summary style="cursor:pointer;color:var(--text-muted)">result</summary>' +
                        '<pre style="margin:4px 0 0 0;white-space:pre-wrap;font-size:11px">' + esc(tr.content || '') + '</pre></details>');
                }
                continue;
            }
            // Phase 5 review-gate card — CLI emitted [DO:app.method({...})]
            // and the backend saved it as a pending action. Render Apply/Reject
            // inline so the user can resolve it without leaving the message.
            if (chunk.pending_action) {
                var action = chunk.pending_action;
                _pendingMap[action.id] = action;
                var pendingEl = document.getElementById('stream-pending');
                if (pendingEl) {
                    pendingEl.insertAdjacentHTML('beforeend', renderPendingCard(action));
                }
                updatePendingBadge();
                continue;
            }
            // Backend stripped [DO:] tokens from the reply after the stream
            // finished — replace what we already painted so the user doesn't
            // see the raw token sitting above the pending card.
            if (typeof chunk.text_replace === 'string') {
                fullText = chunk.text_replace;
                if (fullText) {
                    targetEl.innerHTML = typeof EOS_UI !== 'undefined' && EOS_UI.renderMarkdown ? EOS_UI.renderMarkdown(fullText) : esc(fullText);
                } else {
                    targetEl.innerHTML = '';
                }
                continue;
            }
            var t = chunk.text || '';
            if (t) {
                fullText += t;
                targetEl.innerHTML = typeof EOS_UI !== 'undefined' && EOS_UI.renderMarkdown ? EOS_UI.renderMarkdown(fullText) : esc(fullText);
                var _cm=document.getElementById('chat-messages');if(_cm)_cm.scrollTop=_cm.scrollHeight;
            }
            // Final chunk carries responder_id (and actor_type for CLI).
            if (speakerEl && chunk.responder_id) {
                var v = participantVisual({type: chunk.actor_type || 'agent', id: chunk.responder_id});
                speakerEl.textContent = v.label;
                if (avatarEl) {
                    avatarEl.textContent = v.icon;
                    avatarEl.style.background = v.color;
                }
            }
            if (chunk.actor_type === 'cli' || sawCliMarkers) {
                msgEl.classList.add('msg-cli');
                targetEl.style.fontFamily = 'var(--font-mono,monospace)';
                targetEl.style.fontSize = '13px';
                targetEl.style.whiteSpace = 'pre-wrap';
            }
            if (chunk.done) break;
        }
        if (!fullText) targetEl.textContent = 'No response';
        targetEl.removeAttribute('id');
    } catch(e) {
        // Fallback to non-streaming
        try {
            var r = await EOS.post('/rooms/api/chat', { agent_id: currentAgent.id, text: text });
            targetEl.innerHTML = typeof EOS_UI !== 'undefined' && EOS_UI.renderMarkdown ? EOS_UI.renderMarkdown(r.response || 'No response') : esc(r.response || 'No response');
        } catch(e2) {
            targetEl.textContent = 'Error: could not get response';
        }
        targetEl.removeAttribute('id');
    }
    sending = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
    // Auto-speak the just-arrived reply if the room has it enabled. Uses
    // fullText so we read the assistant's plain answer (not the user's
    // outgoing prompt). speakText cancels any prior queued utterance.
    if (currentAgent && fullText && isAutoSpeakOn(currentAgent.id)) {
        speakText(fullText);
    }
    renderSidebar();
}

async function clearHistory() {
    if (!currentAgent) return;
    if (!await EOS_UI.confirm('Clear all messages with ' + currentAgent.name + '?')) return;
    try {
        await EOS.api('/rooms/api/history/' + currentAgent.id, { method:'DELETE' });
        renderMessages([]);
        EOS_UI.toast('History cleared');
    } catch(e) { EOS_UI.toast('Failed to clear', false); }
}

function exportChat() {
    if (!currentAgent) return;
    var msgs = document.querySelectorAll('#chat-messages .msg');
    var lines = [];
    msgs.forEach(function(m) {
        var role = m.classList.contains('msg-user') ? 'You' : currentAgent.name;
        var text = m.childNodes[0].textContent;
        lines.push(role + ': ' + text);
    });
    if (!lines.length) { EOS_UI.toast('No messages to export', false); return; }
    var blob = new Blob([lines.join('\n\n')], {type:'text/plain'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = currentAgent.name.replace(/\s+/g,'-') + '-chat.txt';
    a.click();
    EOS_UI.toast('Chat exported');
}
