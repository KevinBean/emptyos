function openModal(editAgent) {
    var isEdit = !!editAgent;
    document.getElementById('modal-title').textContent = isEdit ? 'Edit Agent' : 'New Agent';
    document.getElementById('f-name').value = isEdit ? editAgent.name : '';
    document.getElementById('f-tier').value = isEdit ? (editAgent.tier || 'user') : 'user';
    document.getElementById('f-prompt').value = isEdit ? editAgent.system_prompt : '';
    document.getElementById('f-files').value = isEdit ? (editAgent.knowledge_files || []).join(', ') : '';
    document.getElementById('f-kdir').value = isEdit ? (editAgent.knowledge_dir || '') : '';
    document.getElementById('f-model').value = isEdit ? (editAgent.model || '') : '';
    document.getElementById('f-tools').value = isEdit ? (editAgent.tools || []).join(', ') : '';
    document.getElementById('f-temp').value = isEdit && editAgent.temperature != null ? editAgent.temperature : '';
    document.getElementById('f-effort').value = isEdit ? (editAgent.effort || '') : '';
    document.getElementById('f-id').value = isEdit ? editAgent.id : '';
    document.getElementById('f-builtin').value = isEdit ? (editAgent.builtin ? '1' : '') : '';
    // Show delete button only for non-builtin agents
    var showDelete = isEdit && !editAgent.builtin;
    document.getElementById('modal-delete').style.display = showDelete ? '' : 'none';
    EOS_UI.openModal('agent-modal');
    setTimeout(function() { document.getElementById('f-name').focus(); }, 200);
}

function editCurrentAgent() {
    if (currentAgent) openModal(currentAgent);
}

// --- Group rooms (Phase 2) ---

// Pick ≥2 existing agents + give the room a title. Posts to /rooms/api/rooms,
// then reloads the sidebar. Skips already-group rooms in the picker so we
// can't nest a group inside a group.
//
// Layout: CLI tools section first (sticky / above the fold), then agents in
// a 2-column dense grid. Avatar-first row, checkbox in top-right corner.
// Clicking anywhere on a row toggles the checkbox.
function openGroupModal() {
    var pickable = (agents || []).filter(function(a) {
        return (a.tier || 'user') !== 'group';
    });
    if (pickable.length < 2) {
        EOS_UI.toast('Need at least 2 participants to make a group', false);
        return;
    }
    var agentRows = pickable.map(function(a) {
        var color = agentColor(a.name);
        var preview = (a.system_prompt || '').replace(/\s+/g,' ').slice(0, 60);
        return '<label class="roster-pick" data-pick="agent" data-id="' + escAttr(a.id) + '">' +
            '<input type="checkbox" data-kind="agent" value="' + escAttr(a.id) + '" onchange="this.closest(\'.roster-pick\').classList.toggle(\'checked\', this.checked)">' +
            '<div class="roster-avatar" style="background:' + color + '">' + initial(a.name) + '</div>' +
            '<div class="roster-meta">' +
                '<div class="roster-name">' + esc(a.name) + '</div>' +
                '<div class="roster-sub">' + esc(preview || 'No prompt set') + '</div>' +
            '</div></label>';
    }).join('');
    // CLI tools section — distinct from agents. Claude has streaming + tool
    // events + model/effort knobs; codex/gemini run in buffered text mode
    // and are configured via emptyos.toml [plugins.agent-runtime.clis.<id>].
    var simpleCliRow = function(id, label, sub, icon) {
        return '<div class="roster-pick" data-pick="cli" data-id="' + escAttr(id) + '" id="roster-cli-' + escAttr(id) + '">' +
            '<label style="display:flex;align-items:center;gap:10px;cursor:pointer;width:100%">' +
                '<input type="checkbox" data-kind="cli" value="' + escAttr(id) + '" onchange="document.getElementById(\'roster-cli-' + escAttr(id) + '\').classList.toggle(\'checked\', this.checked)">' +
                '<div class="roster-avatar" style="background:var(--text-muted)">' + esc(icon) + '</div>' +
                '<div class="roster-meta">' +
                    '<div class="roster-name">' + esc(label) + '</div>' +
                    '<div class="roster-sub">' + esc(sub) + '</div>' +
                '</div>' +
            '</label>' +
        '</div>';
    };
    var cliRow =
        '<div class="roster-pick" data-pick="cli" data-id="claude-cli" id="roster-cli-claude-cli" style="flex-direction:column;align-items:stretch;gap:0">' +
            '<label style="display:flex;align-items:center;gap:10px;cursor:pointer;width:100%">' +
                '<input type="checkbox" data-kind="cli" value="claude-cli" onchange="document.getElementById(\'roster-cli-claude-cli\').classList.toggle(\'checked\', this.checked)">' +
                '<div class="roster-avatar" style="background:var(--accent)">⚡</div>' +
                '<div class="roster-meta">' +
                    '<div class="roster-name">Claude Code CLI</div>' +
                    '<div class="roster-sub">Streaming · tool events · review gate</div>' +
                '</div>' +
            '</label>' +
            '<div class="roster-cli-config">' +
                '<select id="cli-claude-model">' +
                    '<option value="">Model: default</option>' +
                    '<option value="haiku">haiku (fastest)</option>' +
                    '<option value="sonnet">sonnet</option>' +
                    '<option value="opus">opus (slowest)</option>' +
                '</select>' +
                '<select id="cli-claude-effort">' +
                    '<option value="">Effort: default</option>' +
                    '<option value="low">low (fastest)</option>' +
                    '<option value="medium">medium</option>' +
                    '<option value="high">high</option>' +
                    '<option value="max">max (slowest)</option>' +
                '</select>' +
            '</div>' +
        '</div>' +
        simpleCliRow('codex', 'Codex (OpenAI)', 'Buffered text · configure binary in emptyos.toml', '○') +
        simpleCliRow('gemini', 'Gemini (Google)', 'Buffered text · configure binary in emptyos.toml', '◇');
    var body =
        '<div class="eos-form-group">' +
            '<label class="eos-form-label">Room title</label>' +
            '<input id="group-title" class="eos-form-input" type="text" placeholder="e.g. Brainstorm with Curator + Reviewer" autofocus oninput="onGroupTitleInput(this.value)">' +
            '<div id="group-suggestions" style="display:none;margin-top:8px;font-size:12px"></div>' +
        '</div>' +
        '<div class="roster-section">' +
            '<div class="roster-label">CLI tools <span class="count-pill">3</span></div>' +
            '<div class="roster-list">' + cliRow + '</div>' +
        '</div>' +
        '<div class="roster-section">' +
            '<div class="roster-label">Agents <span class="count-pill">' + pickable.length + '</span></div>' +
            '<div class="roster-list dense" id="group-pick-list">' + agentRows + '</div>' +
        '</div>' +
        '<div class="group-modal-bar">' +
            '<div class="group-modal-status" id="group-modal-status">Select at least 2 participants and enter a title.</div>' +
            '<button class="eos-btn eos-btn-primary" onclick="submitGroupRoom()">Create room</button>' +
        '</div>';
    // The group-pick-list id is reused by submitGroupRoom — we still want the
    // CLI row's checkbox in the same query, so put both lists under that id.
    body = body.replace(
        'id="group-pick-list">',
        'id="group-pick-list" data-section="agents">',
    );
    EOS_UI.modal({title: 'New Group', body: body, width: '600px'});
    // Live status bar — refresh whenever the user toggles a checkbox or edits
    // the title. Event delegation off the modal so we catch dynamic CLI rows.
    var modalEl = document.querySelector('.eos-modal');
    if (modalEl) {
        modalEl.addEventListener('change', function(ev) {
            if (ev.target && ev.target.matches('input[type=checkbox][data-kind]')) {
                updateGroupModalStatus();
            }
        });
        modalEl.addEventListener('input', function(ev) {
            if (ev.target && ev.target.id === 'group-title') updateGroupModalStatus();
        });
    }
    updateGroupModalStatus();
}

// Phase 27 — suggest agents based on the room title the user is typing.
var _suggestTimer = null;
function onGroupTitleInput(v) {
    if (_suggestTimer) clearTimeout(_suggestTimer);
    var q = (v || '').trim();
    var box = document.getElementById('group-suggestions');
    if (!box) return;
    if (q.length < 3) { box.style.display = 'none'; box.innerHTML = ''; return; }
    _suggestTimer = setTimeout(async function() {
        var hits = [];
        try {
            hits = await EOS.api('/rooms/api/suggest-agents?q=' +
                encodeURIComponent(q) + '&limit=3') || [];
        } catch (e) { hits = []; }
        if (!hits.length) { box.style.display = 'none'; box.innerHTML = ''; return; }
        box.innerHTML =
            '<div style="color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Suggested for this title</div>' +
            '<div style="display:flex;flex-wrap:wrap;gap:6px">' +
            hits.map(function(h) {
                var color = agentColor(h.name);
                return '<button class="eos-btn-sm" style="display:inline-flex;align-items:center;gap:6px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:14px;padding:4px 10px;font-size:12px;cursor:pointer" onclick="acceptSuggestion(\'' + escAttr(h.id) + '\')">' +
                    '<span class="member-avatar" style="background:' + color + ';width:18px;height:18px;font-size:9px">' + esc(initial(h.name)) + '</span>' +
                    '<span>' + esc(h.name) + '</span>' +
                    '<span style="color:var(--accent);font-weight:600">+</span>' +
                    '</button>';
            }).join('') +
            '</div>';
        box.style.display = 'block';
    }, 250);
}

function acceptSuggestion(agentId) {
    // Find the agent's checkbox in the roster and tick it.
    var cb = document.querySelector('.roster-pick[data-pick="agent"][data-id="' + agentId + '"] input[type=checkbox]');
    if (cb) {
        cb.checked = true;
        cb.dispatchEvent(new Event('change', {bubbles: true}));
        // Scroll into view so user sees confirmation.
        cb.closest('.roster-pick').scrollIntoView({behavior: 'smooth', block: 'center'});
    } else {
        EOS_UI.toast('Agent not in picker', false);
    }
}

function _groupStatus(msg, isError) {
    var el = document.getElementById('group-modal-status');
    if (!el) return;
    el.textContent = msg;
    el.classList.toggle('err', !!isError);
}

function _groupPickedCount() {
    var modal = document.querySelector('.eos-modal') || document;
    return modal.querySelectorAll('input[type=checkbox][data-kind]:checked').length;
}

// Refresh the inline status line whenever the user toggles a checkbox or
// edits the title. Bound via event delegation in openGroupModal.
function updateGroupModalStatus() {
    var titleEl = document.getElementById('group-title');
    if (!titleEl) return;
    var title = (titleEl.value || '').trim();
    var picked = _groupPickedCount();
    var missing = [];
    if (!title) missing.push('a title');
    if (picked < 2) missing.push((picked === 0 ? 'at least 2 participants' : (2 - picked) + ' more participant' + (2 - picked === 1 ? '' : 's')));
    if (missing.length === 0) {
        _groupStatus('Ready · ' + picked + ' picked', false);
    } else {
        _groupStatus('Add ' + missing.join(' and '), false);
    }
}

async function submitGroupRoom() {
    var titleEl = document.getElementById('group-title');
    var title = (titleEl.value || '').trim();
    if (!title) {
        _groupStatus('Title is required', true);
        EOS_UI.toast('Title is required', false);
        try { titleEl.focus(); titleEl.scrollIntoView({behavior:'smooth', block:'center'}); } catch(e) {}
        return;
    }
    // Both the CLI tools section and the agents grid carry data-kind on
    // their checkboxes. Query all checked checkboxes inside the modal.
    var modal = document.querySelector('.eos-modal-content, .eos-modal') || document;
    var picked = Array.prototype.slice.call(
        modal.querySelectorAll('input[type=checkbox][data-kind]:checked')
    ).map(function(el) {
        var kind = el.getAttribute('data-kind') || 'agent';
        var entry = {type: kind, id: el.value};
        if (kind === 'cli' && el.value === 'claude-cli') {
            var m = document.getElementById('cli-claude-model');
            var e = document.getElementById('cli-claude-effort');
            if (m && m.value) entry.model = m.value;
            if (e && e.value) entry.effort = e.value;
        }
        return entry;
    });
    if (picked.length < 2) {
        var need = 2 - picked.length;
        var msg = 'Pick ' + need + ' more participant' + (need === 1 ? '' : 's') + ' (need at least 2)';
        _groupStatus(msg, true);
        EOS_UI.toast(msg, false);
        try {
            var firstRoster = document.querySelector('.roster-section');
            if (firstRoster) firstRoster.scrollIntoView({behavior:'smooth', block:'start'});
        } catch(e) {}
        return;
    }
    try {
        var room = await EOS.post('/rooms/api/rooms', {title: title, participants: picked});
        if (room && room.error) {
            _groupStatus(room.error, true);
            EOS_UI.toast(room.error, false);
            return;
        }
        EOS_UI.closeModal();
        EOS_UI.toast('Group created');
        await loadAgents();
        if (room && room.id) openChat(room.id);
    } catch(e) {
        var err = 'Failed to create group';
        _groupStatus(err, true);
        EOS_UI.toast(err, false);
    }
}

// Look up display name for a participant id (agent or cli). Falls back to id.
function agentNameById(id) {
    if (id === 'claude-cli') return 'Claude Code CLI';
    if (id === 'codex') return 'Codex';
    if (id === 'gemini') return 'Gemini';
    var a = (agents || []).find(function(x) { return x.id === id; });
    return a ? a.name : id;
}

// Visual descriptor for a participant — used in member chips and assistant
// bubbles. Returns {label, icon, color, type}.
function participantVisual(p) {
    var type = p.type || 'agent';
    var id = p.id || '';
    if (type === 'user') {
        return {label: id || 'me', icon: '👤', color: 'var(--text-muted)', type: type, id: id || 'me'};
    }
    if (type === 'cli') {
        return {label: agentNameById(id), icon: '⚡', color: 'var(--accent)', type: type, id: id};
    }
    var name = agentNameById(id);
    return {label: name, icon: initial(name), color: agentColor(name), type: type, id: id};
}

// Render the per-room member chip strip. Agents/CLI chips are clickable (insert
// @mention). The user chip is shown but non-clickable.
function renderMembers() {
    var bar = document.getElementById('chat-members');
    if (!bar) return;
    if (!currentAgent) { bar.style.display = 'none'; bar.innerHTML = ''; return; }
    var parts = currentAgent.participants;
    if (!parts) {
        // 1:1 (legacy) — synthesise so the UI still shows you + the agent.
        parts = [{type:'user', id:'me'}, {type:'agent', id: currentAgent.id}];
    }
    // Show only when there are 3+ entries (user + ≥2 responders) — i.e. group.
    var responderCount = parts.filter(function(p){
        return p.type === 'agent' || p.type === 'cli';
    }).length;
    if (responderCount < 2) { bar.style.display = 'none'; return; }
    bar.innerHTML = '<span class="chat-members-label">in this room</span>' +
        parts.map(function(p) {
            var v = participantVisual(p);
            var isSelf = v.type === 'user';
            var cls = isSelf ? 'member-chip is-self' : 'member-chip clickable';
            var click = isSelf ? '' : ' onclick="insertMention(\'' + escAttr(v.id) + '\')"';
            return '<span class="' + cls + '"' + click + ' title="' + (isSelf ? 'You' : 'Click to @mention') + '">' +
                '<span class="member-avatar" style="background:' + v.color + '">' + esc(v.icon) + '</span>' +
                '<span>' + esc(v.label) + '</span>' +
                (isSelf ? '' : '<span class="member-id">@' + esc(v.id) + '</span>') +
                '</span>';
        }).join('');
    bar.style.display = '';
}

// --- Global pending dashboard (Phase 6.6) ---
//
// Aggregates pending actions across every room into one review surface.
// Reuses renderPendingCard + applyAction / rejectAction so the cards look
// and behave the same as inline ones. Grouped by room id with the room
// name as a header.

async function refreshGlobalPendingBadge() {
    var btn = document.getElementById('global-pending-btn');
    var countEl = document.getElementById('global-pending-count');
    if (!btn || !countEl) return;
    try {
        var list = await EOS.api('/rooms/api/pending') || [];
        var n = list.length;
        countEl.textContent = String(n);
        btn.style.display = n > 0 ? '' : 'none';
    } catch(e) {
        btn.style.display = 'none';
    }
}

async function openGlobalPending() {
    var list = [];
    try {
        list = await EOS.api('/rooms/api/pending?status=all') || [];
    } catch(e) {
        EOS_UI.toast('Failed to load pending actions', false);
        return;
    }
    // Hydrate _pendingMap so apply/reject DOM updates pick the latest record.
    list.forEach(function(a) { _pendingMap[a.id] = a; });
    // Group by room id; preserve room names from `agents`.
    var byRoom = {};
    list.forEach(function(a) {
        var rid = a.room_id || '(unknown)';
        (byRoom[rid] = byRoom[rid] || []).push(a);
    });
    var pendingTotal = list.filter(function(a){ return a.status === 'pending'; }).length;
    var roomIds = Object.keys(byRoom).sort(function(x, y) {
        // Pending-first room ordering: rooms with any pending sort to top.
        var hx = byRoom[x].some(function(a){ return a.status === 'pending'; });
        var hy = byRoom[y].some(function(a){ return a.status === 'pending'; });
        if (hx !== hy) return hx ? -1 : 1;
        return (agentNameById(x) || x).localeCompare(agentNameById(y) || y);
    });
    var sections;
    if (!roomIds.length) {
        sections = '<div style="color:var(--text-muted);font-size:13px;padding:30px;text-align:center">No pending or resolved actions yet. CLI participants emit [DO:] tags that show up here once the user reviews them.</div>';
    } else {
        sections = roomIds.map(function(rid) {
            var entries = byRoom[rid].slice().sort(function(a, b) {
                if (a.status !== b.status) return a.status === 'pending' ? -1 : 1;
                return (a.ts || '').localeCompare(b.ts || '');
            });
            var pendingForRoom = entries.filter(function(a){ return a.status === 'pending'; }).length;
            var roomName = agentNameById(rid);
            var openLink = '<button class="eos-btn-sm eos-btn-ghost" style="margin-left:auto;font-size:11px" onclick="EOS_UI.closeModal();openChat(\'' + escAttr(rid) + '\')">Open room →</button>';
            return '<div style="margin-bottom:18px">' +
                '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">' +
                    '<span style="font-weight:600;font-size:13px">' + esc(roomName) + '</span>' +
                    (pendingForRoom > 0
                        ? '<span style="font-size:11px;color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent);padding:1px 8px;border-radius:10px">' + pendingForRoom + ' pending</span>'
                        : '<span style="font-size:11px;color:var(--text-muted)">all reviewed</span>') +
                    openLink +
                '</div>' +
                entries.map(renderPendingCard).join('') +
                '</div>';
        }).join('');
    }
    var headerNote = '<div style="font-size:11px;color:var(--text-muted);margin-bottom:12px">' +
        pendingTotal + ' pending across ' + roomIds.length + ' room' + (roomIds.length !== 1 ? 's' : '') +
        ' · click a card\'s Apply or Reject to resolve' +
        '</div>';
    EOS_UI.modal({
        title: '⏳ Pending across all rooms',
        body: headerNote + sections,
        width: '600px',
    });
}

// --- Review gate: pending [DO:] actions (Phase 5) ---

// Per-room cache of pending-action records (any status). Keyed by action id.
// Populated on openChat + replenished after each apply/reject.
var _pendingMap = {};

async function loadPendingForRoom(roomId) {
    _pendingMap = {};
    try {
        var list = await EOS.api('/rooms/api/rooms/' + encodeURIComponent(roomId) + '/pending?status=all') || [];
        list.forEach(function(a) { _pendingMap[a.id] = a; });
    } catch(e) { /* projects/rooms missing — treat as empty */ }
    updatePendingBadge();
}

function updatePendingBadge() {
    var pending = Object.values(_pendingMap).filter(function(a){ return a.status === 'pending'; });
    // Hidden compatibility node — kept so other code paths reading
    // chat-pending-count don't break, but the visible counter is the
    // unified Activity badge.
    var legacy = document.getElementById('chat-pending-count');
    if (legacy) legacy.textContent = pending.length ? '(' + pending.length + ')' : '';
    updateActivityBadge();
    // Refresh the drawer tab count if the drawer is open.
    var tab = document.getElementById('activity-tab-pending-count');
    if (tab) tab.textContent = pending.length ? '(' + pending.length + ')' : '';
}

// Combined Tasks + Pending counter that drives the chat header pill.
// Tasks count comes from the data attribute set by loadRoomTaskCount; the
// pending count is computed from _pendingMap.
function updateActivityBadge() {
    var pill = document.getElementById('chat-activity-count');
    if (!pill) return;
    var pending = Object.values(_pendingMap).filter(function(a){ return a.status === 'pending'; }).length;
    var tasksOpen = parseInt(pill.dataset.tasksOpen || '0', 10) || 0;
    var total = pending + tasksOpen;
    pill.textContent = total ? '(' + total + ')' : '';
}

// --- Inbound dashboard (Phase 12) ---
//
// Replaces the static welcome panel with a live "since you were last here"
// surface. Composes existing data: _unreadMap (loaded by loadAgents),
// /rooms/api/pending (global pending), and history mtime ordering.
// Re-runs whenever the welcome panel is shown.

async function renderInboundDashboard() {
    var w = document.getElementById('chat-welcome');
    if (!w) return;
    if (currentAgent) return;  // chat panel showing instead

    // Compose stats from already-loaded state.
    var unreadEntries = Object.entries(_unreadMap || {});
    var unreadRooms = unreadEntries.length;
    var unreadMessages = unreadEntries.reduce(function(s, kv){
        return s + (kv[1].count || 0);
    }, 0);
    // Pending — fetch fresh in case the user resolved some elsewhere.
    var pending = [];
    try {
        pending = await EOS.api('/rooms/api/pending') || [];
    } catch(e) { pending = []; }
    // Reminders — fired (overdue) + upcoming. Both surfaced separately;
    // fired ones are the most-urgent attention call.
    var reminders = [];
    try {
        reminders = await EOS.api('/rooms/api/reminders?include_fired=1') || [];
    } catch(e) { reminders = []; }
    var firedReminders = reminders.filter(function(r){ return r.fired; });
    var upcomingReminders = reminders.filter(function(r){ return !r.fired; });
    var pendingByRoom = {};
    pending.forEach(function(p) {
        (pendingByRoom[p.room_id] = pendingByRoom[p.room_id] || []).push(p);
    });
    var totalRooms = (agents || []).filter(function(a){
        return a.status !== 'archived';
    }).length;

    // Greeting — adapts to the time of day.
    var hour = new Date().getHours();
    var greeting = hour < 5 ? 'Up late' :
                   hour < 12 ? 'Good morning' :
                   hour < 17 ? 'Good afternoon' :
                   hour < 22 ? 'Good evening' : 'Good night';
    var sub = (unreadRooms || pending.length || firedReminders.length)
        ? 'Some things waiting for you.'
        : 'All caught up.';

    // Section: Fired reminders (most urgent — surface first).
    var firedHtml = '';
    if (firedReminders.length) {
        firedHtml = '<div class="inbound-section"><h3>⏰ Reminders fired (' + firedReminders.length + ')</h3>' +
            firedReminders.slice(0, 6).map(function(r) {
                var room = (agents || []).find(function(a){ return a.id === r.room_id; });
                var name = room ? room.name : r.room_id;
                var when = new Date(r.due_ts).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                var noteHtml = r.note ? '<div class="row-sub">' + esc(r.note) + '</div>' : '';
                var color = room ? agentColor(name) : 'var(--accent)';
                var icon = room && room.tier === 'group' ? '👥' : (room ? initial(name) : '⏰');
                return '<div class="inbound-row" onclick="dismissAndOpenReminder(\'' + escAttr(r.id) + '\',\'' + escAttr(r.room_id) + '\')">' +
                    '<div class="row-avatar" style="background:' + color + '">' + esc(icon) + '</div>' +
                    '<div class="row-meta">' +
                        '<div class="row-title">' + esc(name) + '</div>' +
                        (noteHtml || '<div class="row-sub">' + esc(when) + '</div>') +
                    '</div>' +
                    '<span class="row-tag">due ' + esc(when) + '</span>' +
                    '</div>';
            }).join('') +
            '</div>';
    }

    // Section: Unread.
    var unreadHtml = '';
    if (unreadEntries.length) {
        var unreadRows = unreadEntries.slice().sort(function(a,b){
            return (b[1].last_ts || '').localeCompare(a[1].last_ts || '');
        }).slice(0, 6).map(function(kv) {
            var rid = kv[0];
            var info = kv[1];
            var room = (agents || []).find(function(a){ return a.id === rid; });
            if (!room) return '';
            var color = agentColor(room.name);
            var icon = (room.tier === 'group') ? '👥' : initial(room.name);
            var when = info.last_ts ? new Date(info.last_ts).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
            return '<div class="inbound-row" onclick="openChat(\'' + escAttr(rid) + '\')">' +
                '<div class="row-avatar" style="background:' + color + '">' + esc(icon) + '</div>' +
                '<div class="row-meta">' +
                    '<div class="row-title">' + esc(room.name) + '</div>' +
                    '<div class="row-sub">' + esc(when) + '</div>' +
                '</div>' +
                '<span class="row-tag">' + info.count + ' new</span>' +
                '</div>';
        }).filter(Boolean).join('');
        unreadHtml = '<div class="inbound-section">' +
            '<h3>What\'s new (' + unreadRooms + ')</h3>' +
            unreadRows +
            '</div>';
    }

    // Section: Pending review.
    var pendingHtml = '';
    var pendingRoomIds = Object.keys(pendingByRoom);
    if (pendingRoomIds.length) {
        var pendingRows = pendingRoomIds.slice(0, 6).map(function(rid) {
            var entries = pendingByRoom[rid];
            var room = (agents || []).find(function(a){ return a.id === rid; });
            var roomName = room ? room.name : rid;
            var color = room ? agentColor(roomName) : 'var(--accent)';
            var icon = room && room.tier === 'group' ? '👥' : (room ? initial(roomName) : '⏳');
            var verbs = entries.slice(0, 3).map(function(p){
                return p.app + '.' + p.method;
            }).join(', ');
            return '<div class="inbound-row" onclick="openChat(\'' + escAttr(rid) + '\')">' +
                '<div class="row-avatar" style="background:' + color + '">' + esc(icon) + '</div>' +
                '<div class="row-meta">' +
                    '<div class="row-title">' + esc(roomName) + '</div>' +
                    '<div class="row-sub">' + esc(verbs) + (entries.length > 3 ? ' +' + (entries.length - 3) + ' more' : '') + '</div>' +
                '</div>' +
                '<span class="row-tag">' + entries.length + ' to review</span>' +
                '</div>';
        }).join('');
        pendingHtml = '<div class="inbound-section">' +
            '<h3>Pending review (' + pending.length + ')</h3>' +
            pendingRows +
            '<div style="text-align:right;margin-top:6px"><button class="eos-btn-sm eos-btn-ghost" onclick="openGlobalPending()">Review all →</button></div>' +
            '</div>';
    }

    // Section: Recent (rooms not in unread, sorted by some recency proxy).
    var unreadIds = new Set(unreadEntries.map(function(kv){ return kv[0]; }));
    var recentCandidates = (agents || []).filter(function(a){
        return a.status !== 'archived' && !unreadIds.has(a.id);
    });
    // Best-effort recency: created or builtin? we don't have last_ts on agents
    // here, so just sort alphabetically and cap at 5 — non-time-sensitive.
    recentCandidates.sort(function(a, b) {
        return (a.name || '').localeCompare(b.name || '');
    });
    var recentRows = recentCandidates.slice(0, 5).map(function(a) {
        var color = agentColor(a.name);
        var icon = (a.tier === 'group') ? '👥' : initial(a.name);
        var preview = (a.system_prompt || '').replace(/\s+/g,' ').slice(0, 90);
        if (a.tier === 'group') {
            var rs = (a.participants || []).filter(function(p){
                return p.type === 'agent' || p.type === 'cli';
            }).length;
            preview = rs + ' participants';
        }
        return '<div class="inbound-row" onclick="openChat(\'' + escAttr(a.id) + '\')">' +
            '<div class="row-avatar" style="background:' + color + '">' + esc(icon) + '</div>' +
            '<div class="row-meta">' +
                '<div class="row-title">' + esc(a.name) + '</div>' +
                '<div class="row-sub">' + esc(preview || 'No prompt set') + '</div>' +
            '</div></div>';
    }).join('');
    var recentHtml = recentRows ? '<div class="inbound-section">' +
        '<h3>Other rooms</h3>' + recentRows + '</div>' : '';

    // Stat strip.
    var statHtml =
        '<div class="inbound-stats">' +
            '<div class="inbound-stat' + (unreadMessages ? ' has-attn' : '') + '">' +
                '<div class="v">' + unreadMessages + '</div>' +
                '<div class="l">Unread</div>' +
            '</div>' +
            '<div class="inbound-stat' + (pending.length ? ' has-attn' : '') + '">' +
                '<div class="v">' + pending.length + '</div>' +
                '<div class="l">Pending</div>' +
            '</div>' +
            '<div class="inbound-stat' + (firedReminders.length ? ' has-attn' : '') + '">' +
                '<div class="v">' + firedReminders.length + '</div>' +
                '<div class="l">Reminders</div>' +
            '</div>' +
            '<div class="inbound-stat">' +
                '<div class="v">' + totalRooms + '</div>' +
                '<div class="l">Rooms</div>' +
            '</div>' +
        '</div>';

    // Empty case — no unread, no pending, no fired reminders.
    var allCaughtUp = !unreadEntries.length && !pending.length && !firedReminders.length;
    var dashboard =
        '<div class="inbound-dashboard">' +
            '<div class="inbound-greeting">' + esc(greeting) + '</div>' +
            '<div class="inbound-sub">' + esc(sub) + '</div>' +
            statHtml +
            firedHtml +
            unreadHtml +
            pendingHtml +
            (allCaughtUp ? '<div class="inbound-empty">No unread messages, no pending actions, no due reminders. Pick a room from the sidebar — or hit + Agent / + Group to start a new one.</div>' : '') +
            recentHtml +
        '</div>';
    w.innerHTML = dashboard;
    w.style.display = 'flex';
    w.style.padding = '0';
    w.style.alignItems = 'stretch';
}

// --- Context inspector (Phase 19) ---
//
// Pure visualization — fetches /api/rooms/<id>/inspect and renders sections
// with char counts so the user can see what's being sent (and how much).
// No LLM call is made; this just rebuilds the prompt structure.

async function inspectRoomContext() {
    if (!currentAgent) return;
    var data;
    try {
        data = await EOS.api('/rooms/api/rooms/' +
            encodeURIComponent(currentAgent.id) + '/inspect');
    } catch (e) {
        EOS_UI.toast('Failed to load context', false);
        return;
    }
    if (!data || data.error) {
        EOS_UI.toast(data && data.error ? data.error : 'No context', false);
        return;
    }
    function section(label, body, chars, extras) {
        var k = chars != null ? '<span style="margin-left:auto;font-size:11px;color:var(--text-muted)">' + chars + ' chars</span>' : '';
        return '<details open style="margin-bottom:12px">' +
            '<summary style="cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:6px">' +

// --- Reminders (Phase 17) ---
//
// Lightweight duration parser for slash command input. Accepts:
//   <num><unit>  m/h/d/w  (e.g. 30m, 2h, 1d, 1w)
//   tomorrow                (default 09:00 next day, local time)
//   "next week" / nextweek  (7 days from now)
//   <h>:<m>                 (today at HH:MM, or tomorrow if past)
// Returns ISO timestamp (UTC) or null when unparseable.

function parseReminderWhen(s) {
    var raw = (s || '').trim();
    if (!raw) return null;
    var lower = raw.toLowerCase();

    // Numeric duration: 30m / 2h / 1d / 1w (optional spaces, full words ok).
    var dur = lower.match(/^(\d+)\s*(m|min|mins|minute|minutes|h|hr|hrs|hour|hours|d|day|days|w|wk|week|weeks)$/);
    if (dur) {
        var n = parseInt(dur[1], 10);
        var u = dur[2];
        var ms = 0;
        if (u[0] === 'm') ms = n * 60 * 1000;
        else if (u[0] === 'h') ms = n * 60 * 60 * 1000;
        else if (u[0] === 'd') ms = n * 24 * 60 * 60 * 1000;
        else if (u[0] === 'w') ms = n * 7 * 24 * 60 * 60 * 1000;
        return new Date(Date.now() + ms).toISOString();
    }
    if (lower === 'tomorrow' || lower === 'tmr') {
        var t = new Date();
        t.setDate(t.getDate() + 1);
        t.setHours(9, 0, 0, 0);
        return t.toISOString();
    }
    if (lower === 'next week' || lower === 'nextweek') {
        return new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString();
    }
    // HH:MM today (or tomorrow if past).
    var hm = lower.match(/^(\d{1,2}):(\d{2})$/);
    if (hm) {
        var t2 = new Date();
        t2.setHours(parseInt(hm[1], 10), parseInt(hm[2], 10), 0, 0);
        if (t2.getTime() <= Date.now()) t2.setDate(t2.getDate() + 1);
        return t2.toISOString();
    }
    return null;
}

// Dismiss a fired reminder and jump into its room. Removes the reminder
// (it's done its job) so the dashboard stays clean on next refresh.
async function dismissAndOpenReminder(reminderId, roomId) {
    try {
        await EOS.api('/rooms/api/reminders/' + encodeURIComponent(reminderId), {method:'DELETE'});
    } catch(e) { /* ignore — opening the room is the main goal */ }
    if (roomId) openChat(roomId);
}

async function scheduleReminder(rest) {
    if (!currentAgent) return;
    var input = (rest || '').trim();
    // Split on the first whitespace AFTER a recognized when-token.
    // Simplest: try the whole input as a duration; if that fails, split on
    // first space and use the head as the duration, the tail as the note.
    var when = parseReminderWhen(input);
    var note = '';
    if (!when) {
        var idx = input.search(/\s/);
        if (idx > 0) {
            when = parseReminderWhen(input.slice(0, idx));
            note = input.slice(idx + 1).trim();
        }
    }
    if (!when) {
        EOS_UI.toast('Usage: /remind <30m|2h|1d|tomorrow|14:30> [note]', false);
        return;
    }
    try {
        var res = await EOS.post('/rooms/api/rooms/' +
            encodeURIComponent(currentAgent.id) + '/remind',
            {due_ts: when, note: note});
        if (res && res.error) { EOS_UI.toast(res.error, false); return; }
        var local = new Date(when).toLocaleString([], {
            month:'short', day:'numeric', hour:'2-digit', minute:'2-digit',
        });
        EOS_UI.toast('Reminder set: ' + local);
    } catch(e) {
        EOS_UI.toast('Failed to set reminder', false);
    }
}

// Per-room cron + prompt. On fire, the agent self-monologues into history.

var SCHEDULE_PRESETS = [

        '<div class="eos-form-group">' +

            '<div style="font-size:11px;color:var(--text-muted);margin-top:4px">Format: minute hour day month weekday. <a href="https://crontab.guru" target="_blank" style="color:var(--accent)">crontab.guru</a> if unsure.</div>' +

async function saveRoomSchedule() {
    if (!currentAgent) return;
    var cron = (document.getElementById('sched-cron').value || '').trim();
    var prompt = (document.getElementById('sched-prompt').value || '').trim();
    var enabled = document.getElementById('sched-enabled').checked;
    if (!cron || !prompt) { EOS_UI.toast('Cron and prompt required', false); return; }
    try {
        var res = await EOS.post('/rooms/api/rooms/' +
            encodeURIComponent(currentAgent.id) + '/schedule',
            {cron: cron, prompt: prompt, enabled: enabled});
        if (res && res.error) { EOS_UI.toast(res.error, false); return; }
        currentAgent.schedule = res.schedule;
        var cached = (agents || []).find(function(a){ return a.id === currentAgent.id; });
        if (cached) cached.schedule = res.schedule;
        EOS_UI.closeModal();
        EOS_UI.toast(enabled ? 'Schedule saved' : 'Schedule saved (disabled)');
    } catch(e) { EOS_UI.toast('Failed to save', false); }
}

async function clearRoomSchedule() {
    if (!currentAgent) return;
    if (!await EOS_UI.confirm('Remove the schedule for this room?')) return;
    try {
        await EOS.api('/rooms/api/rooms/' + encodeURIComponent(currentAgent.id) +
            '/schedule', {method:'DELETE'});
        delete currentAgent.schedule;
        var cached = (agents || []).find(function(a){ return a.id === currentAgent.id; });
        if (cached) delete cached.schedule;
        EOS_UI.closeModal();
        EOS_UI.toast('Schedule cleared');
    } catch(e) { EOS_UI.toast('Failed to clear', false); }
}

async function fireScheduleNow() {
    if (!currentAgent) return;
    EOS_UI.toast('Firing scheduled prompt…');
    try {
        await EOS.post('/rooms/api/rooms/' + encodeURIComponent(currentAgent.id) +
            '/fire-schedule', {});
        EOS_UI.closeModal();
        EOS_UI.toast('Fired — open the room to see the message');
    } catch(e) { EOS_UI.toast('Fire failed', false); }
}

// --- Reply threading (Phase 25) ---
//
// Composing a reply: clicking the ↩ on a message stamps `_replyTo` and
// shows a context chip above the input. sendMessage attaches reply_to to
// the user message before persisting. Render walks the message list in
// renderMessages and prepends a quote box to any message with reply_to.

var _replyTo = null;  // {ts, speaker, preview}
var _msgIndexByTs = {};  // built in renderMessages, used by reply quote lookups

function startReply(ts) {
    if (!ts) return;
    var m = _msgIndexByTs[ts];
    if (!m) return;
    var actor = m.actor || {};
    var speaker = actor.id || (m.role === 'user' ? 'me' : 'assistant');
    var preview = (m.text || '').replace(/\s+/g, ' ').slice(0, 80);
    _replyTo = {ts: ts, speaker: speaker, preview: preview};
    var ctx = document.getElementById('reply-context');
    var txt = document.getElementById('reply-context-text');
    if (ctx && txt) {
        txt.innerHTML = '<strong>' + esc(speaker) + ':</strong> ' + esc(preview);
        ctx.classList.add('open');
    }
    var input = document.getElementById('chat-input');
    if (input) input.focus();
}

function cancelReply() {
    _replyTo = null;
    var ctx = document.getElementById('reply-context');
    if (ctx) ctx.classList.remove('open');
}

// --- Bulk operations (Phase 24) ---
//
// Body class `bulk-select-on` triggers the per-item checkbox styling.
// Clicks on .agent-item are intercepted in bulk mode (delegation in
// chatPanelDelegate) and toggle a `bulk-selected` class instead of opening
// the chat. The action bar at the bottom-left fires Archive / Delete on
// every selected room sequentially.

var _bulkSelected = new Set();

function setBulkSelect(on) {
    document.body.classList.toggle('bulk-select-on', !!on);
    var btn = document.getElementById('bulk-toggle-btn');
    if (btn) btn.textContent = on ? '☑' : '☐';
    if (!on) {
        _bulkSelected.clear();
        document.querySelectorAll('.agent-item.bulk-selected').forEach(function(el){
            el.classList.remove('bulk-selected');
        });
        var bar = document.getElementById('bulk-action-bar');
        if (bar) bar.classList.remove('open');
    } else {
        // Show the bar with 0 selected — visual hint.
        var bar2 = document.getElementById('bulk-action-bar');
        if (bar2) bar2.classList.add('open');
        updateBulkSelectedCount();
    }
}

function toggleBulkSelect() {
    setBulkSelect(!document.body.classList.contains('bulk-select-on'));
}

function updateBulkSelectedCount() {
    var n = _bulkSelected.size;
    var el = document.getElementById('bulk-selected-count');
    if (el) el.textContent = String(n);
}

// Click on an agent-item in bulk mode toggles selection instead of opening.
// Wired via event delegation on the sidebar.
document.addEventListener('click', function(ev) {
    if (!document.body.classList.contains('bulk-select-on')) return;
    var item = ev.target.closest('.agent-item');
    if (!item) return;
    // Need to extract the room id — the existing inline onclick is
    // openChat('<id>') so we read it from there to avoid restructuring
    // every render path.
    var oc = item.getAttribute('onclick') || '';
    var m = oc.match(/openChat\('([^']+)'\)/);
    if (!m) return;
    ev.preventDefault();
    ev.stopPropagation();
    var rid = m[1];
    if (_bulkSelected.has(rid)) {
        _bulkSelected.delete(rid);
        item.classList.remove('bulk-selected');
    } else {
        _bulkSelected.add(rid);
        item.classList.add('bulk-selected');
    }
    updateBulkSelectedCount();
}, true);  // capture phase so we beat the inline onclick

async function bulkArchive() {
    var ids = Array.from(_bulkSelected);
    if (!ids.length) { EOS_UI.toast('Nothing selected', false); return; }
    if (!await EOS_UI.confirm('Archive ' + ids.length + ' room' + (ids.length !== 1 ? 's' : '') + '?')) return;
    var ok = 0, fail = 0;
    for (var i = 0; i < ids.length; i++) {
        try {
            var res = await EOS.post('/rooms/api/rooms/' + encodeURIComponent(ids[i]) + '/archive', {});
            if (res && res.error) fail++; else ok++;
        } catch(e) { fail++; }
    }
    EOS_UI.toast('Archived ' + ok + (fail ? ' · ' + fail + ' failed' : ''));
    setBulkSelect(false);
    await loadAgents();
}

async function bulkDelete() {
    var ids = Array.from(_bulkSelected);
    if (!ids.length) { EOS_UI.toast('Nothing selected', false); return; }
    if (!await EOS_UI.confirm('Delete ' + ids.length + ' room' + (ids.length !== 1 ? 's' : '') + ' and all their history? Cannot be undone.')) return;
    var ok = 0, fail = 0, builtin = 0;
    for (var i = 0; i < ids.length; i++) {
        try {
            var res = await EOS.api('/rooms/api/agents/' + encodeURIComponent(ids[i]), {method:'DELETE'});
            if (res && res.error) {
                // Builtin rooms refuse delete — count separately.
                if (/builtin/i.test(res.error)) builtin++;
                else fail++;
            } else ok++;
        } catch(e) { fail++; }
    }
    var parts = ['Deleted ' + ok];
    if (builtin) parts.push(builtin + ' builtin (skipped)');
    if (fail) parts.push(fail + ' failed');
    EOS_UI.toast(parts.join(' · '));
    setBulkSelect(false);
    // If the open room got deleted, drop back to the welcome panel.
    if (currentAgent && ids.indexOf(currentAgent.id) >= 0) {
        currentAgent = null;
        document.getElementById('chat-welcome').style.display = '';
        document.getElementById('chat-header').style.display = 'none';
        document.getElementById('chat-messages').style.display = 'none';
        document.getElementById('chat-input-bar').style.display = 'none';
        var mb = document.getElementById('chat-members'); if (mb) { mb.style.display = 'none'; mb.innerHTML = ''; }
    }
    await loadAgents();
}

// --- Snippet library (Phase 21) ---
//
// Save reusable prompt fragments by name; recall via /snip <name>. Useful
// for repeated workflows like "review this code for security issues".
// Storage is server-side so snippets survive across browsers.

async function saveSnippetFromInput(rest) {
    var name = (rest || '').trim().toLowerCase();
    if (!name) {
        EOS_UI.toast('Usage: /save <name>', false);
        return;
    }
    var input = document.getElementById('chat-input');
    var body = input ? (input.value || '').replace(/^\/save\s+\S+\s*/i, '').trim() : '';
    // When the user typed only `/save <name>` without a body, open a modal
    // to capture it. Avoids window.prompt (forbidden under DL-6: native
    // dialogs break the design language and are unstyleable).
    if (!body || body === '/save ' + name || body.startsWith('/save')) {
        EOS_UI.formModal('Save snippet "' + name + '"', [
            {key: 'body', label: 'Snippet body', type: 'textarea', placeholder: 'The prompt fragment to save…'},
        ], async function(values) {
            var b = (values && values.body || '').trim();
            if (!b) { EOS_UI.toast('Snippet body is empty', false); return; }
            await _persistSnippet(name, b);
        });
        return;
    }
    await _persistSnippet(name, body);
}

async function _persistSnippet(name, body) {
    try {
        var res = await EOS.post('/rooms/api/snippets', {name: name, body: body});
        if (res && res.error) { EOS_UI.toast(res.error, false); return; }
        EOS_UI.toast(res.updated ? 'Snippet updated' : 'Snippet saved');
        var input = document.getElementById('chat-input');
        if (input) { input.value = ''; input.style.height = 'auto'; }
    } catch(e) {
        EOS_UI.toast('Failed to save', false);
    }
}

async function expandSnippetToInput(rest) {
    var name = (rest || '').trim().toLowerCase().split(/\s+/)[0];
    if (!name) { EOS_UI.toast('Usage: /snip <name>', false); return; }
    try {
        var res = await EOS.api('/rooms/api/snippets/' + encodeURIComponent(name));
        if (!res || res.error) { EOS_UI.toast(res && res.error || 'Not found', false); return; }
        var input = document.getElementById('chat-input');
        if (!input) return;
        input.value = res.body || '';
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
        input.focus();
        var pos = input.value.length;
        input.selectionStart = input.selectionEnd = pos;
    } catch(e) {
        EOS_UI.toast('Failed to load snippet', false);
    }
}

async function openSnippetsLibrary() {
    var snippets = [];
    try { snippets = await EOS.api('/rooms/api/snippets') || []; }
    catch(e) { EOS_UI.toast('Failed to load library', false); return; }
    var rows;
    if (!snippets.length) {
        rows = '<div style="color:var(--text-muted);font-size:13px;padding:30px;text-align:center">No snippets yet. Type a prompt in any room\'s input, then run <code style="background:var(--bg-elevated);padding:1px 5px;border-radius:3px">/save name</code>.</div>';
    } else {
        rows = snippets.map(function(s) {
            var preview = (s.body || '').replace(/\s+/g, ' ').slice(0, 100);
            var meta = (s.used_count > 0 ? 'used ' + s.used_count + '× · ' : '') +
                       (s.updated ? new Date(s.updated).toLocaleDateString([], {month:'short', day:'numeric'}) : '');
            return '<div style="display:flex;align-items:flex-start;gap:8px;padding:10px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px">' +
                '<div style="flex:1;min-width:0">' +
                    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">' +
                        '<code style="background:var(--bg-elevated);padding:2px 6px;border-radius:4px;font-size:12px;font-weight:600">/' + esc(s.name) + '</code>' +
                        '<span style="font-size:11px;color:var(--text-muted)">' + esc(meta) + '</span>' +
                    '</div>' +
                    '<div style="font-size:12px;color:var(--text);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">' + esc(preview) + '</div>' +
                '</div>' +
                '<div style="display:flex;gap:4px;flex-shrink:0">' +
                    '<button class="eos-btn-sm" onclick="useSnippetFromLibrary(\'' + escAttr(s.name) + '\')" style="background:var(--accent);color:var(--accent-ink);border:0;font-size:11px">Use</button>' +
                    '<button class="eos-btn-sm eos-btn-ghost" onclick="deleteSnippetFromLibrary(\'' + escAttr(s.name) + '\')" style="font-size:11px">×</button>' +
                '</div>' +
                '</div>';
        }).join('');
    }
    EOS_UI.modal({
        title: '📋 Snippets',
        body: '<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">Saved prompt fragments — type <code style="background:var(--bg-elevated);padding:1px 5px;border-radius:3px">/snip name</code> in any chat input to drop one in.</div>' + rows,
        width: '600px',
    });
}

async function useSnippetFromLibrary(name) {
    EOS_UI.closeModal();
    if (!currentAgent) {
        EOS_UI.toast('Open a room first', false);
        return;
    }
    expandSnippetToInput(name);
}

async function deleteSnippetFromLibrary(name) {
    if (!await EOS_UI.confirm('Delete snippet /' + name + '?')) return;
    try {
        await EOS.api('/rooms/api/snippets/' + encodeURIComponent(name), {method:'DELETE'});
        EOS_UI.toast('Deleted');
        openSnippetsLibrary();  // refresh
    } catch(e) { EOS_UI.toast('Delete failed', false); }
}

// --- Voice playback (Phase 20) ---
//
// Browser-native speechSynthesis. Per-message 🔊 button speaks the bubble
// content. Per-room auto-speak toggle (localStorage) auto-fires after the
// streaming reply completes. New utterance always cancels any queued one.

var _autoSpeakKey = function(rid) { return 'rooms.autospeak.v1.' + rid; };

function isAutoSpeakOn(roomId) {
    try { return localStorage.getItem(_autoSpeakKey(roomId)) === '1'; }
    catch (e) { return false; }
}

function setAutoSpeak(roomId, on) {
    try {
        if (on) localStorage.setItem(_autoSpeakKey(roomId), '1');
        else localStorage.removeItem(_autoSpeakKey(roomId));
    } catch (e) {}
}

function speakStop() {
    try { window.speechSynthesis && window.speechSynthesis.cancel(); }
    catch (e) {}
}

function speakText(text) {
    if (!text || !window.speechSynthesis) return;
    speakStop();
    // Strip task markers + wikilinks + code blocks for cleaner TTS.
    var clean = String(text)
        .replace(/```[\s\S]*?```/g, ' code block ')
        .replace(/\[\[([^\]]+)\]\]/g, '$1')
        .replace(/🗨️\s*\S+/g, '')
        .replace(/📅\s*\d{4}-\d{2}-\d{2}/g, '')
        .replace(/✅\s*\d{4}-\d{2}-\d{2}/g, '')
        .trim();
    if (!clean) return;
    try {
        var u = new SpeechSynthesisUtterance(clean);
        u.rate = 1.05;
        u.pitch = 1.0;
        window.speechSynthesis.speak(u);
    } catch (e) {}
}

function toggleSpeakMessage(ts, text) {
    if (!window.speechSynthesis) {
        EOS_UI.toast('Browser TTS not available', false);
        return;
    }
    if (window.speechSynthesis.speaking) {
        speakStop();
        return;
    }
    speakText(text);
}

function toggleAutoSpeak() {
    if (!currentAgent) return;
    var wasOn = isAutoSpeakOn(currentAgent.id);
    setAutoSpeak(currentAgent.id, !wasOn);
    EOS_UI.toast('Auto-speak ' + (wasOn ? 'off' : 'on'));
    speakStop();
}

// --- Drafts (Phase 16) ---
//
// localStorage-backed per-room drafts so accidental tab close, browser quit,
// or daemon restart don't lose typing. Saved on every input event (debounced
// 400ms), restored on openChat, cleared on successful send.
//
// Format: localStorage["rooms.draft.v1.<room_id>"] = JSON({text, ts}).
// Cap: prune entries older than 30 days on load to keep storage tidy.

var _draftSaveTimer = null;
var DRAFT_PREFIX = 'rooms.draft.v1.';
var DRAFT_MAX_AGE_DAYS = 30;

function _draftKey(roomId) { return DRAFT_PREFIX + roomId; }

function saveDraft(roomId, text) {
    if (!roomId) return;
    if (!text || !text.trim()) {
        try { localStorage.removeItem(_draftKey(roomId)); } catch(e) {}
        return;
    }
    try {
        localStorage.setItem(_draftKey(roomId), JSON.stringify({
            text: text, ts: new Date().toISOString(),
        }));
    } catch(e) { /* quota exceeded — silent */ }
}

function loadDraft(roomId) {
    if (!roomId) return null;
    try {
        var raw = localStorage.getItem(_draftKey(roomId));
        if (!raw) return null;
        var d = JSON.parse(raw);
        return d && typeof d.text === 'string' ? d : null;
    } catch(e) { return null; }
}

function clearDraft(roomId) {
    if (!roomId) return;
    try { localStorage.removeItem(_draftKey(roomId)); } catch(e) {}
}

function pruneOldDrafts() {
    var cutoff = Date.now() - DRAFT_MAX_AGE_DAYS * 86400 * 1000;
    try {
        var stale = [];
        for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (!k || !k.startsWith(DRAFT_PREFIX)) continue;
            try {
                var d = JSON.parse(localStorage.getItem(k));
                if (d && d.ts && new Date(d.ts).getTime() < cutoff) stale.push(k);
            } catch(e) { stale.push(k); }
        }
        stale.forEach(function(k){ localStorage.removeItem(k); });
    } catch(e) { /* private mode / quota — silent */ }
}

function scheduleDraftSave() {
    if (!currentAgent) return;
    if (_draftSaveTimer) clearTimeout(_draftSaveTimer);
    _draftSaveTimer = setTimeout(function() {
        var input = document.getElementById('chat-input');
        if (!input || !currentAgent) return;
        saveDraft(currentAgent.id, input.value || '');
    }, 400);
}

// Run once on page load — keep localStorage tidy.
pruneOldDrafts();

function scrollToMessage(ts) {
    if (!ts) return;
    var node = document.querySelector('.msg[data-ts="' + ts + '"]');
    if (!node) return;
    node.scrollIntoView({behavior: 'smooth', block: 'center'});
    // Brief highlight so the eye lands.

// --- Catch me up (Phase 9c) ---
//
// When openChat lands a room with N>0 messages received since last visit,
// inject a banner above the thread offering to summarise. Doesn't trigger
// when N is huge (likely first visit) or when the user sent the last turn.

function maybeRenderCatchUpBanner(messages, lastVisited) {
    if (!currentAgent) return;
    var el = document.getElementById('chat-messages');
    if (!el || !messages || !messages.length) return;
    if (!lastVisited) return;  // first visit: empty-state already covers
    var newCount = 0;
    for (var i = 0; i < messages.length; i++) {
        var m = messages[i];
        var ts = m.ts || '';
        if (!ts || ts <= lastVisited) continue;
        if (m.role === 'user') continue;
        newCount++;
    }
    if (newCount < 1 || newCount > 50) return;
    var banner = document.createElement('div');
    banner.className = 'catch-up-banner';
    banner.id = 'catch-up-banner';
    banner.innerHTML =
        '<div class="cu-text"><strong>' + newCount + '</strong> new message' +
            (newCount !== 1 ? 's' : '') + ' since you were last here.</div>' +
        '<div class="cu-actions" style="display:flex;gap:6px">' +
            '<button class="eos-btn-sm eos-btn-ghost" onclick="dismissCatchUp()">Dismiss</button>' +
            '<button class="eos-btn-sm" style="background:var(--accent);color:var(--accent-ink);border:0" onclick="runCatchUp(\'' + escAttr(lastVisited) + '\')">Catch me up</button>' +
        '</div>' +
        '<div class="cu-summary" id="cu-summary"></div>';
    el.insertBefore(banner, el.firstChild);
}

function dismissCatchUp() {
    var b = document.getElementById('catch-up-banner');
    if (b) b.remove();
}

async function runCatchUp(sinceTs) {
    if (!currentAgent) return;
    var banner = document.getElementById('catch-up-banner');
    var summaryEl = document.getElementById('cu-summary');
    if (!banner || !summaryEl) return;
    summaryEl.textContent = 'Summarising…';
    banner.classList.add('expanded');
    try {
        var res = await EOS.post('/rooms/api/rooms/' +
            encodeURIComponent(currentAgent.id) + '/catch-up',
            {since: sinceTs});
        if (res && res.error) { summaryEl.textContent = 'Error: ' + res.error; return; }
        summaryEl.innerHTML = (typeof EOS_UI !== 'undefined' && EOS_UI.renderMarkdown)
            ? EOS_UI.renderMarkdown(res.summary || '(no summary)')
            : esc(res.summary || '(no summary)');
        // Add a small "dismiss" inside the expanded panel
        var dismiss = document.createElement('button');
        dismiss.className = 'eos-btn-sm eos-btn-ghost';
        dismiss.style.cssText = 'align-self:flex-end;margin-top:6px';
        dismiss.textContent = 'Got it';
        dismiss.onclick = dismissCatchUp;
        banner.appendChild(dismiss);
    } catch(e) {
        summaryEl.textContent = 'Failed to summarise.';
    }
}

async function toggleRoomArchive() {
    if (!currentAgent) return;
    var isArchived = currentAgent.status === 'archived';
    var verb = isArchived ? 'unarchive' : 'archive';
    if (!isArchived && !await EOS_UI.confirm('Archive ' + currentAgent.name +
        '? It will move to the Archived tab. Reversible.')) return;
    try {
        var res = await EOS.post('/rooms/api/rooms/' +
            encodeURIComponent(currentAgent.id) + '/' + verb, {});
        if (res && res.error) { EOS_UI.toast(res.error, false); return; }
        EOS_UI.toast(isArchived ? 'Restored' : 'Archived');
        await loadAgents();
        // Drop the chat panel back to welcome — archived rooms shouldn't
        // stay open as the active conversation.
        if (!isArchived) {
            currentAgent = null;
            document.getElementById('chat-welcome').style.display = '';
            document.getElementById('chat-header').style.display = 'none';
            document.getElementById('chat-messages').style.display = 'none';
            document.getElementById('chat-input-bar').style.display = 'none';
            var mb = document.getElementById('chat-members'); if (mb) { mb.style.display = 'none'; mb.innerHTML = ''; }
        } else {
            // Reload the current room with fresh status.
            currentAgent = (agents || []).find(function(a){ return a.id === currentAgent.id; });
        }
    } catch(e) {
        EOS_UI.toast(verb + ' failed', false);
    }
}

async function exportChatToVault() {
    if (!currentAgent) return;
    try {
        var res = await EOS.post('/rooms/api/rooms/' +
            encodeURIComponent(currentAgent.id) + '/export', {});

async function distillRoom() {
    if (!currentAgent) return;
    if (!await EOS_UI.confirm('Distill this room into a KB note? Uses the room\'s default model — may take ~10s.')) return;
    EOS_UI.toast('Distilling…');
    try {

function toggleChatOverflow(ev) {

        return (a.ts || '').localeCompare(b.ts || '');
    });

    var resolved = all.filter(function(a){ return a.status !== 'pending'; });

            html += '<div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin:18px 0 8px">History (' + resolved.length + ')</div>';
            html += resolved.map(renderPendingCard).join('');

// Tasks tab has two sub-views: tasks attached to THIS room vs the universal
// vault-wide pool. Sub-tab + filter state persist for the drawer's lifetime

var _taskSubTab = 'attached';   // 'attached' | 'all'
var _allTasksFilter = 'open';   // 'open' | 'today' | 'overdue' | 'done'
var _allTasksQuery = '';

async function renderActivityTasksTab() {

async function _renderAttachedTasksSubview() {
    var sub = document.getElementById('task-subview');

    var tasks = [];

async function _renderAllTasksSubview() {
    var sub = document.getElementById('task-subview');
    if (!sub || !currentAgent) return;
    var roomId = currentAgent.id;
    var statusParam = _allTasksFilter;  // backend handles open/today/overdue/done
    var url = '/task/api/list';
    var tasks = [];
    try {
        tasks = await EOS.api(url) || [];
    } catch(e) {
        sub.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:20px;text-align:center">Task aggregator unavailable. The /task/ app may not be loaded.</div>';
        return;
    }
    var today = new Date().toISOString().slice(0, 10);
    function matchesFilter(t) {
        if (_allTasksFilter === 'done') return !!t.done;
        if (t.done) return false;
        if (_allTasksFilter === 'today') return t.due === today || (t.overdue_days || 0) > 0;
        if (_allTasksFilter === 'overdue') return (t.overdue_days || 0) > 0;
        return true; // open
    }
    var q = (_allTasksQuery || '').toLowerCase().trim();
    var filtered = tasks.filter(function(t) {
        if (!matchesFilter(t)) return false;
        if (!q) return true;
        return (t.text || '').toLowerCase().indexOf(q) >= 0 ||
               (t.project || '').toLowerCase().indexOf(q) >= 0 ||
               (t.file || '').toLowerCase().indexOf(q) >= 0;
    });
    // Cap to 200 so the drawer stays responsive on large vaults.
    var capped = filtered.slice(0, 200);
    var counts = {
        open: tasks.filter(function(t){ return !t.done; }).length,
        today: tasks.filter(function(t){ return !t.done && (t.due === today || (t.overdue_days || 0) > 0); }).length,
        overdue: tasks.filter(function(t){ return !t.done && (t.overdue_days || 0) > 0; }).length,
        done: tasks.filter(function(t){ return t.done; }).length,
    };
    function chip(name, label) {
        var active = _allTasksFilter === name;
        return '<button class="eos-btn-sm" style="background:' + (active ? 'var(--accent)' : 'var(--bg-elevated)') + ';color:' + (active ? 'var(--accent-ink)' : 'var(--text)') + ';border:0;font-size:12px" onclick="setAllTasksFilter(\'' + name + '\')">' + label + ' <span style="opacity:0.7">' + counts[name] + '</span></button>';
    }
    var listHtml;
    if (!capped.length) {
        listHtml = '<div style="color:var(--text-muted);font-size:13px;padding:20px;text-align:center">No tasks match.</div>';
    } else {
        listHtml = capped.map(function(t) {
            var stateIcon = t.done ? '✅' : '⬜';
            var due = t.due ? '<span style="color:var(--text-muted);font-size:11px;margin-left:6px">📅 ' + esc(t.due) + '</span>' : '';
            var proj = t.project ? '<span style="color:var(--text-muted);font-size:11px;margin-left:6px">[' + esc(t.project) + ']</span>' : '';
            var displayText = _stripTaskMarkers(t.text || '');
            var attachedHere = (t.room_id === roomId);
            var roomTag = '';
            if (t.room_id && !attachedHere) {
                roomTag = '<span style="color:var(--text-muted);font-size:11px;margin-left:6px">🗨️ ' + esc(agentNameById(t.room_id)) + '</span>';
            }
            var attachBtn = attachedHere
                ? '<span style="color:var(--accent);font-size:11px;flex-shrink:0;align-self:center">✓ here</span>'
                : '<button class="eos-btn-sm eos-btn-ghost" title="Attach this task to this room" style="font-size:11px;flex-shrink:0" onclick="attachTaskToRoom(\'' + escAttr(t.file || '') + '\',' + (t.line || 0) + ')">+ Attach</button>';
            return '<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;margin-bottom:6px">' +
                '<span style="flex-shrink:0;cursor:pointer" onclick="toggleTaskFromDrawer(\'' + escAttr(t.file || '') + '\',' + (t.line || 0) + ')">' + stateIcon + '</span>' +
                '<div style="flex:1;min-width:0">' +
                    '<div' + (t.done ? ' style="text-decoration:line-through;color:var(--text-muted)"' : '') + '>' + esc(displayText) + due + proj + roomTag + '</div>' +
                '</div>' + attachBtn + '</div>';
        }).join('');
        if (filtered.length > capped.length) {
            listHtml += '<div style="color:var(--text-muted);font-size:11px;text-align:center;padding:6px">Showing first 200 of ' + filtered.length + '. Refine the search to narrow.</div>';
        }

// Build the inner HTML for a pending card. `cardId` lets us scope updates.
function renderPendingCard(action) {
    var st = action.status || 'pending';
    var cls = 'pending-card' + (st !== 'pending' ? ' ' + st : '');
    var argsStr = '';
    try { argsStr = JSON.stringify(action.args || {}, null, 2); } catch(e) { argsStr = String(action.args); }
    var icons = {pending:'⏳', applied:'✓', rejected:'✗', failed:'✗'};
    var icon = icons[st] || '⏳';
    var actor = action.source_actor || {};
    var actorName = actor.id === 'claude-cli' ? 'Claude Code CLI' : (actor.id || 'agent');
    var actorIcon = actor.type === 'cli' ? '⚡' : '◆';
    var buttons;
    if (st === 'pending') {
        buttons =
            '<button class="eos-btn-sm eos-btn-ghost" onclick="rejectAction(\'' + escAttr(action.id) + '\')">Reject</button>' +
            '<button class="eos-btn-sm" style="background:var(--accent);color:var(--accent-ink)" onclick="applyAction(\'' + escAttr(action.id) + '\')">Apply</button>';
    } else if (st === 'applied') {
        var resultPreview = action.result ? '<div style="font-size:11px;color:var(--text-muted);max-height:60px;overflow:hidden">' + esc(String(action.result).slice(0, 200)) + '</div>' : '';
        buttons = '<span class="pending-status">applied ' + (action.resolved_ts ? new Date(action.resolved_ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '') + '</span>';
    } else if (st === 'rejected') {
        buttons = '<span class="pending-status">rejected</span>';
    } else {
        buttons = '<span class="pending-status">failed: ' + esc(action.error || 'error') + '</span>';
    }
    var linksHtml = (st === 'applied') ? _pendingLinksHtml(action.links) : '';
    var proposed = action.proposed_changes || [];
    var diffHtml = proposed.length ? proposed.map(_pendingDiffHtml).join('') : '';
    // When a sandboxed write is the actual payload, the raw args (path +
    // full file content) duplicate the diff and make the card huge. Drop
    // the args block in that case — the diff IS the args, more legibly.
    var argsBlock = proposed.length ? '' :
        '<div class="pending-args">' + esc(argsStr) + '</div>';
    return '<div class="pending-card ' + esc(st) + '" id="pending-card-' + escAttr(action.id) + '">' +
        '<div class="pending-head">' +
            '<span>' + icon + '</span>' +
            '<span style="font-size:11px;color:var(--text-muted)">' + actorIcon + ' ' + esc(actorName) + ' proposes</span>' +
            '<span class="pending-verb">' + esc(action.app + '.' + action.method) + '</span>' +
        '</div>' +
        argsBlock +
        diffHtml +
        '<div class="pending-actions">' + buttons + '</div>' +
        linksHtml +
        (st === 'applied' && action.result ? '<div style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono,monospace);max-height:80px;overflow-y:auto">' + esc(String(action.result).slice(0, 300)) + '</div>' : '') +
        '</div>';
}

// Render one proposed-change diff panel inside a pending card. Uses
// EOS.noteActions for the path header so the user can jump to the file
// (where it exists) in one click.
function _pendingDiffHtml(change) {
    var path = change.path || '';
    var lines = change.diff_lines || [];
    var kindToClass = {add:'d-add', del:'d-del', ctx:'d-ctx', hunk:'d-hunk'};
    var rendered = lines.map(function(l) {
        var cls = kindToClass[l.kind] || 'd-ctx';
        return '<span class="' + cls + '">' + esc(l.text || '') + '</span>';
    }).join('');
    if (!rendered) {
        rendered = '<span class="d-ctx" style="color:var(--text-muted)">(no changes — proposed content matches current file)</span>';
    }
    var actions = (window.EOS && EOS.noteActions) ? EOS.noteActions(path) : esc(path);
    return '<div class="pending-diff-head"><span>' + esc(path) + '</span><span>' + actions + '</span></div>' +
        '<div class="pending-diff">' + rendered + '</div>';
}

// Render the post-apply link row for an action card. Delegates to the shared
// EOS_UI.actionLinks helper so this surface and page-assistant stay in sync.
function _pendingLinksHtml(links) {
    return (window.EOS_UI && EOS_UI.actionLinks) ? EOS_UI.actionLinks(links) : '';
}

async function applyAction(actionId) {
    var cards = document.querySelectorAll('#pending-card-' + actionId.replace(/[^A-Za-z0-9_-]/g, ''));
    cards.forEach(function(c){ c.style.opacity = '0.5'; });
    try {

        if (res && res.id) _pendingMap[res.id] = res;
        // Replace all instances of this card on the page (inline thread + drawer + dashboard).
        document.querySelectorAll('[id="pending-card-' + actionId + '"]').forEach(function(c) {

async function rejectAction(actionId) {

// drawer's Tasks tab instead of the standalone modal it used to render.
function openRoomTasks() {
    _activityTab = 'tasks';
