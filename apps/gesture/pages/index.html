<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gesture — EmptyOS</title>
<link rel="stylesheet" href="/static/theme.css">
<link rel="stylesheet" href="/static/eos-components.css">
<style>
* { margin:0; padding:0; box-sizing:border-box }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; padding:16px; -webkit-font-smoothing:antialiased }

.wrap { max-width:1100px; margin:0 auto; display:grid; grid-template-columns:minmax(0,1fr) 320px; gap:24px }
@media (max-width:900px){ .wrap { grid-template-columns:1fr } }

.stage { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:24px }
.stage-title { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px }
.stage-title h1 { font-size:20px; font-weight:700 }
.stage-title .sub { font-size:12px; color:var(--text-muted) }

.video-shell { position:relative; width:100%; aspect-ratio:4/3; background:#000; border-radius:14px; overflow:hidden; border:1px solid var(--border) }
.video-shell video, .video-shell canvas { position:absolute; inset:0; width:100%; height:100%; object-fit:cover }
.video-shell video { transform:scaleX(-1) }
.video-shell canvas { transform:scaleX(-1); pointer-events:none }
.video-shell .overlay-status { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); color:var(--text-muted); font-size:14px; text-align:center; padding:0 24px; line-height:1.55 }
.video-shell .current-badge { position:absolute; left:14px; top:14px; background:rgba(0,0,0,0.65); backdrop-filter:blur(10px); color:#fff; padding:12px 16px; border-radius:8px; font-weight:700; font-size:18px; display:flex; align-items:center; gap:12px; opacity:0; transition:opacity 0.25s; pointer-events:none }
.video-shell .current-badge.show { opacity:1 }
.video-shell .current-badge .em { font-size:24px }
.video-shell .current-badge .cf { font-size:11px; opacity:0.75; font-weight:500 }
.video-shell .conf-bar { position:absolute; left:14px; right:14px; bottom:14px; height:4px; background:rgba(255,255,255,0.2); border-radius:4px; overflow:hidden; opacity:0; transition:opacity 0.2s }
.video-shell .conf-bar.show { opacity:1 }
.video-shell .conf-bar .fill { height:100%; background:var(--accent); width:0; transition:width 0.15s ease-out }

.controls { margin-top:16px; display:flex; gap:12px; align-items:center; flex-wrap:wrap }
.btn { padding:12px 16px; background:var(--accent); color: var(--accent-ink); border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:opacity 0.15s, background 0.15s }
.btn:disabled { opacity:0.5; cursor:not-allowed }
.btn.secondary { background:var(--bg); color:var(--text); border:1px solid var(--border) }
.btn.danger { background:transparent; color:var(--text-muted); border:1px solid var(--border) }
.meta { font-size:11px; font-family:var(--mono); color:var(--text-muted); margin-left:auto }

.panel { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:16px }
.panel + .panel { margin-top:16px }
.panel h2 { font-size:13px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:12px }

.history-row { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px dashed var(--border); font-size:13px }
.history-row:last-child { border-bottom:none }
.history-row .em { font-size:18px; width:24px; text-align:center }
.history-row .g { flex:1; font-weight:500 }
.history-row .t { font-size:11px; font-family:var(--mono); color:var(--text-muted) }
.history-empty { font-size:12px; color:var(--text-muted); padding:4px 0 }

.action-row { display:grid; grid-template-columns:28px 90px 1fr; gap:8px; align-items:center; padding:8px 0 }
.action-row .em { font-size:18px; text-align:center }
.action-row .name { font-size:12px; font-family:var(--mono); color:var(--text-muted) }
.action-row input { padding:8px 12px; background:var(--bg); border:1px solid var(--border); border-radius:8px; font-size:13px; color:var(--text); outline:none; font-family:inherit }
.action-row input:focus { border-color:color-mix(in srgb,var(--accent) 60%,transparent) }
.panel-foot { display:flex; gap:8px; margin-top:12px; align-items:center }
.panel-foot .hint { font-size:11px; color:var(--text-muted) }
</style>
</head>
<body>
<script src="/static/eos.js"></script>
<script src="/static/eos-components.js"></script>
<script>EOS.nav && EOS.nav('gesture');</script>

<div class="wrap">
    <div class="stage">
        <div class="stage-title">
            <h1>Gesture</h1>
            <div class="sub">Camera bytes stay on-device · MediaPipe Hands</div>
        </div>

        <div class="video-shell" id="shell">
            <video id="video" playsinline muted></video>
            <canvas id="overlay"></canvas>
            <div class="overlay-status" id="status">Click <b>Start camera</b> to begin. Your browser will ask permission.</div>
            <div class="current-badge" id="badge">
                <span class="em" id="badge-em"></span>
                <div>
                    <div id="badge-name">—</div>
                    <div class="cf" id="badge-cf"></div>
                </div>
            </div>
            <div class="conf-bar" id="conf"><div class="fill" id="conf-fill"></div></div>
        </div>

        <div class="controls">
            <button class="btn" id="start-btn" onclick="startCamera()">Start camera</button>
            <button class="btn secondary" id="stop-btn" onclick="stopCamera()" style="display:none">Stop</button>
            <a class="btn" href="/gesture/pages/demo.html" style="text-decoration:none">🎮 Demo</a>
            <button class="btn danger" onclick="clearHistory()">Clear history</button>
            <span class="meta" id="fps">—</span>
        </div>
    </div>

    <div>
        <div class="panel">
            <h2>Recent detections</h2>
            <div id="history"><div class="eos-empty-state">Nothing detected yet.</div></div>
        </div>
        <div class="panel">
            <h2>Gesture → action</h2>
            <div id="actions"></div>
            <div class="panel-foot">
                <button class="btn" onclick="saveActions()">Save</button>
                <span class="hint">Apps can subscribe to <code>gesture:detected</code>.</span>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { GestureRecognizer, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const EMOJI = {
    Open_Palm: "✋", Closed_Fist: "✊", Thumb_Up: "👍", Thumb_Down: "👎",
    Victory: "✌️", Pointing_Up: "☝️", ILoveYou: "🤟",
};

const video = document.getElementById("video");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");
const statusEl = document.getElementById("status");
const badge = document.getElementById("badge");
const badgeEm = document.getElementById("badge-em");
const badgeName = document.getElementById("badge-name");
const badgeCf = document.getElementById("badge-cf");
const conf = document.getElementById("conf");
const confFill = document.getElementById("conf-fill");
const fpsEl = document.getElementById("fps");
const startBtn = document.getElementById("start-btn");
const stopBtn = document.getElementById("stop-btn");

let recognizer = null;
let stream = null;
let rafId = null;
let drawingUtils = null;
let running = false;

let lastDispatched = { gesture: null, ts: 0 };
const MIN_CONF = 0.55;
const HOLD_MS = 400;       // must be seen for this long before we dispatch
const COOLDOWN_MS = 1200;  // same gesture won't re-dispatch faster than this
let candidate = { gesture: null, since: 0 };

let frameCount = 0;
let fpsT0 = performance.now();

async function loadRecognizer() {
    statusEl.textContent = "Loading gesture model…";
    const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    recognizer = await GestureRecognizer.createFromOptions(vision, {
        baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
            delegate: "GPU",
        },
        runningMode: "VIDEO",
        numHands: 1,
    });
    drawingUtils = new DrawingUtils(ctx);
}

window.startCamera = async function() {
    startBtn.disabled = true;
    try {
        if (!recognizer) await loadRecognizer();
        stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: false });
        video.srcObject = stream;
        await video.play();
        statusEl.style.display = "none";
        startBtn.style.display = "none";
        stopBtn.style.display = "";
        running = true;
        canvas.width = video.videoWidth || 1280;
        canvas.height = video.videoHeight || 720;
        loop();
    } catch (err) {
        statusEl.innerHTML = "Camera unavailable: <code>" + (err.message || err) + "</code>";
        startBtn.disabled = false;
    }
};

window.stopCamera = function() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = null;
    video.srcObject = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    badge.classList.remove("show");
    conf.classList.remove("show");
    startBtn.style.display = "";
    stopBtn.style.display = "none";
    startBtn.disabled = false;
    statusEl.style.display = "";
    statusEl.textContent = "Camera stopped.";
};

function loop() {
    if (!running) return;
    const ts = performance.now();
    if (video.readyState >= 2) {
        const res = recognizer.recognizeForVideo(video, ts);
        render(res, ts);
        frameCount++;
        if (ts - fpsT0 > 1000) {
            fpsEl.textContent = (frameCount * 1000 / (ts - fpsT0)).toFixed(1) + " fps";
            frameCount = 0;
            fpsT0 = ts;
        }
    }
    rafId = requestAnimationFrame(loop);
}

function render(res, ts) {
    canvas.width = video.videoWidth || canvas.width;
    canvas.height = video.videoHeight || canvas.height;
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (res.landmarks && res.landmarks.length) {
        for (const lm of res.landmarks) {
            drawingUtils.drawConnectors(lm, GestureRecognizer.HAND_CONNECTIONS,
                { color: "#00E5FF", lineWidth: 3 });
            drawingUtils.drawLandmarks(lm, { color: "#FFFFFF", lineWidth: 1, radius: 3 });
        }
    }
    ctx.restore();

    const top = res.gestures?.[0]?.[0];
    if (top && top.categoryName && top.categoryName !== "None" && top.score >= MIN_CONF) {
        showGesture(top.categoryName, top.score);
        maybeDispatch(top.categoryName, top.score, ts);
    } else {
        badge.classList.remove("show");
        conf.classList.remove("show");
        candidate = { gesture: null, since: 0 };
    }
}

function showGesture(name, score) {
    badgeEm.textContent = EMOJI[name] || "✦";
    badgeName.textContent = name.replace(/_/g, " ");
    badgeCf.textContent = (score * 100).toFixed(0) + "% · " + (ACTIONS[name] || "—");
    badge.classList.add("show");
    conf.classList.add("show");
    confFill.style.width = (score * 100).toFixed(1) + "%";
}

function maybeDispatch(name, score, ts) {
    if (candidate.gesture !== name) {
        candidate = { gesture: name, since: ts };
        return;
    }
    if (ts - candidate.since < HOLD_MS) return;
    if (lastDispatched.gesture === name && (ts - lastDispatched.ts) < COOLDOWN_MS) return;
    lastDispatched = { gesture: name, ts };
    EOS.post('/gesture/api/detected', { gesture: name, confidence: score })
        .then(loadHistory)
        .catch(() => {});
}

// -- history + actions --
let ACTIONS = {};

async function loadActions() {
    const res = await EOS.api('/gesture/api/actions');
    ACTIONS = res.actions || {};
    const classes = res.classes || [];
    const host = document.getElementById('actions');
    host.innerHTML = '';
    for (const c of classes) {
        const row = document.createElement('div');
        row.className = 'action-row';
        row.innerHTML =
            '<div class="em">' + (EMOJI[c] || '✦') + '</div>' +
            '<div class="name">' + c.replace(/_/g, ' ') + '</div>' +
            '<input data-class="' + c + '" value="' + (ACTIONS[c] || '').replace(/"/g, '&quot;') + '">';
        host.appendChild(row);
    }
}

window.saveActions = async function() {
    const actions = {};
    document.querySelectorAll('#actions input').forEach(i => {
        actions[i.dataset.class] = i.value;
    });
    await EOS.post('/gesture/api/actions', { actions });
    ACTIONS = actions;
    EOS_UI.toast('Actions saved', true);
};

async function loadHistory() {
    const res = await EOS.api('/gesture/api/history?limit=12');
    const items = res.history || [];
    const host = document.getElementById('history');
    if (!items.length) {
        host.innerHTML = EOS_UI.emptyState({message:'Nothing detected yet.'});
        return;
    }
    host.innerHTML = items.map(h =>
        '<div class="history-row">' +
        '<span class="em">' + (EMOJI[h.gesture] || '✦') + '</span>' +
        '<span class="g">' + h.gesture.replace(/_/g, ' ') + '</span>' +
        '<span class="t">' + (h.ts || '').slice(11, 19) + '</span>' +
        '</div>'
    ).join('');
}

window.clearHistory = async function() {
    await EOS.post('/gesture/api/history/clear', {});
    loadHistory();
    EOS_UI.toast('History cleared', true);
};

loadActions();
loadHistory();
</script>
</body>
</html>
