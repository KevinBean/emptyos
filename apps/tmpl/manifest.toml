[app]
id = "tmpl"
name = "Templates"
version = "1.0.0"
description = "Create notes from templates with placeholders"

[app.entry]
module = "app"
class = "TemplateApp"

[provides.cli]
commands = ["tmpl"]

[provides.web]
prefix = "/tmpl"

[provides.events]
emits = ["tmpl:used"]

[requires]
capabilities = ["write", "think"]
services = []
events = []
