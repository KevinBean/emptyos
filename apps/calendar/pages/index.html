<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Calendar — EmptyOS</title>
<link rel="stylesheet" href="/static/theme.css">
<link rel="stylesheet" href="/static/eos-components.css">
<style>
.cal-hero { padding:32px 0 16px; animation:fadeDown 0.4s ease }
.cal-hero h1 { font-size:28px; font-weight:700; color:var(--text-heading); margin-bottom:4px }
.cal-hero .desc { font-size:14px; color:var(--text-secondary) }
.cal-list { margin-top:16px; display:flex; flex-direction:column; gap:8px; animation:cardIn 0.35s ease 0.1s both }
.cal-empty { text-align:center; padding:40px 24px; color:var(--text-muted); font-size:14px }
</style>
</head>
<body>
<script src="/static/eos.js"></script>
<script src="/static/eos-components.js"></script>
<script>EOS.nav('calendar');</script>

<div class="page">
  <div class="cal-hero">
    <h1>Calendar</h1>
    <div class="desc">Today's agenda — aggregated from your tasks and project deadlines.</div>
  </div>

  <div id="agenda-list" class="cal-list">
    <div class="cal-empty">Loading schedule…</div>
  </div>
</div>

<script>
function badgeVariant(type) {
    if (type === 'task') return 'status-active';
    if (type === 'deadline') return 'priority-high';
    return 'neutral';
}

async function loadAgenda() {
    var list = document.getElementById('agenda-list');
    var agenda;
    try {
        agenda = await EOS.api('/calendar/api/today');
    } catch (e) {
        list.innerHTML = '<div class="cal-empty">Failed to load.</div>';
        return;
    }
    if (!agenda || !agenda.length) {
        list.innerHTML = '<div class="cal-empty">Your schedule is clear today.</div>';
        return;
    }
    list.innerHTML = agenda.map(function (item) {
        return EOS_UI.entityCard({
            title: item.title,
            subtitle: item.time,
            badges: [{ label: item.type, variant: badgeVariant(item.type) }],
            meta: item.source ? ('Source: ' + item.source) : '',
        });
    }).join('');
}

window.addEventListener('load', loadAgenda);
</script>
</body>
</html>
