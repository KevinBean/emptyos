<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Dashboard - EmptyOS</title>
<link rel="stylesheet" href="/static/theme.css">
<link rel="stylesheet" href="/static/eos-components.css">
<style>
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; padding:env(safe-area-inset-top) 16px 100px; -webkit-font-smoothing:antialiased }

.stats-row { display:flex; gap:10px; margin-bottom:20px }
.stat-pill { flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center }
.stat-pill-val { font-size:22px; font-weight:700; color:var(--text-heading) }
.stat-pill-label { font-size:11px; color:var(--text-muted) }

.goal-item { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border) }
.goal-item:last-child { border-bottom:none }
.goal-icon { font-size:20px; width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:var(--accent-bg); flex-shrink:0 }
.goal-info { flex:1; min-width:0 }
.goal-name { font-size:14px; font-weight:600; color:var(--text-heading) }
.goal-detail { font-size:12px; color:var(--text-secondary); margin-top:1px }
.goal-bar { height:6px; border-radius:3px; background:var(--border); margin-top:6px; overflow:hidden }
.goal-fill { height:100%; border-radius:3px; transition:width 0.8s ease }
.goal-pct { font-size:14px; font-weight:700; color:var(--text-heading); min-width:40px; text-align:right; font-family:var(--mono) }

.compare-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px }
@media(max-width:500px) { .compare-grid { grid-template-columns:1fr } }
.compare-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:14px }
.compare-label { font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.3px; margin-bottom:6px }
.compare-row { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px }
.compare-current { font-size:20px; font-weight:700; color:var(--text-heading) }
.compare-prev { font-size:13px; color:var(--text-secondary) }
.compare-delta { font-size:13px; font-weight:600; margin-top:4px }
.delta-up { color:#10b981 }
.delta-down { color:#ef4444 }
.delta-neutral { color:var(--text-muted) }

.countdown-row { display:flex; gap:10px; flex-wrap:wrap }
.cd-card { flex:1; min-width:120px; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:14px; text-align:center }
.cd-days { font-size:28px; font-weight:800; color:var(--accent); font-family:var(--mono) }
.cd-unit { font-size:11px; color:var(--text-muted) }
.cd-name { font-size:12px; color:var(--text-secondary); margin-top:4px }

.narrative { background:var(--accent-bg); border:1px solid color-mix(in srgb,var(--accent) 20%,transparent); border-radius:12px; padding:16px; font-size:14px; line-height:1.7; color:var(--text); min-height:48px; cursor:pointer; transition:border-color 0.2s }
.narrative:hover { border-color:color-mix(in srgb,var(--accent) 40%,transparent) }
.narrative.loading { color:var(--text-muted) }

.two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px }
@media(max-width:640px) { .two-col { grid-template-columns:1fr } }

.frog-row { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap }
.frog-card { flex:1; min-width:100px; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:12px; display:flex; align-items:center; gap:10px }
.frog-icon { font-size:18px; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center }
.frog-done { background:rgba(52,199,89,0.15) }
.frog-todo { background:rgba(255,255,255,0.05) }
.frog-name { font-weight:600; font-size:13px }
.frog-detail { font-size:11px; color:var(--text-secondary) }

.task-item { padding:8px 0; border-bottom:1px solid var(--border); font-size:14px; display:flex; gap:8px }
.task-item:last-child { border-bottom:none }
.task-check { color:var(--text-muted) }
.task-due { font-size:11px; color:var(--warning); margin-left:auto; white-space:nowrap }

.journal-dots { display:flex; gap:10px; flex-wrap:wrap; padding:4px 0 }
.journal-day { display:flex; align-items:center; gap:6px; font-size:13px }
.j-dot { width:8px; height:8px; border-radius:50% }
.j-dot.active { background:var(--accent) }
.j-dot.empty { background:var(--border) }

.wellness-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px }
@media(max-width:500px) { .wellness-grid { grid-template-columns:1fr } }
.w-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:14px; text-align:center }
.w-card-icon { font-size:20px; margin-bottom:4px }
.w-card-val { font-size:22px; font-weight:700; color:var(--text-heading); font-family:var(--mono) }
.w-card-label { font-size:11px; color:var(--text-muted) }

.streak-row { display:flex; gap:8px; flex-wrap:wrap }
.streak-pill { display:inline-flex; align-items:center; gap:6px; background:var(--bg-card); border:1px solid var(--border); border-radius:20px; padding:6px 14px; font-size:13px }
.streak-pill-val { font-weight:700; color:var(--accent); font-family:var(--mono) }
.streak-pill-label { color:var(--text-secondary) }
.streak-pill.hot { border-color:color-mix(in srgb,var(--accent) 40%,transparent); background:var(--accent-bg) }
</style>
</head>
<body>
<script src="/static/realtime.js"></script>
<script src="/static/eos.js"></script>
<script src="/static/eos-components.js"></script>
<script>EOS.nav('dashboard');</script>

<div class="page">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <div>
            <h1 id="greeting">Dashboard</h1>
            <div class="desc" id="date-line"></div>
        </div>
        <button class="btn-settings" onclick="openAppSettings()" title="Settings">&#9881; Settings</button>
    </div>

    <!-- Stats summary -->
    <div class="stats-row" id="stats-row">
        <div class="stat-pill"><div class="stat-pill-val" id="s-frogs">-</div><div class="stat-pill-label">Frogs</div></div>
        <div class="stat-pill"><div class="stat-pill-val" id="s-tasks">-</div><div class="stat-pill-label">Tasks</div></div>
        <div class="stat-pill"><div class="stat-pill-val" id="s-expense">-</div><div class="stat-pill-label">This Month</div></div>
        <div class="stat-pill"><div class="stat-pill-val" id="s-contacts">-</div><div class="stat-pill-label">Contacts</div></div>
    </div>

    <!-- Frogs -->
    <div class="eos-section-title">Frogs</div>
    <div class="frog-row" id="frogs"></div>

    <!-- Goals -->
    <div class="eos-section-title">Goals</div>
    <div class="card" id="goals" style="padding:6px 16px"></div>

    <!-- Month compare -->
    <div class="eos-section-title">This Month vs Last</div>
    <div class="compare-grid" id="compare"></div>

    <!-- Countdowns -->
    <div class="eos-section-title" style="margin-top:20px">Countdowns</div>
    <div class="countdown-row" id="countdowns"></div>

    <!-- Two column: tasks + journal -->
    <div class="two-col" style="margin-top:20px">
        <div>
            <div class="eos-section-title">Open Tasks</div>
            <div class="card" id="tasks"></div>
        </div>
        <div>
            <div class="eos-section-title">Journal (7 days)</div>
            <div class="card" id="journal"></div>
        </div>
    </div>

    <!-- Wellness -->
    <div class="eos-section-title" style="margin-top:20px">Wellness</div>
    <div class="wellness-grid" id="wellness">
        <div class="w-card"><div class="w-card-icon">&#x1f610;</div><div class="w-card-val" id="w-mood">-</div><div class="w-card-label">Mood (7d avg)</div></div>
        <div class="w-card"><div class="w-card-icon">&#x1f634;</div><div class="w-card-val" id="w-sleep">-</div><div class="w-card-label">Sleep</div></div>
        <div class="w-card"><div class="w-card-icon">&#x1f957;</div><div class="w-card-val" id="w-nutrition">-</div><div class="w-card-label">Nutrition</div></div>
        <div class="w-card"><div class="w-card-icon">&#x1f9d8;</div><div class="w-card-val" id="w-meditation">-</div><div class="w-card-label">Meditation</div></div>
    </div>

    <!-- Streaks -->
    <div class="eos-section-title" style="margin-top:20px">Streaks</div>
    <div class="streak-row" id="streaks"></div>

    <!-- AI Narrative / Digest -->
    <div class="eos-section-title" style="margin-top:20px">AI Summary</div>
    <div class="narrative loading" id="narrative" onclick="loadNarrative()">Generating...</div>
</div>

<script>
var GOAL_COLORS = { 0:'#ef4444', 20:'#f59e0b', 40:'#f59e0b', 60:'#3b82f6', 80:'#10b981' };
var GOAL_ICONS = { passport:'&#x1f6c2;', 'piggy-bank':'&#x1f4b0;', 'book-open':'&#x1f4d6;', briefcase:'&#x1f4bc;' };

function goalColor(pct) {
    if (pct >= 80) return '#10b981';
    if (pct >= 50) return '#3b82f6';
    if (pct >= 25) return '#f59e0b';
    return '#ef4444';
}

function deltaClass(current, previous, direction) {
    if (current === previous || (!current && !previous)) return 'delta-neutral';
    var better = direction === 'lower_is_better' ? current < previous : current > previous;
    return better ? 'delta-up' : 'delta-down';
}

function deltaText(current, previous, unit) {
    if (!previous) return '';
    var diff = current - previous;
    var pct = previous !== 0 ? Math.round(Math.abs(diff) / previous * 100) : 0;
    var arrow = diff > 0 ? '&#x2191;' : diff < 0 ? '&#x2193;' : '&#x2212;';
    return arrow + ' ' + pct + '%';
}

async function load() {
    try {
        var data = await EOS.api('/dashboard/api/dashboard');
        var s = data.sections;

        document.getElementById('greeting').textContent = EOS.greeting ? EOS.greeting() : 'Dashboard';
        document.getElementById('date-line').textContent = EOS.formatDate ? EOS.formatDate(data.date) : data.date;

        // Stats pills
        var frogsDone = Object.values(s.frogs || {}).filter(function(f) { return f.done; }).length;
        var frogsTotal = Object.keys(s.frogs || {}).length;
        document.getElementById('s-frogs').textContent = frogsDone + '/' + frogsTotal;
        document.getElementById('s-tasks').textContent = s.tasks ? s.tasks.total : 0;
        document.getElementById('s-expense').textContent = '$' + (s.expense ? s.expense.total : 0).toFixed(0);
        document.getElementById('s-contacts').textContent = s.contacts ? s.contacts.total : 0;

        // Frogs
        var frogsEl = document.getElementById('frogs');
        var frogs = s.frogs || {};
        if (Object.keys(frogs).length === 0) {
            frogsEl.innerHTML = '<div style="color:var(--text-muted);font-size:14px;padding:8px">No frogs today</div>';
        } else {
            frogsEl.innerHTML = Object.entries(frogs).map(function(e) {
                var name = e[0], f = e[1];
                var icon = (EOS.frogIcons && EOS.frogIcons[name]) || '&#x1f438;';
                return '<div class="frog-card card-in">' +
                    '<div class="frog-icon ' + (f.done ? 'frog-done' : 'frog-todo') + '">' + icon + '</div>' +
                    '<div><div class="frog-name">' + EOS_UI.esc(name.replace(/_/g, ' ')) + '</div>' +
                    '<div class="frog-detail">' + EOS_UI.esc(f.detail) + '</div></div></div>';
            }).join('');
        }

        // Tasks
        var tasksEl = document.getElementById('tasks');
        var tasks = s.tasks ? s.tasks.items || [] : [];
        if (tasks.length === 0) {
            tasksEl.innerHTML = '<div style="color:var(--text-muted);padding:12px;font-size:14px">No open tasks</div>';
        } else {
            tasksEl.innerHTML = tasks.slice(0, 8).map(function(t) {
                return '<div class="task-item">' +
                    '<span class="task-check">&#x2610;</span>' +
                    '<span>' + EOS_UI.esc((t.text || '').slice(0, 60)) + '</span>' +
                    (t.due ? '<span class="task-due">&#x1f4c5; ' + t.due + '</span>' : '') +
                    '</div>';
            }).join('');
        }

        // Journal
        var jEl = document.getElementById('journal');
        var recent = s.journal ? s.journal.recent || [] : [];
        if (recent.length === 0) {
            jEl.innerHTML = '<div style="color:var(--text-muted);padding:12px;font-size:14px">No recent entries</div>';
        } else {
            jEl.innerHTML = '<div class="journal-dots">' + recent.map(function(d) {
                return '<div class="journal-day">' +
                    '<div class="j-dot ' + (d.entries > 0 ? 'active' : 'empty') + '"></div>' +
                    '<span>' + (d.date || '').slice(5) + '</span>' +
                    '<span style="color:var(--text-muted)">' + (d.entries || 0) + '</span></div>';
            }).join('') + '</div>';
        }
    } catch(e) { console.error('Dashboard load failed:', e); }
}

async function loadGoals() {
    var el = document.getElementById('goals');
    try {
        var goals = await EOS.api('/dashboard/api/goals');
        if (!goals || !goals.length) { el.innerHTML = '<div class="eos-empty">No goals</div>'; return; }
        el.innerHTML = goals.map(function(g) {
            var color = goalColor(g.progress);
            var icon = GOAL_ICONS[g.icon] || '&#x1f3af;';
            return '<div class="goal-item card-in">' +
                '<div class="goal-icon">' + icon + '</div>' +
                '<div class="goal-info">' +
                    '<div class="goal-name">' + EOS_UI.esc(g.name) + '</div>' +
                    '<div class="goal-detail">' + EOS_UI.esc(g.detail) + '</div>' +
                    '<div class="goal-bar"><div class="goal-fill" style="width:' + g.progress + '%;background:' + color + '"></div></div>' +
                '</div>' +
                '<div class="goal-pct">' + g.progress + '%</div>' +
                '</div>';
        }).join('');
    } catch(e) { el.innerHTML = '<div class="eos-empty">Goals unavailable</div>'; }
}

async function loadCompare() {
    var el = document.getElementById('compare');
    try {
        var data = await EOS.api('/dashboard/api/month-compare');
        var metrics = data.metrics || [];
        if (!metrics.length) { el.innerHTML = '<div class="eos-empty" style="grid-column:1/-1">No comparison data</div>'; return; }
        el.innerHTML = metrics.map(function(m) {
            var cls = deltaClass(m.current, m.previous, m.direction);
            var prefix = m.unit === '$' ? '$' : '';
            var suffix = m.unit && m.unit !== '$' ? ' ' + m.unit : '';
            return '<div class="compare-card card-in">' +
                '<div class="compare-label">' + EOS_UI.esc(m.name) + '</div>' +
                '<div class="compare-row">' +
                    '<span class="compare-current">' + prefix + m.current + suffix + '</span>' +
                    '<span class="compare-prev">vs ' + prefix + m.previous + suffix + '</span>' +
                '</div>' +
                '<div class="compare-delta ' + cls + '">' + deltaText(m.current, m.previous, m.unit) + '</div>' +
                '</div>';
        }).join('');
    } catch(e) { el.innerHTML = '<div class="eos-empty" style="grid-column:1/-1">Comparison unavailable</div>'; }
}

async function loadCountdowns() {
    var el = document.getElementById('countdowns');
    try {
        var items = await EOS.api('/dashboard/api/countdowns');
        if (!items || !items.length) { el.innerHTML = '<div class="eos-empty">No countdowns</div>'; return; }
        el.innerHTML = items.map(function(c) {
            var days = c.days_remaining != null ? c.days_remaining : c.days_elapsed;
            var unit = c.direction === 'up' ? 'days elapsed' : 'days left';
            return '<div class="cd-card card-in">' +
                '<div class="cd-days">' + days + '</div>' +
                '<div class="cd-unit">' + unit + '</div>' +
                '<div class="cd-name">' + EOS_UI.esc(c.name) + '</div>' +
                '</div>';
        }).join('');
    } catch(e) { el.innerHTML = '<div class="eos-empty">Countdowns unavailable</div>'; }
}

async function loadNarrative() {
    var el = document.getElementById('narrative');
    el.textContent = 'Generating...';
    el.classList.add('loading');
    try {
        var data = await EOS.api('/dashboard/api/digest');
        el.textContent = data.narrative || 'No summary available';
        el.classList.remove('loading');
    } catch(e) {
        try {
            var fallback = await EOS.api('/dashboard/api/narrative');
            el.textContent = fallback.narrative || 'No summary available';
            el.classList.remove('loading');
        } catch(e2) {
            el.textContent = 'Click to retry';
            el.classList.remove('loading');
        }
    }
}

var MOOD_LABELS = {1:'bad',2:'low',3:'okay',4:'good',5:'great'};
var MOOD_ICONS = {1:'&#x1f61e;',2:'&#x1f614;',3:'&#x1f610;',4:'&#x1f60a;',5:'&#x1f60d;'};

async function loadWellness() {
    try {
        var w = await EOS.api('/dashboard/api/wellness');
        // Mood — average of trend array
        var moods = w.mood || [];
        if (moods.length) {
            var avg = moods.reduce(function(s,m){return s+(m.score||m.value||0);},0)/moods.length;
            var rounded = Math.round(avg);
            document.getElementById('w-mood').textContent = MOOD_LABELS[rounded]||avg.toFixed(1);
            document.querySelector('#wellness .w-card:first-child .w-card-icon').innerHTML = MOOD_ICONS[rounded]||'&#x1f610;';
        }
        // Sleep
        var sleep = w.sleep||{};
        document.getElementById('w-sleep').textContent = sleep.avg_hours ? sleep.avg_hours.toFixed(1)+'h' : (sleep.last||'-');
        // Nutrition
        var nutr = w.nutrition||{};
        document.getElementById('w-nutrition').textContent = nutr.calories ? nutr.calories+'cal' : (nutr.meals||0)+' meals';
        // Meditation
        var med = w.meditation||{};
        document.getElementById('w-meditation').textContent = (med.sessions_this_week||med.count||0)+'x';
    } catch(e) { console.warn('Wellness load:', e); }
}

async function loadStreaks() {
    var el = document.getElementById('streaks');
    try {
        var streaks = await EOS.api('/dashboard/api/streaks');
        if (!streaks||!streaks.length) { el.innerHTML='<span style="color:var(--text-muted);font-size:13px">No streaks yet</span>'; return; }
        el.innerHTML = streaks.map(function(s) {
            var hot = s.streak >= 7 ? ' hot' : '';
            var fire = s.streak >= 7 ? '&#x1f525; ' : '';
            return '<div class="streak-pill'+hot+'">' +
                '<span class="streak-pill-val">'+fire+s.streak+'d</span>' +
                '<span class="streak-pill-label">'+EOS_UI.esc(s.label)+'</span></div>';
        }).join('');
    } catch(e) { el.innerHTML='<span style="color:var(--text-muted);font-size:13px">Streaks unavailable</span>'; }
}

// --- Init ---
load();
loadGoals();
loadCompare();
loadCountdowns();
loadWellness();
loadStreaks();
loadNarrative();

// Live updates
var debouncedLoad = EOS.debounce ? EOS.debounce(load, 1000) : load;
EOS.on('expense:added', debouncedLoad);
EOS.on('journal:entry', debouncedLoad);
EOS.on('healing:mood-logged', debouncedLoad);
EOS.on('task:completed', function() { load(); loadGoals(); });
if (EOS.keys) { EOS.keys.register('r', 'Refresh dashboard', function() { load(); loadGoals(); loadCompare(); loadNarrative(); }); }

// --- App Settings slide-out (shared helper) ---
var _appSettings = EOS_UI.settingsPanel({
    id: 'app-settings-panel',
    title: 'Dashboard Settings',
    fields: [
        {key: 'dashboard.show_narrative', label: 'Show AI Narrative', type: 'boolean', default: true,
         hint: 'Toggle the AI-generated daily narrative at the top of the dashboard.'},
    ],
});
function openAppSettings() { _appSettings.open(); }
</script>
</body>
</html>
