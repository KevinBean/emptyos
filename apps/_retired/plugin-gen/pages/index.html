<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Plugin Generator - EmptyOS</title>
<link rel="stylesheet" href="/static/theme.css">
<link rel="stylesheet" href="/static/eos-components.css">
<style>
.probe-form { display: flex; flex-direction: column; gap: 12px; max-width: 600px; }
.probe-form input, .probe-form textarea { padding: 10px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; }
.probe-form textarea { min-height: 80px; resize: vertical; }
.result-box { margin-top: 16px; padding: 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; white-space: pre-wrap; font-family: monospace; font-size: 13px; max-height: 400px; overflow-y: auto; }
.plugin-list { display: grid; gap: 8px; margin-top: 16px; }
.plugin-card { padding: 12px 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; }
.plugin-card h3 { font-size: 14px; margin-bottom: 4px; }
.plugin-card p { font-size: 12px; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="page-shell">
<div class="page-header">
    <h1>Plugin Generator</h1>
    <p class="subtitle">Generate plugins from external service APIs</p>
</div>

<div class="eos-tabs">
    <button class="eos-tab active" data-tab="probe" onclick="EOS_UI.switchTab('probe')">Probe</button>
    <button class="eos-tab" data-tab="generate" onclick="EOS_UI.switchTab('generate')">Generate</button>
    <button class="eos-tab" data-tab="plugins" onclick="EOS_UI.switchTab('plugins'); loadPlugins()">Existing</button>
</div>

<div id="tab-probe" class="eos-tab-content active">
    <div class="probe-form">
        <input type="text" id="probe-url" placeholder="Service URL (e.g. http://localhost:8080)">
        <button class="btn btn-primary" onclick="probe()">Probe Service</button>
    </div>
    <div id="probe-result" class="result-box" style="display:none"></div>
</div>

<div id="tab-generate" class="eos-tab-content">
    <div class="probe-form">
        <input type="text" id="gen-name" placeholder="Plugin name">
        <input type="text" id="gen-url" placeholder="Service URL">
        <textarea id="gen-desc" placeholder="Description of what the service does"></textarea>
        <button class="btn btn-primary" onclick="generate()">Generate Plugin</button>
    </div>
    <div id="gen-result" class="result-box" style="display:none"></div>
</div>

<div id="tab-plugins" class="eos-tab-content">
    <div id="plugin-list" class="plugin-list"></div>
</div>
</div>

<script src="/static/eos.js"></script>
<script>EOS.nav('plugin-gen');
if(window.EOS&&EOS.registerActions){EOS.registerActions({},[],{description:"Generate plugins from external service APIs — wire a new provider into a capability.",quickActions:[{label:"Pick service",msg:"Help me pick an external service to integrate that would unlock the most value right now."},{label:"Shape API",msg:"I have an API spec or link. Help me shape it into a plugin manifest."},{label:"Which capability",msg:"Which capability (think, speak, draw, etc.) should this plugin enhance?"}]});}
</script>
<script src="/static/eos-components.js"></script>
<script>
// Tab switching handled by EOS_UI.switchTab() via data-tab attributes + onclick

async function probe() {
    const url = document.getElementById('probe-url').value;
    if (!url) return;
    const box = document.getElementById('probe-result');
    box.style.display = 'block';
    box.textContent = 'Probing...';
    const resp = await fetch(EOS.api('/api/probe'), {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({url})});
    const data = await resp.json();
    box.textContent = JSON.stringify(data, null, 2);
}

async function generate() {
    const name = document.getElementById('gen-name').value;
    const url = document.getElementById('gen-url').value;
    const desc = document.getElementById('gen-desc').value;
    if (!name) return;
    const box = document.getElementById('gen-result');
    box.style.display = 'block';
    box.textContent = 'Generating...';
    const resp = await fetch(EOS.api('/api/generate'), {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name, url, description: desc})});
    const data = await resp.json();
    box.textContent = JSON.stringify(data, null, 2);
}

async function loadPlugins() {
    const resp = await fetch(EOS.api('/api/plugins'));
    const data = await resp.json();
    const list = Array.isArray(data) ? data : data.plugins || [];
    document.getElementById('plugin-list').innerHTML = list.length
        ? list.map(p => `<div class="plugin-card"><h3>${esc(p.id || p.name)}</h3><p>${esc(p.description || '')}</p></div>`).join('')
        : '<p style="color:var(--text-secondary)">No plugins generated yet</p>';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
