[app]
id = "plugin-gen"
name = "Plugin Generator"
version = "1.0.0"
description = "Generate plugins from external service APIs — DNA intake mechanism"
dimensions = ["occupational"]

[app.entry]
module = "app"
class = "PluginGenApp"

[requires]
capabilities = ["think"]
apps = ["app-gen"]

[provides.cli]
commands = ["new-plugin"]

[provides.web]
prefix = "/plugin-gen"

[provides.events]
emits = ["plugin-gen:created"]
