<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Vault Analytics - EmptyOS</title>
<link rel="stylesheet" href="/static/theme.css">
<link rel="stylesheet" href="/static/eos-components.css">
<style>
* { margin:0; padding:0; box-sizing:border-box }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; padding:env(safe-area-inset-top) 16px 24px; -webkit-font-smoothing:antialiased }
.hero { display:flex; gap:12px; margin-bottom:20px }
.hero-card { flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:18px; text-align:center }
.hero-val { font-size:28px; font-weight:700; color:var(--accent) }
.hero-lbl { font-size:13px; color:var(--text-secondary); margin-top:4px }
h2 { font-size:18px; font-weight:600; color:var(--text-heading, var(--text)); margin:20px 0 10px }
.para-bar { display:flex; align-items:center; gap:10px; margin-bottom:8px }
.para-label { width:100px; font-size:14px; font-weight:500; text-align:right; flex-shrink:0 }
.para-track { flex:1; height:24px; background:var(--bg-card); border:1px solid var(--border); border-radius:6px; overflow:hidden; position:relative }
.para-fill { height:100%; background:var(--accent); border-radius:6px; transition:width 0.6s ease }
.para-count { font-size:13px; color:var(--text-secondary); width:70px; flex-shrink:0 }
.file-list { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; overflow:hidden; font-size:14px; max-height:360px; overflow-y:auto }
.file-item { display:flex; justify-content:space-between; padding:8px 12px; border-top:1px solid var(--border) }
.file-item:first-child { border-top:none }
.file-item:hover { background:color-mix(in srgb, var(--bg-card) 95%, var(--accent) 5%) }
.file-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; margin-right:12px }
.file-meta { color:var(--text-secondary); font-family:'SF Mono',Consolas,monospace; font-size:13px; flex-shrink:0 }
/* Tabs — uses shared .eos-tabs/.eos-tab/.eos-tab-content from eos-components.css */
.empty { text-align:center; padding:32px; color:var(--text-secondary) }
/* .hidden not needed — .eos-tab-content handles visibility */
</style>
</head>
<body>
<h2 style="margin-top:8px">Vault Analytics</h2>
<div class="hero" id="hero">
  <div class="hero-card"><div class="hero-val" id="h-files">--</div><div class="hero-lbl">Total Files</div></div>
  <div class="hero-card"><div class="hero-val" id="h-size">--</div><div class="hero-lbl">Total Size</div></div>
  <div class="hero-card"><div class="hero-val" id="h-folders">--</div><div class="hero-lbl">PARA Folders</div></div>
</div>

<h2>PARA Distribution</h2>
<div id="para-bars"></div>

<h2>Files</h2>
<div class="eos-tabs">
  <div class="eos-tab active" data-tab="recent" onclick="EOS_UI.switchTab('recent')">Recent</div>
  <div class="eos-tab" data-tab="largest" onclick="EOS_UI.switchTab('largest')">Largest</div>
  <div class="eos-tab" data-tab="stale" onclick="EOS_UI.switchTab('stale')">Stale (90d+)</div>
</div>
<div id="tab-recent" class="eos-tab-content active file-list"></div>
<div id="tab-largest" class="eos-tab-content file-list"></div>
<div id="tab-stale" class="eos-tab-content file-list"></div>

<script src="/static/eos.js"></script>
<script src="/static/eos-components.js"></script>
<script src="/static/realtime.js"></script>
<script>
EOS.nav('vault-analytics');

// Tab switching handled by EOS_UI.switchTab() via data-tab attributes + onclick

function fileList(id, items, metaFn) {
  const el = document.getElementById(id);
  if (!items.length) { el.innerHTML = '<div class="empty">No files</div>'; return; }
  el.innerHTML = items.map(f =>
    `<div class="file-item"><span class="file-name">${f.path}</span><span class="file-meta">${metaFn(f)}</span></div>`
  ).join('');
}

async function load() {
  try {
    const [stats, recent, largest, stale] = await Promise.all([
      EOS.api('/vault-analytics/api/stats'),
      EOS.api('/vault-analytics/api/recent?limit=20'),
      EOS.api('/vault-analytics/api/largest?limit=20'),
      EOS.api('/vault-analytics/api/stale?days=90&limit=20')
    ]);

    document.getElementById('h-files').textContent = stats.total_files.toLocaleString();
    document.getElementById('h-size').textContent = stats.total_size_mb + ' MB';
    document.getElementById('h-folders').textContent = Object.keys(stats.para).length;

    const maxCount = Math.max(...Object.values(stats.para).map(p => p.count), 1);
    document.getElementById('para-bars').innerHTML = Object.entries(stats.para).map(([label, d]) =>
      `<div class="para-bar">
        <span class="para-label">${label}</span>
        <div class="para-track"><div class="para-fill" style="width:${(d.count/maxCount*100).toFixed(1)}%"></div></div>
        <span class="para-count">${d.count} / ${d.size_mb}MB</span>
      </div>`
    ).join('');

    fileList('tab-recent', recent, f => {
      const d = new Date(f.modified * 1000);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    });
    fileList('tab-largest', largest, f => f.size_kb + ' KB');
    fileList('tab-stale', stale, f => f.days_stale + 'd ago');
  } catch(e) {
    document.getElementById('hero').innerHTML = '<div class="empty">Failed to load vault data</div>';
  }
}
load();
</script>
</body>
</html>
