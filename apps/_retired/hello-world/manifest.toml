[app]
id = "hello-world"
name = "Hello World"
version = "1.0.0"
description = "Minimal reference app — canonical scaffold shape for new apps. Greets the user via the think capability. Message formatting refactored for clarity."

[app.entry]
module = "app"
class = "HelloWorldApp"

[requires]
capabilities = ["think"]
apps = []
connectors = []

[provides.cli]
commands = ["hello-world"]

[provides.web]
prefix = "/hello-world"

[provides.events]
emits = ["hello-world:greeted"]
