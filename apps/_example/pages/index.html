<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello - EmptyOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui; background: #0a0a0a; color: #e5e5e5; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 2rem; max-width: 400px; text-align: center; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        #result { color: #4ade80; margin: 1rem 0; min-height: 1.5rem; }
        input { background: #0a0a0a; border: 1px solid #333; color: #e5e5e5; padding: 0.5rem 1rem; border-radius: 8px; width: 100%; margin-bottom: 1rem; }
        button { background: #3b82f6; color: white; border: none; padding: 0.5rem 1.5rem; border-radius: 8px; cursor: pointer; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello from EmptyOS</h1>
        <input id="name" type="text" placeholder="Your name..." value="World">
        <button onclick="greet()">Say Hello</button>
        <div id="result"></div>
    </div>
    <script>
        async function greet() {
            const name = document.getElementById('name').value || 'World';
            const resp = await fetch(`/hello/?name=${encodeURIComponent(name)}`);
            const data = await resp.json();
            document.getElementById('result').textContent = data.message;
        }
    </script>
</body>
</html>
