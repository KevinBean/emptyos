[app]
id = "tour"
name = "Product Tour"
version = "1.0.0"
description = "Walks the user through real EmptyOS surfaces. Apps contribute steps via [[contributes.tour.step]]; the tour orchestrator drives EOS.navigate + spotlight."
dimensions = ["intellectual"]

[app.entry]
module = "app"
class = "TourApp"

[provides.web]
prefix = "/tour"

[requires]
capabilities = []
apps = []

# Tour seeds its own first step so a fresh clone with no other apps still has
# something to show. App-specific steps live in each app's own manifest.
[[contributes.tour.step]]
id = "home.welcome"
group = "core"
priority = 50
route = "/hub/"
spotlight = "#smartBar"
title = "Welcome"
body = "EmptyOS is a mind companion — it thinks and creates with you, not for you. This bar is your shortcut: type <code>/</code> to jump to any app, <code>+</code> to capture, or <code>?</code> to search notes. We'll take a quick walk through the basics now."
[[contributes.tour.step]]
id = "tour.explore"
group = "core"
priority = 950
route = "/hub/"
spotlight = ".r-app-grid"
title = "Now go explore"
body = "Here's every app this install has loaded — browse, click any card to try it. Each card is its own page with its own UI; the one thing they share is the capability layer (think / read / write / search / speak / listen / see / draw / animate). Have fun."
