<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Store — EmptyOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script>try{document.documentElement.className='theme-'+(localStorage.getItem('eos-theme')||'eos');}catch(e){document.documentElement.className='theme-eos';}</script>
<link rel="stylesheet" href="/static/theme.css">
<link rel="stylesheet" href="/static/eos-components.css">
<link rel="stylesheet" href="/static/eos-keys.css">
<style>
.store-wrap { max-width: 1100px; margin: 0 auto; padding: 24px 20px 64px; }
.store-head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
.store-title { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
.store-meta { font-size: 12px; color: var(--text-muted); }

/* Restart banner — sticky-ish, shows when state changed since boot */
.restart-banner { display: none; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 14px; margin-bottom: 16px; background: color-mix(in srgb, var(--warning) 12%, var(--bg-card)); border: 1px solid color-mix(in srgb, var(--warning) 40%, var(--border)); border-radius: var(--radius-sm); }
.restart-banner.on { display: flex; }
.restart-banner-text { font-size: 13px; color: var(--text); }
.restart-banner-code { font-family: var(--font-mono); padding: 2px 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; font-size: 12px; }

/* Tab bar */
.store-tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
.store-tab { padding: 10px 16px; cursor: pointer; font-size: 14px; color: var(--text-muted); border-bottom: 2px solid transparent; transition: color 0.12s, border-color 0.12s; }
.store-tab:hover { color: var(--text); }
.store-tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 500; }
.store-tab-count { font-size: 11px; color: var(--text-muted); margin-left: 4px; }

/* Toolbar (search + filter) */
.store-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.store-search { flex: 1; min-width: 200px; padding: 8px 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; }
.store-search:focus { outline: none; border-color: var(--accent); }
.store-filter { padding: 8px 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 13px; }
.store-toggle-installed { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; cursor: pointer; }

/* Card grid */
.store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.store-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px; display: flex; flex-direction: column; gap: 8px; transition: border-color 0.12s; }
.store-card:hover { border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); }
.store-card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.store-card-title { font-size: 14px; font-weight: 600; line-height: 1.3; color: var(--text); }
.store-card-id { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 2px; }
.store-card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.45; flex: 1; }
.store-card-meta { display: flex; flex-wrap: wrap; gap: 6px; font-size: 11px; color: var(--text-muted); }
.store-card-badge { padding: 2px 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; }
.store-card-badge.cat { color: var(--text); }
.store-card-badge.essential { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); }
.store-card-actions { display: flex; gap: 6px; margin-top: 4px; }
.store-btn { padding: 6px 12px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); transition: background 0.12s; }
.store-btn:hover:not(:disabled) { background: var(--bg-card-hover); }
.store-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.store-btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.store-btn.primary:hover:not(:disabled) { background: color-mix(in srgb, var(--accent) 88%, black); }
.store-btn.danger { color: var(--danger); border-color: color-mix(in srgb, var(--danger) 40%, var(--border)); }

.store-status { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; }
.store-status.enabled { background: color-mix(in srgb, var(--success) 16%, transparent); color: var(--success); }
.store-status.disabled { background: color-mix(in srgb, var(--warning) 16%, transparent); color: var(--warning); }
.store-status.uninstalled { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }
.store-status.parked { background: color-mix(in srgb, var(--accent) 12%, transparent); color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--border)); }

.store-empty { padding: 48px 24px; text-align: center; color: var(--text-muted); font-size: 13px; }
.store-deps { font-size: 11px; color: var(--text-muted); }
.store-deps strong { color: var(--text); font-weight: 500; }
</style>
</head>
<body class="theme-default">
<script>
// Theme bootstrap — apply saved theme before paint so tokens resolve.
(function(){
  try {
    var t = localStorage.getItem('eos-theme') || 'default';
    document.body.className = 'theme-' + t;
  } catch(e) {}
})();
</script>
<script src="/static/eos.js"></script>
<script src="/static/eos-components.js"></script>
<script>EOS.nav('store');</script>

<div class="store-wrap">
  <div class="store-head">
    <div>
      <div class="store-title">📦 Store</div>
      <div class="store-meta">Install / uninstall apps, plugins, and skills. Restart-required for apps + plugins.</div>
    </div>
  </div>

  <div id="restart-banner" class="restart-banner">
    <div class="restart-banner-text">⚠ Restart required to apply changes — run <span class="restart-banner-code">restart.bat</span></div>
    <button class="store-btn" onclick="checkRestart()">Recheck</button>
  </div>

  <div class="store-tabs">
    <div class="store-tab active" data-kind="apps" onclick="switchTab('apps')">Apps <span class="store-tab-count" id="count-apps">…</span></div>
    <div class="store-tab" data-kind="plugins" onclick="switchTab('plugins')">Plugins <span class="store-tab-count" id="count-plugins">…</span></div>
    <div class="store-tab" data-kind="skills" onclick="switchTab('skills')">Skills <span class="store-tab-count" id="count-skills">…</span></div>
  </div>

  <div class="store-toolbar">
    <input type="text" class="store-search" id="search" placeholder="Search by name, id, or description…" oninput="render()">
    <select class="store-filter" id="filter-cat" onchange="render()">
      <option value="">All categories</option>
    </select>
    <select class="store-filter" id="filter-state" onchange="render()">
      <option value="">All states</option>
      <option value="enabled">Enabled</option>
      <option value="disabled">Disabled</option>
      <option value="not-installed">Not installed</option>
      <option value="parked">Parked</option>
    </select>
  </div>

  <div id="grid" class="store-grid"></div>
</div>

<script>
var STATE = {
  kind: 'apps',
  data: { apps: null, plugins: null, skills: null },
};

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

async function loadCatalog(kind) {
  if (STATE.data[kind]) return STATE.data[kind];
  var res = await fetch('/store/api/catalog/' + kind);
  STATE.data[kind] = await res.json();
  return STATE.data[kind];
}

async function switchTab(kind) {
  STATE.kind = kind;
  document.querySelectorAll('.store-tab').forEach(function(el) {
    el.classList.toggle('active', el.dataset.kind === kind);
  });
  document.getElementById('filter-cat').style.display = (kind === 'skills') ? 'none' : '';
  await render();
}

async function render() {
  var kind = STATE.kind;
  var data = await loadCatalog(kind);
  var items = (data && data.items) || [];

  // Populate category dropdown (apps + plugins only)
  if (kind !== 'skills') {
    var cats = Array.from(new Set(items.map(function(i) { return i.category || 'other'; }))).sort();
    var sel = document.getElementById('filter-cat');
    var current = sel.value;
    sel.innerHTML = '<option value="">All categories</option>' +
      cats.map(function(c) { return '<option value="' + esc(c) + '">' + esc(c) + '</option>'; }).join('');
    sel.value = cats.indexOf(current) >= 0 ? current : '';
  }

  // Count badge — show enabled/total (disabled apps count as installed but not loaded)
  var enabledCount = items.filter(function(i) { return i.installed && !i.disabled; }).length;
  document.getElementById('count-' + kind).textContent = enabledCount + '/' + items.length;

  // Filter
  var q = (document.getElementById('search').value || '').toLowerCase().trim();
  var cat = document.getElementById('filter-cat').value;
  var state = document.getElementById('filter-state').value;
  var filtered = items.filter(function(it) {
    if (state === 'enabled' && !(it.installed && !it.disabled)) return false;
    if (state === 'disabled' && !(it.installed && it.disabled)) return false;
    if (state === 'not-installed' && it.installed) return false;
    if (state === 'parked' && !it.parked) return false;
    if (cat && (it.category || 'other') !== cat) return false;
    if (q) {
      var blob = (it.id + ' ' + it.name + ' ' + (it.description || '')).toLowerCase();
      if (blob.indexOf(q) < 0) return false;
    }
    return true;
  });

  // Render
  var grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="store-empty">No matches.</div>';
    return;
  }
  grid.innerHTML = filtered.map(function(it) { return renderCard(it, kind); }).join('');
}

function renderCard(it, kind) {
  // Status badge — four states for apps (parked is a special "uninstalled
  // with code physically moved to _catalog/"), three for plugins, two for
  // skills (folder-move is their only toggle).
  var statusClass, statusLabel;
  if (it.parked) {
    statusClass = 'parked';
    statusLabel = '⊟ Parked';
  } else if (!it.installed) {
    statusClass = 'uninstalled';
    statusLabel = 'Not installed';
  } else if (it.disabled) {
    statusClass = 'disabled';
    statusLabel = 'Disabled';
  } else {
    statusClass = 'enabled';
    statusLabel = '✓ Enabled';
  }

  // Buttons depend on (state, kind, essential)
  var buttons = [];
  if (!it.installed) {
    buttons.push(btn('Install', 'primary', "install('" + kind + "', '" + esc(it.id) + "')"));
  } else {
    if (kind !== 'skills') {
      // Disable / Enable toggle
      if (it.disabled) {
        var enableDisabled = it.essential ? ' disabled title="' + esc(it.id) + ' is always enabled"' : '';
        buttons.push(btn('Enable', 'primary', "enable('" + kind + "', '" + esc(it.id) + "')", enableDisabled));
      } else {
        var disableDisabled = it.essential ? ' disabled title="' + esc(it.id) + ' is essential — cannot disable"' : '';
        buttons.push(btn('Disable', '', "disable('" + kind + "', '" + esc(it.id) + "')", disableDisabled));
      }
    }
    var uninstallDisabled = it.essential ? ' disabled title="' + esc(it.id) + ' is required by EmptyOS"' : '';
    buttons.push(btn('Uninstall', 'danger', "uninstall('" + kind + "', '" + esc(it.id) + "')", uninstallDisabled));
  }

  var meta = [];
  if (it.category && kind !== 'skills') meta.push('<span class="store-card-badge cat">' + esc(it.category) + '</span>');
  if (it.essential) meta.push('<span class="store-card-badge essential">essential</span>');
  if (it.version) meta.push('<span class="store-card-badge">v' + esc(it.version) + '</span>');
  if (it.private) meta.push('<span class="store-card-badge">private</span>');

  var deps = '';
  if (it.requires_apps && it.requires_apps.length) {
    deps += '<div class="store-deps">Requires: <strong>' + it.requires_apps.map(esc).join(', ') + '</strong></div>';
  }
  if (it.dependents && it.dependents.length) {
    deps += '<div class="store-deps">Used by: <strong>' + it.dependents.map(esc).join(', ') + '</strong></div>';
  }
  if (it.provides_capabilities && it.provides_capabilities.length) {
    deps += '<div class="store-deps">Provides: <strong>' + it.provides_capabilities.map(esc).join(', ') + '</strong></div>';
  }

  return [
    '<div class="store-card">',
      '<div class="store-card-head">',
        '<div>',
          '<div class="store-card-title">', esc(it.name), '</div>',
          '<div class="store-card-id">', esc(it.id), '</div>',
        '</div>',
        '<span class="store-status ', statusClass, '">', statusLabel, '</span>',
      '</div>',
      '<div class="store-card-desc">', esc(it.description || '(no description)'), '</div>',
      (meta.length ? '<div class="store-card-meta">' + meta.join('') + '</div>' : ''),
      deps,
      '<div class="store-card-actions">', buttons.join(''), '</div>',
    '</div>'
  ].join('');
}

function btn(label, klass, handler, extraAttrs) {
  return '<button class="store-btn ' + klass + '"' + (extraAttrs || '') + ' onclick="' + handler + '">' + label + '</button>';
}

async function install(kind, id, installDeps) {
  var body = installDeps ? { install_deps: true } : {};
  var res = await fetch('/store/api/install/' + kind + '/' + encodeURIComponent(id), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  var j = await res.json();
  if (j.error) {
    EOS_UI.toast(j.error, 'error');
    return;
  }
  if (j.needs_confirm && j.missing_deps && j.missing_deps.length) {
    var ok = await EOS_UI.confirm({
      title: 'Install dependencies?',
      body: '<p>Installing <strong>' + esc(id) + '</strong> requires:</p><p><strong>' + j.missing_deps.map(esc).join(', ') + '</strong></p><p>Install all?</p>',
      action: 'Install all',
      danger: false,
    });
    if (!ok) return;
    return install(kind, id, true);
  }
  STATE.data[kind] = null;  // invalidate cache
  await render();
  EOS_UI.toast(j.message || (id + ' installed'), 'success');
  if (j.restart_required) markRestartRequired();
}

async function uninstall(kind, id, force) {
  var body = force ? { force: true } : {};
  var res = await fetch('/store/api/uninstall/' + kind + '/' + encodeURIComponent(id), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  var j = await res.json();
  if (j.error) {
    EOS_UI.toast(j.error, 'error');
    return;
  }
  if (j.needs_confirm && j.dependents_broken && j.dependents_broken.length) {
    var ok = await EOS_UI.confirm({
      title: 'Uninstall anyway?',
      body: '<p>Uninstalling <strong>' + esc(id) + '</strong> will break:</p><p><strong>' + j.dependents_broken.map(esc).join(', ') + '</strong></p>',
      action: 'Uninstall anyway',
      danger: true,
    });
    if (!ok) return;
    return uninstall(kind, id, true);
  }
  STATE.data[kind] = null;
  await render();
  EOS_UI.toast(j.message || (id + ' uninstalled'), 'success');
  if (j.restart_required) markRestartRequired();
}

async function disable(kind, id) {
  var res = await fetch('/store/api/disable/' + kind + '/' + encodeURIComponent(id), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: '{}',
  });
  var j = await res.json();
  if (j.error) {
    EOS_UI.toast(j.error, 'error');
    return;
  }
  STATE.data[kind] = null;
  await render();
  EOS_UI.toast(j.message || (id + ' disabled'), 'success');
  if (j.restart_required) markRestartRequired();
}

async function enable(kind, id) {
  var res = await fetch('/store/api/enable/' + kind + '/' + encodeURIComponent(id), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: '{}',
  });
  var j = await res.json();
  if (j.error) {
    EOS_UI.toast(j.error, 'error');
    return;
  }
  STATE.data[kind] = null;
  await render();
  EOS_UI.toast(j.message || (id + ' enabled'), 'success');
  if (j.restart_required) markRestartRequired();
}

function markRestartRequired() {
  document.getElementById('restart-banner').classList.add('on');
}

async function checkRestart() {
  var res = await fetch('/store/api/restart-required');
  var j = await res.json();
  document.getElementById('restart-banner').classList.toggle('on', !!j.restart_required);
}

// Boot — load all three catalogs in parallel, render apps tab, check restart state.
(async function() {
  await Promise.all([loadCatalog('apps'), loadCatalog('plugins'), loadCatalog('skills')]);
  await render();
  await checkRestart();
})();
</script>
</body>
</html>
