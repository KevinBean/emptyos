# Cross-platform Tauri release builder.
#
# Triggered when a tag of shape `v*.*.*` is pushed (which is exactly what
# `forge release X.Y.Z` does). Builds installers for Windows, macOS Intel,
# macOS Apple Silicon, and Linux, then attaches them to a GitHub Release.
#
# Layered onto every scaffolded Tauri project by forge as part of
# _apply_patches. Generic — no per-project edits needed.

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write  # tauri-action needs this to attach installers to the release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm deps
        run: |
          npm install
          # Work around npm optional-deps bug (issue #4828) — explicitly
          # pull the platform-specific @tauri-apps/cli binding. Forge
          # scaffold does this too, but a fresh clone may not have it.
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            npm install --save-dev @tauri-apps/cli-win32-x64-msvc || true
          elif [ "${{ matrix.platform }}" = "macos-latest" ]; then
            npm install --save-dev @tauri-apps/cli-darwin-arm64 || true
          elif [ "${{ matrix.platform }}" = "macos-13" ]; then
            npm install --save-dev @tauri-apps/cli-darwin-x64 || true
          else
            npm install --save-dev @tauri-apps/cli-linux-x64-gnu || true
          fi
        shell: bash

      - name: Build + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "{{name}} ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG for details."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
