[app]
id = "settings"
name = "Settings"
version = "1.0.0"
description = "System configuration — view and manage EmptyOS settings"

[app.entry]
module = "app"
class = "SettingsApp"

[requires]
capabilities = []

[provides.cli]
commands = ["settings"]

[provides.web]
prefix = "/settings"

[provides.events]
emits = ["settings:changed"]

[[contributes.tour.step]]
id = "settings.byok"
group = "core"
priority = 600
route = "/settings/?tab=demo"
spotlight = "#byok-openai"
title = "Bring Your Own Key"
body = "The demo runs a tiny local model so visitors get a working AI without you paying a bill. For real quality, paste <strong>your own OpenAI key</strong> here — stored only in your browser, sent as a per-request header on think calls, never persisted server-side. Aura, search summaries, capture classification, lyric writing — every AI-using surface instantly switches to gpt-4o-mini-class quality. <strong>Your key, your bill, your control.</strong>"
