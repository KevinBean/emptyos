<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Reports — EmptyOS</title>
<link rel="stylesheet" href="/static/theme.css">
<link rel="stylesheet" href="/static/eos-components.css">
<style>
.rpt-hero { padding:32px 0 12px; animation:fadeDown 0.4s ease }
.rpt-hero h1 { font-size:28px; font-weight:700; color:var(--text-heading); margin-bottom:4px }
.rpt-hero .desc { font-size:14px; color:var(--text-secondary) }

.rpt-toolbar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; animation:fadeDown 0.4s ease 0.05s both }
.rpt-toolbar .btn { padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; border:none; transition:transform 0.1s }
.rpt-toolbar .btn:active { transform:scale(0.97) }
.rpt-toolbar .btn-primary { background:var(--accent); color: var(--accent-ink) }
.rpt-toolbar .btn-secondary { background:var(--bg-card); border:1px solid var(--border); color:var(--text) }
.rpt-toolbar .search { margin-left:auto; flex:1; max-width:320px; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-size:13px }

.filter-pills { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; animation:fadeDown 0.4s ease 0.08s both }

.rpt-list { display:flex; flex-direction:column; gap:8px; animation:cardIn 0.35s ease 0.12s both }
.rpt-list .eos-entity-card { margin-bottom:0 }
.rpt-list .eec-meta .proj { color:var(--accent) }

.empty-state { text-align:center; padding:48px 24px; color:var(--text-muted) }
.empty-state .icon { font-size:48px; margin-bottom:12px; opacity:0.4 }
.empty-state p { font-size:14px; margin-top:8px }

/* Template picker modal */
.tpl-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; margin-top:12px }
.tpl-card { border:1px solid var(--border); border-radius:8px; padding:16px; cursor:pointer; background:var(--bg-card); transition:all 0.15s }
.tpl-card:hover { border-color:var(--accent); transform:translateY(-1px) }
.tpl-card.selected { border-color:var(--accent); background:color-mix(in srgb,var(--accent) 8%,var(--bg-card)) }
.tpl-card .tpl-name { font-size:13px; font-weight:700; color:var(--text-heading); margin-bottom:4px }
.tpl-card .tpl-desc { font-size:11.5px; color:var(--text-secondary); line-height:1.4 }
.tpl-card .tpl-stats { margin-top:8px; font-size:10.5px; color:var(--text-muted) }

.form-field { margin-top:12px }
.form-field label { display:block; font-size:12px; color:var(--text-secondary); margin-bottom:4px; font-weight:600 }
.form-field input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-size:13px; font-family:inherit }

/* Detail view */
.detail-view { display:none; animation:fadeDown 0.3s ease }
.detail-view.active { display:block }
.detail-header { display:flex; gap:12px; align-items:flex-start; padding:16px 0 16px; border-bottom:1px solid var(--border); margin-bottom:16px }
.detail-header .back { padding:8px 12px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text-muted); cursor:pointer; font-size:13px }
.detail-header .back:hover { color:var(--text); border-color:var(--accent) }
.detail-header .meta-wrap { flex:1 }
.detail-header h2 { font-size:22px; color:var(--text-heading); margin-bottom:4px; font-weight:700 }
.detail-header .meta-line { font-size:12px; color:var(--text-muted); display:flex; gap:12px; flex-wrap:wrap }
.detail-header .actions { display:flex; gap:8px; flex-wrap:wrap }
.detail-header .actions .btn { padding:8px 12px; font-size:12px; border-radius:8px; border:1px solid var(--border); background:var(--bg-card); color:var(--text); cursor:pointer }
.detail-header .actions .btn:hover { border-color:var(--accent) }
.detail-header .actions .btn-primary { background:var(--accent); color: var(--accent-ink); border-color:var(--accent) }

.detail-layout { display:grid; grid-template-columns:240px 1fr 280px; gap:16px; min-height:500px }
@media (max-width:1100px) { .detail-layout { grid-template-columns:200px 1fr } .detail-aside { display:none } }
@media (max-width:800px)  { .detail-layout { grid-template-columns:1fr } .detail-tree { display:none } }

.detail-tree { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:12px; max-height:calc(100vh - 220px); overflow-y:auto }
.tree-title { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px; font-weight:700 }
.tree-item { display:flex; align-items:center; gap:8px; padding:8px 8px; border-radius:6px; cursor:pointer; font-size:13px; color:var(--text); margin-bottom:2px }
.tree-item:hover { background:color-mix(in srgb,var(--accent) 10%,transparent) }
.tree-item.active { background:var(--accent); color: var(--accent-ink) }
.tree-item .st-dot { width:8px; height:8px; border-radius:50%; background:var(--border); flex-shrink:0 }
.tree-item .st-dot.st-draft { background:var(--warning) }
.tree-item .st-dot.st-ready { background:var(--accent) }
.tree-item .st-dot.st-approved { background:var(--success) }

.detail-main { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:16px }
.editor-toolbar { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center }
.editor-toolbar .btn { padding:4px 12px; font-size:12px; border-radius:6px; border:1px solid var(--border); background:var(--bg); color:var(--text); cursor:pointer }
.editor-toolbar .btn:hover { border-color:var(--accent); color:var(--accent) }
.editor-toolbar .status-select { font-size:12px; padding:4px 8px; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--text); margin-left:auto }
#section-editor { width:100%; min-height:420px; padding:16px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:var(--mono); font-size:13px; line-height:1.55; resize:vertical }

.detail-aside { display:flex; flex-direction:column; gap:12px }
.aside-card { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:16px }
.aside-card h4 { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px; font-weight:700 }
.aside-card .field { margin-bottom:8px }
.aside-card .field label { display:block; font-size:11px; color:var(--text-muted); margin-bottom:2px }
.aside-card .field input,
.aside-card .field select,
.aside-card .field textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:4px 8px; color:var(--text); font-size:12px; font-family:inherit }
.aside-card .field textarea { min-height:50px }

.export-list { list-style:none; padding:0; margin:0 }
.export-list li { padding:8px 0; border-bottom:1px solid var(--border); font-size:12px; display:flex; justify-content:space-between; gap:8px; align-items:center }
.export-list li:last-child { border-bottom:none }
.export-list a { color:var(--accent); text-decoration:none }

/* Structured table editor */
.table-editor { overflow-x:auto; margin-top:8px }
.table-editor table { width:100%; border-collapse:collapse; font-size:12px }
.table-editor th { text-align:left; padding:4px 8px; background:var(--bg); color:var(--text-muted); font-size:10.5px; text-transform:uppercase; border-bottom:1px solid var(--border) }
.table-editor td { padding:4px 4px; border-bottom:1px solid var(--border); vertical-align:top }
.table-editor input,
.table-editor select,
.table-editor textarea { width:100%; background:transparent; border:1px solid transparent; padding:4px 8px; color:var(--text); font-size:12px; font-family:inherit; border-radius:4px }
.table-editor input:focus,
.table-editor select:focus,
.table-editor textarea:focus { outline:none; border-color:var(--accent); background:var(--bg) }
.table-editor textarea { resize:vertical; min-height:28px }
.table-editor .col-short { width:110px }
.table-editor .col-wide  { min-width:180px }
.table-editor .row-del { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:15px; padding:2px 8px }
.table-editor .row-del:hover { color:var(--danger) }
.table-add { margin-top:8px; padding:4px 12px; font-size:12px; background:var(--bg); border:1px dashed var(--border); border-radius:6px; color:var(--text-muted); cursor:pointer }
.table-add:hover { border-color:var(--accent); color:var(--accent) }

.toast-save { position:fixed; bottom:20px; right:20px; background:var(--success); color:#000; padding:8px 16px; border-radius:8px; font-size:12px; font-weight:600; opacity:0; transition:opacity 0.25s; pointer-events:none; z-index:500 }
.toast-save.show { opacity:1 }

.tab-row { display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:12px }
.tab-btn { padding:8px 16px; font-size:12px; font-weight:600; background:none; border:none; color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px }
.tab-btn:hover { color:var(--text) }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent) }
.tab-panel { display:none }
.tab-panel.active { display:block }
</style>
</head>
<body>
<script src="/static/eos.js"></script>
<script src="/static/eos-components.js"></script>
<script>EOS.nav('reports');</script>

<div class="page">
  <!-- LIST VIEW -->
  <div id="list-view">
    <div class="rpt-hero">
      <h1>Reports</h1>
      <div class="desc">Professional documents — PDR, CDR, TRR, proposals, specs. Structured sections, PDF + DOCX export.</div>
    </div>

    <div class="rpt-toolbar">
      <button class="btn btn-primary" onclick="openTemplatePicker()">+ New Report</button>
      <button class="btn btn-secondary" onclick="openAppSettings()">⚙ Settings</button>
      <input class="search" id="search-input" placeholder="Search reports..." oninput="renderList()">
    </div>

    <div class="filter-pills" id="filter-pills"></div>

    <div id="rpt-list-container"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detail-view" class="detail-view">
    <div class="detail-header">
      <button class="back" onclick="closeDetail()">← Back</button>
      <div class="meta-wrap">
        <h2 id="detail-title">—</h2>
        <div class="meta-line" id="detail-meta-line"></div>
      </div>
      <div class="actions">
        <button class="btn" onclick="openPreview()">👁 Preview</button>
        <button class="btn btn-primary" onclick="exportReport('pdf')">Export PDF</button>
        <button class="btn" onclick="exportReport('docx')">Export DOCX</button>
      </div>
    </div>

    <div class="detail-layout">
      <aside class="detail-tree" id="section-tree"></aside>

      <main class="detail-main">
        <div class="tab-row">
          <button class="tab-btn active" data-tab="editor" onclick="switchTab('editor')">Section</button>
          <button class="tab-btn" data-tab="tables"  onclick="switchTab('tables')">Tables</button>
        </div>

        <div class="tab-panel active" id="tab-editor">
          <div class="editor-toolbar">
            <strong id="active-section-title" style="font-size:14px;color:var(--text-heading);margin-right:10px">—</strong>
            <button class="btn" onclick="aiAction('polish')">✨ Polish</button>
            <button class="btn" onclick="aiAction('expand')">▶ Expand</button>
            <button class="btn" onclick="aiAction('compress')">◀ Compress</button>
            <button class="btn" onclick="aiAction('scaffold')">🧱 Scaffold</button>
            <span id="ai-provenance-slot"></span>
            <select class="status-select" id="section-status" onchange="updateSectionStatus()">
              <option value="draft">Draft</option>
              <option value="ready">Ready</option>
              <option value="approved">Approved</option>
              <option value="needs-review">Needs review</option>
            </select>
          </div>
          <textarea id="section-editor" spellcheck="true" placeholder="Select a section to start editing..."></textarea>
        </div>

        <div class="tab-panel" id="tab-tables">
          <div id="tables-container"></div>
        </div>
      </main>

      <aside class="detail-aside">
        <div class="aside-card">
          <h4>Metadata</h4>
          <div class="field"><label>Version</label><input id="meta-version" onchange="saveMetaField('version', this.value)"></div>
          <div class="field"><label>Status</label>
            <select id="meta-status" onchange="saveMetaField('status', this.value)">
              <option value="draft">Draft</option>
              <option value="ready">Ready for review</option>
              <option value="approved">Approved</option>
              <option value="archived">Archived</option>
            </select>
          </div>
          <div class="field"><label>Project ID</label><input id="meta-project" onchange="saveMetaField('project_id', this.value)" placeholder="(optional)"></div>
          <div class="field"><label>Authors (comma-separated)</label><input id="meta-authors" onchange="saveMetaFieldList('authors', this.value)"></div>
          <div class="field"><label>Approvers (one role per line)</label><textarea id="meta-approvers" onchange="saveMetaFieldLines('approvers', this.value)"></textarea></div>
        </div>

        <div class="aside-card">
          <h4>Exports</h4>
          <ul class="export-list" id="export-list"><li style="color:var(--text-muted);font-style:italic">Nothing exported yet.</li></ul>
        </div>
      </aside>
    </div>
  </div>
</div>

<div class="toast-save" id="toast-save">Saved</div>

<script>
// --- State ------------------------------------------------------------------
const State = {
  reports: [],
  templates: [],
  tableSchemas: {},
  activeId: null,
  activeReport: null,
  activeSectionSlug: null,
  filterType: "all",
  dirtyTimer: null,
};

async function api(method, path, body) {
  const init = { method, headers: {"Content-Type": "application/json"} };
  if (body !== undefined) init.body = JSON.stringify(body);
  const r = await fetch(path, init);
  return await r.json();
}

function toast(msg) {
  const el = document.getElementById("toast-save");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 1400);
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
}

// Map our status vocabulary onto shared .eos-badge-status-* classes.
// draft / archived are exact; ready|approved|needs-review are best-fit onto the shared palette.
const _statusMap = { draft: "draft", ready: "active", approved: "completed", "needs-review": "shelved", archived: "archived" };
function statusClass(s) { return _statusMap[String(s || "").toLowerCase()] || "draft"; }

// --- List view --------------------------------------------------------------

async function loadReports() {
  const data = await api("GET", "/reports/api/reports");
  State.reports = data.reports || [];
  renderFilterPills();
  renderList();
}

async function loadTemplates() {
  const data = await api("GET", "/reports/api/templates");
  State.templates = data.templates || [];
  State.tableSchemas = data.table_schemas || {};
}

var _reportsFilterBar = null;
function renderFilterPills() {
  const counts = {};
  for (const r of State.reports) counts[r.type] = (counts[r.type] || 0) + 1;
  const pills = [{id: "all", label: "All", count: State.reports.length}];
  for (const [id, count] of Object.entries(counts)) pills.push({id, label: id.toUpperCase(), count});
  const cats = pills.map(p => ({ key: p.id, label: p.label, count: p.count }));
  if (!_reportsFilterBar) {
    _reportsFilterBar = EOS_UI.filterBar("filter-pills", cats, (key) => {
      State.filterType = key;
      renderList();
    }, { includeAll: false, initial: State.filterType });
  } else {
    _reportsFilterBar.update(cats);
    _reportsFilterBar.setActive(State.filterType);
  }
}

function setFilter(id) { State.filterType = id; if (_reportsFilterBar) _reportsFilterBar.setActive(id); renderList(); }

function renderList() {
  const q = (document.getElementById("search-input")?.value || "").toLowerCase();
  const list = State.reports.filter(r => {
    if (State.filterType !== "all" && r.type !== State.filterType) return false;
    if (q && !(r.title.toLowerCase().includes(q) || (r.project_id || "").toLowerCase().includes(q))) return false;
    return true;
  });
  const c = document.getElementById("rpt-list-container");
  if (list.length === 0) {
    c.innerHTML = EOS_UI.emptyState({icon: '📄', message: 'No reports yet. Click + New Report to get started.'});
    return;
  }
  c.innerHTML = `<div class="rpt-list">${list.map(r => EOS_UI.entityCard({
    title: r.title,
    badges: [
      {label: r.type, variant: 'neutral'},
      {label: r.status, variant: 'status-' + statusClass(r.status)},
    ],
    meta: `<span>v${esc(r.version)}</span> · <span>Updated ${esc((r.updated || "").slice(0, 10))}</span>`
      + (r.project_id ? ` · <span class="proj">● ${esc(r.project_id)}</span>` : ''),
    onClick: `_route.set('${esc(r.id)}')`,
  })).join("")}</div>`;
}

// --- Template picker --------------------------------------------------------

let _selectedTemplate = null;

function openTemplatePicker() {
  _selectedTemplate = null;
  const gridHtml = State.templates.map(t => `
    <div class="tpl-card" data-id="${esc(t.id)}" onclick="selectTemplate('${esc(t.id)}')">
      <div class="tpl-name">${esc(t.name)}</div>
      <div class="tpl-desc">${esc(t.description)}</div>
      <div class="tpl-stats">${t.section_count} sections · ${t.table_count} tables · ${t.approver_count} approvers</div>
    </div>
  `).join("");
  const body = `
    <p style="color:var(--text-secondary);margin-bottom:4px;font-size:13px">Choose a template. You can edit all sections and add/remove them later.</p>
    <div class="tpl-grid">${gridHtml}</div>
    <div class="form-field"><label>Report title</label><input id="new-rpt-title" placeholder="e.g. Subsea Power Cable Route — PDR v1"></div>
    <div class="form-field"><label>Project ID (optional, links to a project)</label><input id="new-rpt-project" placeholder="e.g. emptyos-development"></div>
  `;
  EOS_UI.modal({
    title: "New Report",
    body,
    actions: [
      { label: "Cancel", style: "secondary" },
      { label: "Create", style: "primary", onClick: createReport },
    ],
    width: 640,
  });
}

function selectTemplate(id) {
  _selectedTemplate = id;
  document.querySelectorAll(".tpl-card").forEach(c => c.classList.toggle("selected", c.dataset.id === id));
}

async function createReport() {
  if (!_selectedTemplate) { toast("Pick a template first"); return false; }
  const title = (document.getElementById("new-rpt-title")?.value || "").trim();
  if (!title) { toast("Enter a title"); return false; }
  const project_id = (document.getElementById("new-rpt-project")?.value || "").trim();
  const res = await api("POST", "/reports/api/reports", { template: _selectedTemplate, title, project_id });
  if (res.error) { toast(res.error); return false; }
  toast("Created");
  await loadReports();
  _route.set(res.id);
  return true;
}

// --- Detail view ------------------------------------------------------------

async function openDetail(id) {
  const data = await api("GET", "/reports/api/reports/" + encodeURIComponent(id));
  if (data.error) { toast(data.error); return; }
  State.activeId = id;
  State.activeReport = data;
  document.getElementById("list-view").style.display = "none";
  document.getElementById("detail-view").classList.add("active");
  renderDetail();
}

function closeDetail() {
  State.activeId = null;
  State.activeReport = null;
  State.activeSectionSlug = null;
  if (_route) _route.clear();
  document.getElementById("list-view").style.display = "";
  document.getElementById("detail-view").classList.remove("active");
  loadReports();
}

function renderDetail() {
  const r = State.activeReport;
  if (!r) return;
  const meta = r.meta || {};
  document.getElementById("detail-title").textContent = meta.title || r.id;
  document.getElementById("detail-meta-line").innerHTML = `
    <span>${esc((meta.type || "").toUpperCase())}</span>
    <span>v${esc(meta.version || "0.1")}</span>
    <span>${esc(meta.date || "")}</span>
    ${meta.project_id ? `<span class="proj">● ${esc(meta.project_id)}</span>` : ""}
  `;
  // Section tree
  const tree = document.getElementById("section-tree");
  const items = (r.outline || []).map(s => `
    <div class="tree-item ${State.activeSectionSlug === s.slug ? "active" : ""}" onclick="loadSection('${esc(s.slug)}')">
      <span class="st-dot st-${esc(s.status || 'draft')}"></span>
      <span>${esc(s.title)}</span>
    </div>
  `).join("");
  tree.innerHTML = `<div class="tree-title">Sections (${(r.outline || []).length})</div>${items}`;

  // Metadata
  document.getElementById("meta-version").value = meta.version || "";
  document.getElementById("meta-status").value  = meta.status || "draft";
  document.getElementById("meta-project").value = meta.project_id || "";
  document.getElementById("meta-authors").value = Array.isArray(meta.authors) ? meta.authors.join(", ") : (meta.authors || "");
  const approversText = (meta.approvers || []).map(a => typeof a === "string" ? a : (a.role || "")).join("\n");
  document.getElementById("meta-approvers").value = approversText;

  // Exports
  const exports = r.exports || [];
  const expEl = document.getElementById("export-list");
  if (exports.length === 0) {
    expEl.innerHTML = `<li style="color:var(--text-muted);font-style:italic">Nothing exported yet.</li>`;
  } else {
    expEl.innerHTML = exports.map(e => `
      <li><a href="/reports/api/reports/${encodeURIComponent(State.activeId)}/export/file/${encodeURIComponent(e.name)}" download>${esc(e.name)}</a>
      <span style="color:var(--text-muted)">${Math.round(e.size / 1024)} KB</span></li>
    `).join("");
  }

  renderTablesTab();

  // Auto-open first section on initial load
  if (!State.activeSectionSlug && r.outline && r.outline.length > 0) {
    loadSection(r.outline[0].slug);
  }
}

async function loadSection(slug) {
  State.activeSectionSlug = slug;
  const r = await api("GET", `/reports/api/reports/${encodeURIComponent(State.activeId)}/sections/${encodeURIComponent(slug)}`);
  if (r.error) { toast(r.error); return; }
  document.getElementById("section-editor").value = r.body || "";
  const section = (State.activeReport.outline || []).find(s => s.slug === slug);
  document.getElementById("active-section-title").textContent = section ? section.title : slug;
  document.getElementById("section-status").value = (r.meta && r.meta.status) || "draft";
  // Update active tree item
  document.querySelectorAll("#section-tree .tree-item").forEach(el => el.classList.remove("active"));
  const items = document.querySelectorAll("#section-tree .tree-item");
  const idx = (State.activeReport.outline || []).findIndex(s => s.slug === slug);
  if (idx >= 0 && items[idx]) items[idx].classList.add("active");
  switchTab("editor");
}

let _sectionDebounce = null;
document.addEventListener("input", e => {
  if (e.target && e.target.id === "section-editor") {
    clearTimeout(_sectionDebounce);
    _sectionDebounce = setTimeout(saveSection, 900);
  }
});

async function saveSection() {
  if (!State.activeSectionSlug || !State.activeId) return;
  const body = document.getElementById("section-editor").value;
  const status = document.getElementById("section-status").value;
  await api("PUT",
    `/reports/api/reports/${encodeURIComponent(State.activeId)}/sections/${encodeURIComponent(State.activeSectionSlug)}`,
    { body, meta: { status } }
  );
  // Refresh outline statuses in memory + tree
  const entry = (State.activeReport.outline || []).find(s => s.slug === State.activeSectionSlug);
  if (entry) entry.status = status;
  renderDetail();
  toast("Saved");
}

async function updateSectionStatus() { await saveSection(); }

// --- AI actions -------------------------------------------------------------

async function aiAction(action) {
  if (!State.activeId || !State.activeSectionSlug) return;
  const editor = document.getElementById("section-editor");
  const text = editor.value;
  if (action === "scaffold" || text.trim()) {
    const btns = document.querySelectorAll(".editor-toolbar .btn");
    btns.forEach(b => b.disabled = true);
    try {
      const payload = { action, text };
      if (action === "scaffold") payload.slug = State.activeSectionSlug;
      const res = await api("POST", `/reports/api/reports/${encodeURIComponent(State.activeId)}/ai`, payload);
      if (res.error) { toast(res.error); return; }
      if (res.text) editor.value = res.text;
      var slot = document.getElementById('ai-provenance-slot');
      if (slot && res.provenance && res.provenance.mode) {
        slot.innerHTML = EOS_UI.provenance(res.provenance);
      }
      await saveSection();
    } finally {
      btns.forEach(b => b.disabled = false);
    }
  }
}

// --- Metadata saves ---------------------------------------------------------

async function saveMetaField(key, value) {
  if (!State.activeId) return;
  await api("PATCH", `/reports/api/reports/${encodeURIComponent(State.activeId)}/meta`, { meta: { [key]: value } });
  State.activeReport.meta[key] = value;
  toast("Saved");
}

async function saveMetaFieldList(key, text) {
  const list = text.split(",").map(s => s.trim()).filter(Boolean);
  await saveMetaField(key, list);
}

async function saveMetaFieldLines(key, text) {
  const list = text.split("\n").map(s => s.trim()).filter(Boolean);
  await saveMetaField(key, list);
}

// --- Tables tab -------------------------------------------------------------

function switchTab(id) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === id));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === "tab-" + id));
  if (id === "tables") renderTablesTab();
}

async function renderTablesTab() {
  if (!State.activeReport) return;
  const tables = Object.keys(State.activeReport.tables_present || {});
  const c = document.getElementById("tables-container");
  if (tables.length === 0) {
    c.innerHTML = `<div style="color:var(--text-muted);font-style:italic;padding:20px">This report has no structured tables.</div>`;
    return;
  }
  // Load all tables in parallel
  const loaded = await Promise.all(tables.map(async name => {
    const r = await api("GET", `/reports/api/reports/${encodeURIComponent(State.activeId)}/tables/${encodeURIComponent(name)}`);
    return { name, ...r };
  }));
  c.innerHTML = loaded.map(t => renderTableEditor(t)).join("");
}

function renderTableEditor(t) {
  const schema = t.schema || {};
  const columns = schema.columns || [];
  const rows = t.rows || [];
  const title = t.name.charAt(0).toUpperCase() + t.name.slice(1);
  const header = columns.map(c => `<th class="col-${c.width || ''}">${esc(c.label)}</th>`).join("") + "<th style='width:30px'></th>";
  const rowsHtml = rows.map((row, rIdx) => {
    const cells = columns.map(c => {
      const v = row[c.key] ?? "";
      if (c.options) {
        const opts = [""].concat(c.options).map(o => `<option value="${esc(o)}" ${String(v) === String(o) ? "selected" : ""}>${esc(o)}</option>`).join("");
        return `<td class="col-${c.width || ''}"><select onchange="updateCell('${esc(t.name)}',${rIdx},'${esc(c.key)}',this.value)">${opts}</select></td>`;
      }
      if (c.width === "wide") {
        return `<td class="col-wide"><textarea onchange="updateCell('${esc(t.name)}',${rIdx},'${esc(c.key)}',this.value)">${esc(v)}</textarea></td>`;
      }
      return `<td class="col-${c.width || ''}"><input value="${esc(v)}" onchange="updateCell('${esc(t.name)}',${rIdx},'${esc(c.key)}',this.value)"></td>`;
    }).join("");
    return `<tr>${cells}<td><button class="row-del" title="Delete" onclick="deleteRow('${esc(t.name)}',${rIdx})">×</button></td></tr>`;
  }).join("");
  return `
    <div style="margin-bottom:22px">
      <h4 style="font-size:13px;font-weight:700;color:var(--text-heading);margin-bottom:6px">${esc(title)}</h4>
      <div class="table-editor">
        <table>
          <thead><tr>${header}</tr></thead>
          <tbody id="tbl-body-${esc(t.name)}">${rowsHtml}</tbody>
        </table>
      </div>
      <button class="table-add" onclick="addRow('${esc(t.name)}')">+ Add row</button>
    </div>
  `;
}

const _tableCache = {};

async function ensureTableLoaded(name) {
  if (_tableCache[name]) return _tableCache[name];
  const r = await api("GET", `/reports/api/reports/${encodeURIComponent(State.activeId)}/tables/${encodeURIComponent(name)}`);
  _tableCache[name] = r;
  return r;
}

async function updateCell(name, rowIdx, key, value) {
  const t = await ensureTableLoaded(name);
  if (!t.rows[rowIdx]) t.rows[rowIdx] = {};
  t.rows[rowIdx][key] = value;
  await saveTable(name, t.rows);
}

async function addRow(name) {
  const t = await ensureTableLoaded(name);
  const newRow = {};
  for (const c of (t.schema?.columns || [])) newRow[c.key] = "";
  if (t.next_id) newRow.id = t.next_id;
  t.rows = t.rows || [];
  t.rows.push(newRow);
  // Recompute next id
  if (t.schema?.id_prefix) {
    const max = t.rows.reduce((m, r) => {
      const match = String(r.id || "").match(new RegExp("^" + t.schema.id_prefix + "-(\\d+)$"));
      return match ? Math.max(m, parseInt(match[1], 10)) : m;
    }, 0);
    t.next_id = `${t.schema.id_prefix}-${String(max + 1).padStart(3, "0")}`;
  }
  await saveTable(name, t.rows);
  renderTablesTab();
}

async function deleteRow(name, rowIdx) {
  const t = await ensureTableLoaded(name);
  t.rows.splice(rowIdx, 1);
  await saveTable(name, t.rows);
  renderTablesTab();
}

async function saveTable(name, rows) {
  await api("PUT", `/reports/api/reports/${encodeURIComponent(State.activeId)}/tables/${encodeURIComponent(name)}`, { rows });
  toast("Saved");
}

// --- Export + preview -------------------------------------------------------

async function openPreview() {
  if (!State.activeId) return;
  const w = window.open(`/reports/api/reports/${encodeURIComponent(State.activeId)}/preview`, "_blank");
  if (!w) toast("Preview popup blocked — allow popups for this site");
}

async function exportReport(format) {
  if (!State.activeId) return;
  const btns = document.querySelectorAll(".detail-header .actions .btn");
  btns.forEach(b => b.disabled = true);
  toast("Exporting " + format.toUpperCase() + "...");
  try {
    const res = await api("POST", `/reports/api/reports/${encodeURIComponent(State.activeId)}/export/${format}`);
    if (res.error) { toast(res.error); return; }
    toast("Exported: " + res.file);
    const detail = await api("GET", `/reports/api/reports/${encodeURIComponent(State.activeId)}`);
    State.activeReport = detail;
    renderDetail();
  } finally {
    btns.forEach(b => b.disabled = false);
  }
}

// --- Hash routing -----------------------------------------------------------

let _route = null;

// --- App settings panel -----------------------------------------------------

let _appSettings;

// --- Boot -------------------------------------------------------------------

(async function init() {
  await loadTemplates();
  await loadReports();
  _route = EOS_UI.hashRoute({
    onShow: function(id) { openDetail(id); },
    onHide: function() {
      if (State.activeId !== null) closeDetail();
    },
  });
  _appSettings = EOS_UI.settingsPanel({
    id: "reports-settings-panel",
    title: "Reports Settings",
    fields: [
      {key: "reports.default_template", label: "Default Template", type: "select",
       default: "report",
       options: [
         {value:"pdr", label:"Preliminary Design Review"},
         {value:"cdr", label:"Critical Design Review"},
         {value:"trr", label:"Test Readiness Review"},
         {value:"proposal", label:"Technical Proposal"},
         {value:"spec", label:"Technical Specification"},
         {value:"report", label:"Generic Report"},
       ]},
      {key: "reports.author_name", label: "Default Author Name", type: "text", default: ""},
      {key: "reports.author_title", label: "Default Author Title", type: "text", default: ""},
      {key: "reports.organisation", label: "Organisation", type: "text", default: ""},
      {key: "reports.pdf_stylesheet", label: "Custom PDF Stylesheet Path", type: "text", default: "",
       hint: "Absolute path to a .css file overriding the default. Leave blank to use built-in."},
    ],
  });
  _route.init();
})();

function openAppSettings() { _appSettings && _appSettings.open(); }
</script>
