[app]
id = "voice-assistant"
name = "Aura"
version = "0.1.0"
description = "Conversational voice assistant using listen, think, and speak capabilities."

[app.entry]
module = "app"
class = "VoiceAssistantApp"

[requires]
capabilities = ["think", "listen", "speak"]

[provides.events]
emits = ["voice-assistant:chat"]

[provides.web]
prefix = "/voice-assistant"

[[contributes.hub.panel]]
id = "voice-assistant-panel"
method = "panel_assistant"
renderer = "accent-card"
priority = 80

[[contributes.tour.step]]
id = "voice-assistant.aura"
group = "core"
priority = 500
route = "/voice-assistant/"
spotlight = "#rec-btn"
title = "Talk to Aura"
body = "This is <strong>REC</strong> — press it after the tour to talk to Aura. Aura uses your browser's mic (Web Speech API), routes the transcript through a local model (qwen2.5:1.5b) by default, and reads the reply back via TTS. <strong>Tool-use is wired up</strong> — try <em>list my tasks</em> or <em>add a task to call mom tomorrow</em>."
# Only `think` is the real prerequisite — listen/speak inflate the requires
# unnecessarily and trigger a false rewrite to /system on otherwise-fine demos.
requires = ["think"]
