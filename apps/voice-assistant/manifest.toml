[app]
id = "voice-assistant"
name = "Aura"
version = "0.1.0"
description = "Conversational voice assistant using listen, think, and speak capabilities."

[app.entry]
module = "app"
class = "VoiceAssistantApp"

[requires]
capabilities = ["think", "listen", "speak"]

[provides.events]
emits = ["voice-assistant:chat"]

[provides.web]
prefix = "/voice-assistant"

[[contributes.hub.panel]]
id = "voice-assistant-panel"
method = "panel_assistant"
renderer = "accent-card"
priority = 80

[[contributes.tour.step]]
id = "voice-assistant.aura"
group = "core"
priority = 500
route = "/hub/"
spotlight = ".r-app-grid a[href=\"/voice-assistant/\"]"
title = "Talk to Aura"
body = "This card opens <strong>Aura</strong> — the conversational AI. Click to leave the tour and talk: press REC + speak (Web Speech API in your browser), or hit ⌨ to type. Try <em>list my tasks</em> — Aura invokes the right app and reports back. <strong>Tool-use is wired up.</strong>"
# Only `think` is the real prerequisite — listen/speak inflate the requires
# unnecessarily and trigger a false rewrite to /system on otherwise-fine demos.
requires = ["think"]
