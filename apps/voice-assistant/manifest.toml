[app]
id = "voice-assistant"
name = "Aura"
version = "0.1.0"
description = "Conversational voice assistant using listen, think, and speak capabilities."

[app.entry]
module = "app"
class = "VoiceAssistantApp"

[requires]
capabilities = ["think", "listen", "speak"]

[provides.events]
emits = ["voice-assistant:chat"]

[provides.web]
prefix = "/voice-assistant"

[[contributes.hub.panel]]
id = "voice-assistant-panel"
method = "panel_assistant"
renderer = "accent-card"
priority = 80

[[contributes.tour.step]]
id = "voice-assistant.aura"
group = "core"
priority = 500
route = "/voice-assistant/"
spotlight = "#rec-button"
title = "Talk to Aura"
body = "Press <strong>REC</strong> and speak — Aura uses your browser's mic (Web Speech API), then routes the transcript through the local model (qwen2.5:1.5b) and reads the reply back via edge-tts. Or hit <strong>⌨</strong> to type. Try <em>list my tasks</em>."
requires = ["think", "listen", "speak"]
