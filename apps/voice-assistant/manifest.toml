[app]
id = "voice-assistant"
name = "Aura"
version = "0.1.0"
description = "Conversational voice assistant using listen, think, and speak capabilities."

[app.entry]
module = "app"
class = "VoiceAssistantApp"

[requires]
capabilities = ["think", "listen", "speak"]

[provides.events]
emits = ["voice-assistant:chat"]
# Live conversation channel — the assistant UI is the only consumer.
internal = ["voice-assistant:chat"]

[provides.web]
prefix = "/voice-assistant"

[[contributes.hub.panel]]
id = "voice-assistant-panel"
method = "panel_assistant"
renderer = "accent-card"
priority = 80

[[contributes.tour.step]]
id = "voice-assistant.aura"
group = "core"
priority = 500
route = "/hub/"
spotlight = ".pa-fab"
title = "Talk to the assistant"
body = "The <strong>🤖 assistant</strong> pill lives bottom-right on every page — click it after the tour to open an in-page chat drawer (no navigation away). It listens via your browser's mic, routes through a local model (qwen2.5:1.5b) by default, and speaks the reply back. <strong>Tool-use is wired</strong> — try <em>list my tasks</em> or <em>add a task to call mom tomorrow</em>."
# Only `think` is the real prerequisite — listen/speak inflate the requires
# unnecessarily and trigger a false rewrite to /system on otherwise-fine demos.
requires = ["think"]
